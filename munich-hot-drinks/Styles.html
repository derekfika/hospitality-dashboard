<style>
:root {
  --ink: #05090b;
  --muted: #62605d;
  --paper: #f4f7f9;
  --panel: #ffffff;
  --line: #dce5ea;
  --munich: #00538A;
  --munich-dark: #003a61;
  --coffee: #6f4b33;
  --tea: #167a62;
  --choc: #8f3d2f;
  --special: #4F34C7;
  --violet: #4F34C7;
  --good: #117a4b;
  --bad: #b42318;
  --shadow: 0 18px 46px rgba(70, 51, 32, .15);
}
* { box-sizing: border-box; }
[hidden] { display: none !important; }
body {
  margin: 0;
  height: 100svh;
  min-height: 100svh;
  overflow: hidden;
  background:
    linear-gradient(135deg, rgba(0,83,138,.09), transparent 34%),
    linear-gradient(160deg, #fbfdfe 0%, var(--paper) 52%, #e9eff3 100%);
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
button, input, select {
  font: inherit;
}
.topbar {
  z-index: 10;
  display: grid;
  grid-template-columns: minmax(250px, 1fr) auto minmax(250px, 1fr);
  align-items: center;
  gap: 22px;
  height: clamp(58px, 10svh, 86px);
  padding: 8px clamp(14px, 2vw, 28px);
  color: var(--ink);
}
.brand-lockup {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 0;
}
.logo-mark {
  display: block;
  min-width: 0;
}
.logo-mark svg {
  display: block;
  width: auto;
  height: clamp(20px, 4.6svh, 30px);
}
.fika-logo svg {
  height: clamp(24px, 5.2svh, 34px);
  max-width: 148px;
}
.bloom-logo svg {
  height: clamp(20px, 4.6svh, 30px);
  max-width: 112px;
}
.brand-divider {
  width: 1px;
  height: 28px;
  background: #cfc5b6;
}
.service-title {
  display: grid;
  gap: 2px;
  justify-items: center;
  text-align: center;
}
.service-subtitle {
  color: var(--muted);
  font-weight: 700;
}
.munich-logo svg {
  height: clamp(24px, 5.4svh, 36px);
  max-width: 170px;
}
.partner-lockup {
  display: flex;
  justify-content: end;
  align-items: center;
  gap: 16px;
  min-width: 0;
}
.just-eat-logo svg {
  height: clamp(24px, 5.4svh, 36px);
  max-width: 118px;
}
.mode-label {
  display: inline-flex;
  align-items: center;
  min-height: 38px;
  padding: 0 14px;
  border: 1px solid rgba(79,52,199,.24);
  background: #fff;
  color: var(--violet);
  border-radius: 999px;
  font-weight: 800;
  box-shadow: 0 10px 24px rgba(79,52,199,.1);
  white-space: nowrap;
}
.topbar nav {
  display: flex;
  gap: 8px;
}
.nav-button {
  border: 1px solid rgba(255,255,255,.3);
  color: #fff;
  background: transparent;
  min-height: 40px;
  padding: 0 14px;
  border-radius: 8px;
}
.nav-button.active {
  background: #fff;
  color: var(--ink);
}
main {
  width: min(1360px, 100%);
  margin: 0 auto;
  height: calc(100svh - clamp(58px, 10svh, 86px));
  padding: clamp(8px, 1.4svh, 14px) clamp(12px, 2vw, 28px);
  overflow: hidden;
}
.view {
  display: grid;
  gap: 16px;
}
.tally-view {
  grid-template-columns: minmax(280px, 320px) minmax(0, 1fr);
  align-items: stretch;
  height: 100%;
  min-height: 0;
  overflow: hidden;
}
.tally-control-panel {
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 14px;
  min-height: 0;
}
.floor-row {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}
.floor-button {
  min-height: 0;
  height: clamp(50px, 9svh, 70px);
  border: 1px solid rgba(5,9,11,.12);
  background: rgba(255,255,255,.86);
  border-radius: 8px;
  font-weight: 800;
  font-size: clamp(18px, 3vw, 24px);
  color: var(--ink);
  box-shadow: 0 10px 26px rgba(70, 51, 32, .08);
}
.floor-button.active {
  border-color: var(--munich);
  background: var(--munich);
  color: #fff;
  box-shadow: 0 14px 28px rgba(0,83,138,.22);
}
.status-strip {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  color: var(--ink);
  background: rgba(255,255,255,.56);
  border: 1px solid rgba(5,9,11,.08);
  border-radius: 8px;
  min-height: clamp(44px, 7svh, 58px);
  padding: 7px 10px;
  box-shadow: 0 10px 26px rgba(70, 51, 32, .06);
}
#undo-button, #retry-button {
  border: 0;
  background: var(--ink);
  color: #fff;
  min-height: 44px;
  padding: 0 16px;
  border-radius: 8px;
  font-weight: 800;
}
.today-panel {
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 12px;
  align-items: stretch;
  min-height: 0;
}
.today-panel > div {
  background: rgba(255,255,255,.78);
  border: 1px solid rgba(5,9,11,.08);
  border-radius: 8px;
  padding: clamp(10px, 1.8svh, 14px);
  box-shadow: var(--shadow);
}
.today-panel span {
  display: block;
  color: var(--muted);
  font-weight: 700;
}
.today-panel strong {
  display: block;
  font-size: clamp(34px, 8svh, 68px);
  line-height: 1;
  color: var(--munich);
}
.drink-counts {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  align-content: start;
}
.count-tile {
  border-left: 5px solid var(--count);
  padding: clamp(6px, 1.1svh, 9px);
  background: rgba(255,255,255,.76);
  border-radius: 8px;
}
.count-tile span {
  overflow-wrap: anywhere;
  font-size: clamp(11px, 1.55svh, 13px);
  line-height: 1.05;
}
.count-tile strong {
  margin-top: 3px;
  font-size: clamp(18px, 3.2svh, 28px);
  color: var(--ink);
}
.drink-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  grid-template-rows: repeat(2, minmax(0, 1fr));
  gap: clamp(10px, 1.6svh, 14px);
  min-height: 0;
}
.drink-button {
  min-height: 0;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(0,83,138,.08);
  color: var(--ink);
  border-radius: 8px;
  padding: clamp(8px, 1.4svh, 12px);
  text-align: center;
  display: grid;
  grid-template-rows: minmax(0, 1fr) auto;
  gap: clamp(8px, 1.4svh, 12px);
  background:
    linear-gradient(180deg, #ffffff, #f9fbfc);
  box-shadow: 0 18px 42px rgba(0, 45, 76, .13);
  touch-action: manipulation;
  transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
}
.drink-button::before {
  content: "";
  position: absolute;
  inset: 0 0 auto;
  height: 6px;
  background: var(--drink);
}
.drink-button:hover {
  border-color: color-mix(in srgb, var(--drink) 42%, #ffffff);
  box-shadow: 0 22px 48px rgba(0, 45, 76, .17);
}
.drink-button:active {
  transform: scale(.985) translateY(1px);
}
.drink-button[disabled] {
  filter: saturate(.55);
}
.drink-photo {
  position: relative;
  z-index: 1;
  display: block;
  min-height: 0;
  width: 100%;
  height: 100%;
  border-radius: 7px;
  background-color: #fff;
  background-position: center;
  background-size: cover;
  box-shadow: inset 0 0 0 1px rgba(5,9,11,.05);
}
.drink-icon {
  position: relative;
  z-index: 1;
  width: clamp(42px, 7svh, 58px);
  height: clamp(42px, 7svh, 58px);
  border-radius: 8px;
  display: grid;
  place-items: center;
  background: var(--drink);
  color: #fff;
  font-size: clamp(18px, 3svh, 24px);
  font-weight: 900;
  box-shadow: 0 12px 28px color-mix(in srgb, var(--drink) 30%, transparent);
}
.drink-label {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: clamp(40px, 7svh, 58px);
  padding: 0 4px 2px;
  width: 100%;
  font-size: clamp(17px, 2.95svh, 25px);
  line-height: 1.05;
  font-weight: 900;
  letter-spacing: 0;
  text-transform: uppercase;
  color: color-mix(in srgb, var(--drink) 72%, var(--ink));
  overflow-wrap: anywhere;
}
.error-panel, .toast {
  background: #fff4f2;
  color: var(--bad);
  border: 1px solid #f0b8ae;
  border-radius: 8px;
  padding: 12px;
}
.error-panel {
  position: fixed;
  left: 50%;
  bottom: 10px;
  z-index: 20;
  transform: translateX(-50%);
  width: min(680px, calc(100% - 24px));
}
.toast {
  position: fixed;
  left: 50%;
  bottom: 18px;
  transform: translateX(-50%);
  min-width: min(420px, calc(100% - 24px));
  color: var(--ink);
  background: rgba(255,255,255,.96);
  box-shadow: 0 14px 34px rgba(16,24,32,.2);
}
.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 80;
  display: grid;
  place-items: center;
  padding: 24px;
  background: rgba(5, 9, 11, .46);
  backdrop-filter: blur(8px);
}
.floor-modal {
  width: min(560px, 100%);
  border-radius: 8px;
  padding: clamp(22px, 4svh, 34px);
  background:
    linear-gradient(135deg, #ffffff, #fff8ee);
  border: 1px solid rgba(255,255,255,.74);
  box-shadow: 0 28px 70px rgba(5,9,11,.34);
}
.modal-kicker {
  display: inline-flex;
  min-height: 30px;
  align-items: center;
  padding: 0 10px;
  border-radius: 999px;
  background: rgba(79,52,199,.1);
  color: var(--violet);
  font-size: 13px;
  font-weight: 900;
  text-transform: uppercase;
}
.floor-modal h2 {
  margin: 14px 0 8px;
  font-size: clamp(28px, 5svh, 40px);
  line-height: 1;
}
.floor-modal p {
  margin: 0;
  color: var(--muted);
  font-size: clamp(17px, 2.7svh, 21px);
  font-weight: 700;
}
.floor-modal p strong {
  color: var(--ink);
}
.floor-modal-current {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin: 22px 0;
  padding: 16px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.72);
}
.floor-modal-current span {
  color: var(--muted);
  font-weight: 800;
}
.floor-modal-current strong {
  font-size: clamp(22px, 4svh, 30px);
}
.modal-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.modal-actions button {
  min-height: clamp(52px, 9svh, 68px);
  border-radius: 8px;
  border: 0;
  font-weight: 900;
  font-size: clamp(17px, 2.7svh, 21px);
}
.modal-secondary {
  background: #fff;
  color: var(--ink);
  border: 1px solid var(--line) !important;
}
.modal-primary {
  background: var(--violet);
  color: #fff;
  box-shadow: 0 14px 30px rgba(79,52,199,.24);
}
@media (orientation: portrait) {
  body::before {
    content: "Rotate tablet to landscape";
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: grid;
    place-items: center;
    padding: 32px;
    background: var(--violet);
    color: #fff;
    font-size: 28px;
    font-weight: 900;
    text-align: center;
  }
}
@media (max-width: 760px) {
  .topbar {
    grid-template-columns: 1fr auto;
  }
  .service-title {
    display: none;
  }
  .just-eat-logo {
    display: none;
  }
  .tally-view {
    grid-template-columns: minmax(240px, 300px) minmax(0, 1fr);
  }
}
</style>
