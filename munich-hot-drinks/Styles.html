<style>
:root {
  --ink: #05090b;
  --muted: #65727d;
  --paper: #edf3f6;
  --panel: #ffffff;
  --line: #d8e3ea;
  --munich: #00538A;
  --munich-dark: #003a61;
  --violet: #4F34C7;
  --good: #10724e;
  --warn: #c27a10;
  --bad: #b42318;
  --shadow: 0 22px 54px rgba(0, 45, 76, .16);
}

* { box-sizing: border-box; }
[hidden] { display: none !important; }

body {
  margin: 0;
  height: 100svh;
  min-height: 100svh;
  overflow: hidden;
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at 18% 8%, rgba(0,83,138,.14), transparent 28%),
    radial-gradient(circle at 92% 4%, rgba(79,52,199,.09), transparent 24%),
    linear-gradient(160deg, #fbfdfe 0%, var(--paper) 58%, #e4ebef 100%);
}

button, input, select { font: inherit; }
button { -webkit-tap-highlight-color: transparent; }

/* Premium brand header */
.topbar {
  position: relative;
  z-index: 10;
  display: grid;
  grid-template-columns: minmax(220px, 1fr) auto minmax(220px, 1fr);
  align-items: center;
  gap: 18px;
  height: clamp(54px, 8.5svh, 74px);
  padding: 8px clamp(14px, 2vw, 26px);
  color: var(--ink);
}

.brand-lockup, .partner-lockup {
  display: flex;
  align-items: center;
  min-width: 0;
}

.brand-lockup { gap: 12px; }
.partner-lockup { justify-content: end; gap: 14px; }

.logo-mark { display: block; min-width: 0; }
.logo-mark svg { display: block; width: auto; }
.fika-logo svg { height: clamp(22px, 4.5svh, 30px); max-width: 136px; }
.bloom-logo svg { height: clamp(18px, 3.9svh, 26px); max-width: 102px; }
.munich-logo svg { height: clamp(24px, 4.8svh, 34px); max-width: 160px; }
.just-eat-logo svg { height: clamp(22px, 4.8svh, 34px); max-width: 112px; }

.brand-divider {
  width: 1px;
  height: 26px;
  background: rgba(5,9,11,.14);
}

.service-title {
  display: grid;
  gap: 1px;
  justify-items: center;
  text-align: center;
}

.service-subtitle {
  color: var(--muted);
  font-size: clamp(12px, 1.7svh, 14px);
  font-weight: 800;
}

.mode-label {
  display: inline-flex;
  align-items: center;
  min-height: 34px;
  padding: 0 13px;
  border: 1px solid rgba(0,83,138,.14);
  background: rgba(255,255,255,.78);
  color: var(--munich);
  border-radius: 999px;
  font-size: clamp(12px, 1.7svh, 14px);
  font-weight: 900;
  box-shadow: 0 10px 24px rgba(0,45,76,.08);
  white-space: nowrap;
}

main {
  width: min(1420px, 100%);
  height: calc(100svh - clamp(54px, 8.5svh, 74px));
  margin: 0 auto;
  padding: clamp(10px, 1.5svh, 16px) clamp(14px, 2vw, 28px) clamp(12px, 2svh, 22px);
  overflow: hidden;
}

.view { display: grid; gap: 16px; }

.tally-view {
  grid-template-columns: minmax(300px, 340px) minmax(0, 1fr);
  align-items: stretch;
  height: 100%;
  min-height: 0;
}

/* Live sidebar control panel */
.tally-control-panel {
  display: grid;
  grid-template-rows: auto minmax(0, 1fr) auto;
  gap: 12px;
  min-height: 0;
  padding: 14px;
  border: 1px solid rgba(0,83,138,.13);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.9), rgba(255,255,255,.72)),
    rgba(255,255,255,.86);
  box-shadow: var(--shadow);
  backdrop-filter: blur(14px);
}

.control-section {
  display: grid;
  gap: 9px;
}

.section-label, .today-panel span {
  color: var(--muted);
  font-size: 11px;
  font-weight: 950;
  letter-spacing: .08em;
  text-transform: uppercase;
}

.floor-row {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  padding: 5px;
  border-radius: 8px;
  background: #eef4f7;
  box-shadow: inset 0 0 0 1px rgba(0,83,138,.08);
}

.floor-button {
  min-height: clamp(50px, 8svh, 62px);
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 10px;
  border: 0;
  border-radius: 8px;
  padding: 0 12px;
  background: transparent;
  color: var(--ink);
  font-size: clamp(16px, 2.3svh, 20px);
  font-weight: 900;
  text-align: left;
  transition: transform .14s ease, background .14s ease, color .14s ease, box-shadow .14s ease;
}

.floor-button strong {
  min-width: 42px;
  min-height: 32px;
  display: grid;
  place-items: center;
  border-radius: 8px;
  background: rgba(255,255,255,.78);
  color: var(--munich);
  font-size: 15px;
}

.floor-button.active {
  background: linear-gradient(135deg, var(--munich), #0870aa);
  color: #fff;
  box-shadow: 0 12px 26px rgba(0,83,138,.24);
}

.floor-button.active strong {
  background: rgba(255,255,255,.18);
  color: #fff;
}

.floor-button:active { transform: scale(.985); }

.today-panel {
  min-height: 0;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  gap: 10px;
}

.total-tile {
  border-radius: 8px;
  border: 1px solid rgba(0,83,138,.1);
  background: linear-gradient(145deg, #ffffff, #f7fbfd);
  box-shadow: 0 12px 30px rgba(0,45,76,.08);
}

.total-tile {
  position: relative;
  overflow: hidden;
  padding: 14px;
}

.total-tile::after {
  content: "";
  position: absolute;
  right: -44px;
  top: -58px;
  width: 132px;
  height: 132px;
  border: 22px solid rgba(0,83,138,.08);
  border-radius: 50%;
}

.today-panel strong {
  display: block;
  margin-top: 3px;
  color: var(--munich);
  font-size: clamp(42px, 7svh, 64px);
  line-height: .92;
  font-weight: 950;
}

.drink-counts {
  min-height: 0;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  align-content: start;
  overflow: hidden;
}

.count-tile {
  min-height: 58px;
  display: grid;
  align-content: center;
  gap: 2px;
  border-left: 4px solid var(--count);
  border-radius: 8px;
  padding: 8px 9px;
  background: rgba(255,255,255,.76);
  box-shadow: inset 0 0 0 1px rgba(0,83,138,.06);
}

.count-tile span {
  color: var(--muted);
  font-size: clamp(10px, 1.45svh, 12px);
  line-height: 1.05;
  font-weight: 850;
  overflow-wrap: anywhere;
}

.count-tile strong {
  color: var(--ink);
  font-size: clamp(18px, 3svh, 25px);
  line-height: 1;
}

.control-footer {
  display: grid;
  gap: 9px;
}

.sync-pill {
  min-height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  padding: 0 12px;
  color: var(--munich);
  background: rgba(0,83,138,.09);
  font-size: 13px;
  font-weight: 900;
  text-align: center;
}

.sync-pill::before {
  content: "";
  width: 8px;
  height: 8px;
  margin-right: 8px;
  border-radius: 50%;
  background: currentColor;
}

.sync-saving { color: var(--warn); background: rgba(194,122,16,.12); }
.sync-offline, .sync-error { color: var(--bad); background: rgba(180,35,24,.1); }
.sync-synced { color: var(--good); background: rgba(16,114,78,.1); }

#undo-button, #retry-button {
  min-height: 46px;
  border: 0;
  border-radius: 8px;
  background: #101820;
  color: #fff;
  padding: 0 14px;
  font-weight: 900;
  box-shadow: 0 12px 24px rgba(5,9,11,.14);
}

#undo-button {
  background: linear-gradient(135deg, #2f3942, #101820);
}

#undo-button:active, #retry-button:active { transform: scale(.985); }

/* Product grid */
.drink-grid {
  min-height: 0;
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  grid-template-rows: repeat(2, minmax(0, 1fr));
  gap: clamp(10px, 1.6svh, 15px);
}

.drink-button {
  position: relative;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr) auto;
  gap: clamp(8px, 1.25svh, 12px);
  border: 1px solid rgba(0,83,138,.09);
  border-radius: 8px;
  padding: clamp(11px, 1.8svh, 17px);
  color: var(--ink);
  background:
    linear-gradient(145deg, rgba(255,255,255,.98), rgba(247,251,253,.9)),
    radial-gradient(circle at 48% 34%, color-mix(in srgb, var(--drink) 16%, transparent), transparent 48%);
  box-shadow: 0 18px 42px rgba(0,45,76,.13);
  text-align: center;
  touch-action: manipulation;
  transition: transform .13s ease, box-shadow .13s ease, border-color .13s ease;
}

.drink-button::before {
  content: "";
  position: absolute;
  inset: 0 0 auto;
  height: 6px;
  background: linear-gradient(90deg, var(--drink), color-mix(in srgb, var(--drink) 42%, #fff));
}

.drink-button::after {
  content: "";
  position: absolute;
  right: -64px;
  bottom: -82px;
  width: clamp(150px, 15vw, 226px);
  height: clamp(150px, 15vw, 226px);
  border: 24px solid color-mix(in srgb, var(--drink) 11%, transparent);
  border-radius: 50%;
}

.drink-button:hover {
  border-color: color-mix(in srgb, var(--drink) 42%, #fff);
  box-shadow: 0 22px 48px rgba(0,45,76,.17);
}

.drink-button:active {
  transform: scale(.985) translateY(1px);
}

.drink-count {
  position: relative;
  z-index: 1;
  justify-self: end;
  min-width: 42px;
  min-height: 30px;
  display: grid;
  place-items: center;
  border-radius: 999px;
  background: color-mix(in srgb, var(--drink) 12%, #fff);
  color: color-mix(in srgb, var(--drink) 72%, var(--ink));
  font-size: 14px;
  font-weight: 950;
}

.drink-art {
  position: relative;
  z-index: 1;
  align-self: center;
  justify-self: center;
  display: grid;
  place-items: center;
  width: min(74%, 180px);
  height: 100%;
  max-height: 152px;
  aspect-ratio: 1;
}

.drink-orbit {
  position: absolute;
  inset: 8%;
  border: 2px solid color-mix(in srgb, var(--drink) 25%, transparent);
  border-radius: 50%;
}

.drink-orbit::before,
.drink-orbit::after {
  content: "";
  position: absolute;
  border-radius: 999px;
  background: color-mix(in srgb, var(--drink) 17%, transparent);
}

.drink-orbit::before {
  width: 62%;
  height: 9px;
  left: 19%;
  top: 34%;
}

.drink-orbit::after {
  width: 40%;
  height: 9px;
  left: 30%;
  top: 50%;
}

.drink-icon {
  position: relative;
  z-index: 1;
  width: clamp(64px, 10svh, 102px);
  height: clamp(64px, 10svh, 102px);
  display: grid;
  place-items: center;
  border-radius: 8px;
  background: linear-gradient(145deg, color-mix(in srgb, var(--drink) 84%, #fff), var(--drink));
  color: #fff;
  font-size: clamp(22px, 4svh, 34px);
  font-weight: 950;
  box-shadow: 0 16px 34px color-mix(in srgb, var(--drink) 28%, transparent);
}

.drink-copy {
  position: relative;
  z-index: 1;
  display: grid;
  gap: 4px;
  min-width: 0;
}

.drink-label {
  color: color-mix(in srgb, var(--drink) 72%, var(--ink));
  font-size: clamp(15px, 2.35svh, 22px);
  line-height: 1.05;
  font-weight: 950;
  letter-spacing: 0;
  text-transform: uppercase;
  overflow-wrap: anywhere;
}

.drink-subtitle {
  color: var(--muted);
  font-size: clamp(10px, 1.55svh, 12px);
  font-weight: 800;
  text-transform: uppercase;
}

.tap-burst {
  position: absolute;
  z-index: 5;
  right: 16px;
  top: 42px;
  color: var(--drink);
  font-size: clamp(22px, 4svh, 34px);
  font-weight: 950;
  pointer-events: none;
  animation: tapBurst .62s ease-out forwards;
}

@keyframes tapBurst {
  0% { opacity: 0; transform: translateY(10px) scale(.82); }
  18% { opacity: 1; }
  100% { opacity: 0; transform: translateY(-34px) scale(1.12); }
}

.error-panel, .toast {
  border-radius: 8px;
  padding: 12px;
}

.error-panel {
  position: fixed;
  left: 50%;
  bottom: 10px;
  z-index: 20;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 10px;
  width: min(680px, calc(100% - 24px));
  background: #fff4f2;
  color: var(--bad);
  border: 1px solid #f0b8ae;
  box-shadow: 0 18px 42px rgba(180,35,24,.14);
}

.error-panel span { flex: 1; font-weight: 800; }

.toast {
  position: fixed;
  left: 50%;
  bottom: 18px;
  z-index: 30;
  transform: translateX(-50%);
  min-width: min(420px, calc(100% - 24px));
  color: var(--ink);
  background: rgba(255,255,255,.96);
  border: 1px solid rgba(0,83,138,.1);
  box-shadow: 0 18px 42px rgba(0,45,76,.18);
  font-weight: 850;
  text-align: center;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 80;
  display: grid;
  place-items: center;
  padding: 24px;
  background: rgba(5, 9, 11, .46);
  backdrop-filter: blur(8px);
}

.floor-modal {
  width: min(560px, 100%);
  border-radius: 8px;
  padding: clamp(22px, 4svh, 34px);
  background: linear-gradient(135deg, #ffffff, #f8fbfd);
  border: 1px solid rgba(255,255,255,.74);
  box-shadow: 0 28px 70px rgba(5,9,11,.34);
}

.modal-kicker {
  display: inline-flex;
  min-height: 30px;
  align-items: center;
  padding: 0 10px;
  border-radius: 999px;
  background: rgba(0,83,138,.1);
  color: var(--munich);
  font-size: 13px;
  font-weight: 950;
  text-transform: uppercase;
}

.floor-modal h2 {
  margin: 14px 0 8px;
  font-size: clamp(28px, 5svh, 40px);
  line-height: 1;
}

.floor-modal p {
  margin: 0;
  color: var(--muted);
  font-size: clamp(17px, 2.7svh, 21px);
  font-weight: 750;
}

.floor-modal p strong { color: var(--ink); }

.floor-modal-current {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin: 22px 0;
  padding: 16px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.72);
}

.floor-modal-current span {
  color: var(--muted);
  font-weight: 850;
}

.floor-modal-current strong {
  font-size: clamp(22px, 4svh, 30px);
}

.modal-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.modal-actions button {
  min-height: clamp(52px, 9svh, 68px);
  border-radius: 8px;
  border: 0;
  font-weight: 950;
  font-size: clamp(17px, 2.7svh, 21px);
}

.modal-secondary {
  background: #fff;
  color: var(--ink);
  border: 1px solid var(--line) !important;
}

.modal-primary {
  background: var(--munich);
  color: #fff;
  box-shadow: 0 14px 30px rgba(0,83,138,.24);
}

@media (orientation: portrait) {
  body::before {
    content: "Rotate tablet to landscape";
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: grid;
    place-items: center;
    padding: 32px;
    background: var(--munich);
    color: #fff;
    font-size: 28px;
    font-weight: 950;
    text-align: center;
  }
}

@media (max-width: 980px) {
  .topbar {
    grid-template-columns: 1fr auto;
  }
  .service-title {
    display: none;
  }
  .tally-view {
    grid-template-columns: minmax(270px, 310px) minmax(0, 1fr);
  }
  .drink-grid {
    gap: 10px;
  }
}

@media (max-width: 760px) {
  .just-eat-logo {
    display: none;
  }
  .tally-view {
    grid-template-columns: minmax(235px, 285px) minmax(0, 1fr);
  }
  .drink-label {
    font-size: clamp(13px, 2.1svh, 18px);
  }
}
</style>
