<style>
  :root {
    --accent: #3d21bf;
    --accent-dark: #241176;
    --ink: #221874;
    --muted: #5f5a82;
    --paper: #f4f4f2;
    --surface: #ffffff;
    --line: #d9d7e3;
    --mint: #75efb8;
    --cyan: #34e6e1;
    --warning: #fff0cc;
    --error: #9e3434;
    --radius: 2px;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; color: var(--ink); background: var(--paper); font-family: "Trebuchet MS", Arial, Helvetica, sans-serif; line-height: 1.5; }
  button, input, textarea, select { font: inherit; }
  button { cursor: pointer; }
  .site-header { display: flex; align-items: center; justify-content: space-between; min-height: 78px; padding: 16px clamp(22px, 5vw, 76px); border-bottom: 1px solid rgba(255,255,255,.3); color: #fff; background: linear-gradient(105deg, var(--accent-dark), var(--accent)); }
  .brand { display: flex; gap: 16px; align-items: center; min-height: 44px; color: inherit; text-decoration: none; }
  .logo-slot { display: flex; align-items: center; justify-content: flex-start; min-width: 92px; min-height: 42px; }
  .logo-slot-site { min-width: 122px; }
  .brand-logo { display: block; max-width: 126px; max-height: 42px; width: auto; height: auto; object-fit: contain; object-position: left center; }
  .site-brand-logo { max-width: 146px; }
  .brand-divider { align-self: stretch; width: 1px; min-height: 34px; background: rgba(255,255,255,.55); }
  .brand-mark { font-weight: 900; letter-spacing: -.06em; font-size: 29px; line-height: 1; }
  .brand-place { font-size: 13px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; line-height: 1.15; }
  .link-button { border: 0; color: inherit; background: transparent; text-decoration: underline; text-underline-offset: 4px; }
  .hero { position: relative; overflow: hidden; min-height: 390px; display: grid; grid-template-columns: minmax(0, 1fr) 260px; align-items: end; gap: 40px; padding: 74px clamp(22px, 7vw, 108px) 82px; color: #fff; background: linear-gradient(115deg, #26107e 0 60%, #4f35cf 60%); }
  .hero::after { content: ""; position: absolute; right: -90px; top: -80px; width: 420px; height: 560px; border-left: 7px solid var(--cyan); background: rgba(117,239,184,.14); transform: skewX(-16deg); pointer-events: none; }
  .hero h1 { position: relative; z-index: 1; max-width: 900px; margin: 8px 0 22px; font-family: inherit; font-size: clamp(46px, 6.5vw, 88px); font-weight: 900; letter-spacing: -.055em; line-height: .92; }
  .hero-copy { max-width: 580px; margin: 0; font-size: clamp(17px, 2vw, 22px); color: rgba(255,255,255,.78); }
  .eyebrow { margin: 0 0 9px; font-size: 11px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; }
  .hero-note { align-self: end; border-top: 1px solid rgba(255,255,255,.5); }
  .note-number { display: block; margin-top: 12px; font-size: 11px; opacity: .65; }
  .hero-note p { margin-bottom: 0; font-size: 14px; }
  .app-shell { display: grid; grid-template-columns: 170px minmax(0, 1fr) 310px; max-width: 1440px; margin: 0 auto; padding: 68px clamp(20px, 4vw, 64px) 96px; gap: clamp(24px, 4vw, 64px); }
  .stepper { position: sticky; top: 24px; align-self: start; display: grid; gap: 2px; }
  .step { display: flex; gap: 12px; align-items: center; padding: 12px 0; border: 0; text-align: left; color: #888177; background: transparent; }
  .step span { font-size: 10px; letter-spacing: .12em; }
  .step.active { color: var(--accent); font-weight: 700; }
  .step.complete { color: var(--ink); }
  .form-panel { min-width: 0; }
  .form-step { display: none; }
  .form-step.active { display: block; animation: enter .24s ease both; }
  @keyframes enter { from { opacity: 0; transform: translateY(8px); } }
  .section-heading { margin-bottom: 38px; }
  .section-heading h2, .confirmation h2 { margin: 0 0 10px; font-family: inherit; font-size: clamp(34px, 5vw, 54px); font-weight: 900; letter-spacing: -.045em; line-height: 1; text-transform: uppercase; }
  .section-heading > p:last-child { max-width: 580px; color: var(--muted); }
  .choice-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
  .occasion-card { min-height: 124px; padding: 22px; border: 1px solid var(--line); color: var(--ink); background: rgba(255,255,255,.35); text-align: left; transition: .18s ease; }
  .occasion-card:hover, .occasion-card.selected { border-color: var(--accent); background: var(--surface); transform: translateY(-2px); }
  .occasion-card strong { display: block; margin-bottom: 20px; font-size: 22px; font-weight: 800; }
  .occasion-card span { font-size: 12px; color: var(--muted); }
  .guidance { margin-top: 22px; padding: 15px 18px; border-left: 4px solid var(--cyan); background: #e7fbfa; font-size: 13px; }
  .guidance:empty { display: none; }
  .guidance.warning { border-color: #b17b20; background: var(--warning); }
  .field-grid, .dietary-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 22px; }
  .dietary-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); margin: 26px 0; }
  .field { display: grid; gap: 8px; color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: .04em; }
  .field.full { grid-column: 1 / -1; margin-top: 22px; }
  .field input, .field textarea, .field select, .search-box input { width: 100%; border: 0; border-bottom: 1px solid #aaa399; border-radius: 0; padding: 12px 2px; color: var(--ink); background: transparent; outline: none; font-weight: 400; letter-spacing: 0; }
  .field input:focus, .field textarea:focus, .field select:focus, .search-box input:focus { border-color: var(--accent); box-shadow: 0 1px 0 var(--accent); }
  .field.invalid input, .field.invalid textarea { border-color: var(--error); }
  .menu-heading { display: flex; align-items: end; justify-content: space-between; gap: 28px; }
  .search-box { width: 220px; color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
  .category-tabs { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 24px; padding-bottom: 8px; scrollbar-width: thin; }
  .category-tab { flex: 0 0 auto; padding: 9px 13px; border: 1px solid var(--line); background: transparent; color: var(--muted); font-size: 12px; }
  .category-tab.active { border-color: var(--accent); color: #fff; background: var(--accent); }
  .menu-list { display: grid; gap: 12px; }
  .menu-card { display: grid; grid-template-columns: minmax(0, 1fr) 150px; gap: 20px; padding: 22px; border: 1px solid var(--line); background: rgba(255,255,255,.35); }
  .menu-card.selected { border-color: var(--accent); background: var(--surface); }
  .menu-card h3 { margin: 0 0 5px; font-size: 21px; font-weight: 800; }
  .menu-card p { margin: 6px 0; color: var(--muted); font-size: 13px; }
  .menu-price { color: var(--accent) !important; font-weight: 700; }
  .quantity-control { display: grid; grid-template-columns: 36px 1fr 36px; align-items: center; align-self: start; border: 1px solid var(--line); }
  .quantity-control button { height: 38px; border: 0; background: transparent; color: var(--accent); font-size: 20px; }
  .quantity-control input { min-width: 0; width: 100%; border: 0; text-align: center; background: transparent; -moz-appearance: textfield; }
  .quantity-control input::-webkit-inner-spin-button { appearance: none; }
  .line-total { grid-column: 2; text-align: right; font-weight: 700; }
  .item-options { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; padding-top: 4px; }
  .item-options .field.full { margin: 0; }
  .switch-row, .check-row { display: flex; gap: 12px; align-items: flex-start; padding: 14px 0; }
  .switch-row { border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  .check-row input { margin-top: 4px; accent-color: var(--accent); }
  .warning-check { margin: 8px 0; color: #744d0b; }
  .review-block { margin-bottom: 26px; padding-bottom: 24px; border-bottom: 1px solid var(--line); }
  .review-block h3 { margin: 0 0 12px; font-size: 24px; font-weight: 800; text-transform: uppercase; }
  .review-row { display: flex; justify-content: space-between; gap: 24px; padding: 7px 0; }
  .review-row span { color: var(--muted); }
  .acknowledgements { margin-top: 28px; padding: 12px 18px; background: var(--surface); border: 1px solid var(--line); }
  .form-actions { display: flex; justify-content: space-between; gap: 12px; margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--line); }
  .primary-button, .secondary-button { min-width: 140px; padding: 14px 22px; border: 1px solid var(--accent); }
  .primary-button { color: var(--accent-dark); background: var(--mint); border-color: var(--mint); font-weight: 800; }
  .primary-button:hover { color: #fff; background: var(--accent-dark); border-color: var(--accent-dark); }
  .primary-button:disabled { opacity: .55; cursor: wait; }
  .secondary-button { color: var(--accent); background: transparent; }
  .summary-panel { position: sticky; top: 24px; align-self: start; padding: 26px; color: #fff; background: var(--accent); }
  .summary-meta { padding: 16px 0 20px; border-bottom: 1px solid rgba(255,255,255,.25); color: rgba(255,255,255,.75); font-size: 13px; }
  .summary-items { max-height: 330px; overflow: auto; }
  .summary-item { display: grid; grid-template-columns: 1fr auto; gap: 8px; padding: 13px 0; border-bottom: 1px solid rgba(255,255,255,.18); font-size: 13px; }
  .summary-item small { display: block; opacity: .65; }
  .summary-total { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; padding-top: 24px; }
  .summary-total strong { font-size: 30px; font-weight: 800; }
  .fine-print { margin: 14px 0 0; color: rgba(255,255,255,.65); font-size: 11px; line-height: 1.5; }
  .message { margin-bottom: 22px; padding: 14px 16px; border-left: 3px solid var(--error); color: #6e2222; background: #f8dddd; }
  .confirmation { padding: 36px; background: var(--surface); border: 1px solid var(--line); }
  .confirmation .primary-button { margin-top: 18px; }
  @media (max-width: 1080px) {
    .app-shell { grid-template-columns: 130px minmax(0, 1fr); }
    .summary-panel { position: fixed; z-index: 5; left: 16px; right: 16px; bottom: 14px; top: auto; display: grid; grid-template-columns: 1fr auto; align-items: center; padding: 14px 18px; box-shadow: 0 10px 40px rgba(0,0,0,.25); }
    .summary-panel .eyebrow, .summary-items, .fine-print { display: none; }
    .summary-meta { padding: 0; border: 0; }
    .summary-total { padding: 0; }
    .form-actions { margin-bottom: 90px; }
  }
  @media (max-width: 720px) {
    .site-header { min-height: 64px; }
    .logo-slot { min-width: 68px; }
    .logo-slot-site { min-width: 88px; }
    .brand-logo { max-width: 92px; max-height: 34px; }
    .site-brand-logo { max-width: 104px; }
    .brand-place { font-size: 10px; }
    .hero { min-height: 340px; grid-template-columns: 1fr; padding-top: 56px; }
    .hero h1 { font-size: 52px; }
    .hero-note { display: none; }
    .app-shell { display: block; padding-top: 30px; }
    .stepper { position: static; display: flex; overflow-x: auto; margin-bottom: 34px; }
    .step { flex: 0 0 auto; padding-right: 16px; }
    .step { font-size: 0; }
    .step span { font-size: 11px; }
    .choice-grid, .field-grid, .dietary-grid { grid-template-columns: 1fr; }
    .field.full { grid-column: auto; }
    .menu-heading { display: block; }
    .search-box { display: block; width: 100%; margin-top: 22px; }
    .menu-card { grid-template-columns: 1fr; }
    .line-total { grid-column: 1; text-align: left; }
    .item-options { grid-template-columns: 1fr; }
  }

  /* Modern hospitality polish */
  :root {
    --radius: 18px;
    --radius-small: 12px;
    --shadow-soft: 0 12px 40px rgba(34, 24, 116, .08);
    --shadow-card: 0 8px 24px rgba(34, 24, 116, .08), 0 2px 6px rgba(34, 24, 116, .04);
    --shadow-hover: 0 20px 42px rgba(34, 24, 116, .14), 0 4px 12px rgba(34, 24, 116, .06);
    --ease-out: cubic-bezier(.22, 1, .36, 1);
  }

  html { background: var(--paper); }
  body {
    min-height: 100vh;
    font-family: "Aptos", "Segoe UI", Arial, sans-serif;
    background:
      radial-gradient(circle at 4% 38%, rgba(52, 230, 225, .08), transparent 24rem),
      radial-gradient(circle at 96% 72%, rgba(117, 239, 184, .10), transparent 26rem),
      var(--paper);
    -webkit-font-smoothing: antialiased;
  }
  body.page-ready > * { animation: pageReveal .65s var(--ease-out) both; }
  ::selection { color: #fff; background: var(--accent); }
  :focus-visible { outline: 3px solid rgba(52, 230, 225, .7); outline-offset: 3px; }

  .site-header {
    position: relative;
    z-index: 20;
    min-height: 86px;
    border-bottom: 1px solid rgba(255, 255, 255, .13);
    box-shadow: 0 8px 28px rgba(25, 10, 88, .18);
  }
  .brand { transition: transform .25s var(--ease-out), opacity .25s ease; }
  .brand:hover { transform: translateY(-1px); opacity: .92; }
  .brand-logo { filter: drop-shadow(0 3px 5px rgba(0, 0, 0, .12)); }
  .link-button {
    position: relative;
    padding: 9px 13px;
    border-radius: 999px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    transition: background .2s ease, transform .2s var(--ease-out);
  }
  .link-button:hover { background: rgba(255, 255, 255, .12); transform: translateY(-1px); }

  .hero {
    min-height: 315px;
    isolation: isolate;
    grid-template-columns: minmax(0, 760px) auto;
    align-items: center;
    padding-top: 58px;
    padding-bottom: 60px;
    background: linear-gradient(135deg, #271080 0%, var(--accent) 72%, #593ee0 100%);
    box-shadow: inset 0 -1px rgba(255, 255, 255, .12);
  }
  .hero::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: -1;
    opacity: .08;
    background-image: linear-gradient(120deg, transparent 0 62%, rgba(255,255,255,.9) 62% 62.2%, transparent 62.2%);
  }
  .hero::after { display: none; }
  .hero > div { position: relative; z-index: 2; }
  .hero h1 {
    max-width: 720px;
    margin: 7px 0 16px;
    font-family: "Aptos Display", "Segoe UI", Arial, sans-serif;
    font-size: clamp(42px, 5vw, 68px);
    font-weight: 700;
    letter-spacing: -.045em;
    line-height: .98;
    text-wrap: balance;
    animation: heroCopy .55s .06s var(--ease-out) both;
  }
  .hero-copy { max-width: 590px; margin: 0; font-size: 18px; font-weight: 400; line-height: 1.55; animation: heroCopy .55s .12s var(--ease-out) both; }
  .hero .eyebrow { animation: heroCopy .55s both; }
  .hero-guide {
    display: flex;
    align-items: center;
    gap: 13px;
    justify-self: end;
    padding: 13px 17px;
    border: 1px solid rgba(255,255,255,.22);
    border-radius: 999px;
    background: rgba(255,255,255,.09);
    color: rgba(255,255,255,.88);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .09em;
    text-transform: uppercase;
  }
  .hero-guide i { width: 19px; height: 1px; background: rgba(255,255,255,.42); }

  .app-shell { position: relative; padding-top: 76px; }
  .form-panel {
    padding: clamp(25px, 4vw, 46px);
    border: 1px solid rgba(255,255,255,.76);
    border-radius: 24px;
    background: rgba(255,255,255,.62);
    box-shadow: var(--shadow-soft);
    backdrop-filter: blur(18px);
  }

  .stepper { gap: 5px; }
  .step {
    position: relative;
    min-height: 46px;
    padding: 9px 13px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    transition: color .2s ease, background .2s ease, transform .2s var(--ease-out);
  }
  .step::before {
    content: "";
    position: absolute;
    left: 0;
    width: 3px;
    height: 0;
    border-radius: 5px;
    background: var(--accent);
    transition: height .25s var(--ease-out);
  }
  .step:hover { color: var(--accent); background: rgba(255,255,255,.6); transform: translateX(3px); }
  .step.active { color: var(--accent); background: #fff; box-shadow: var(--shadow-card); }
  .step.active::before { height: 24px; }
  .step.complete span {
    display: grid;
    place-items: center;
    width: 23px;
    height: 23px;
    border-radius: 50%;
    color: var(--accent-dark);
    background: var(--mint);
  }

  .form-step.active { animation: stepEnter .45s var(--ease-out) both; }
  .section-heading { margin-bottom: 42px; }
  .section-heading h2, .confirmation h2 {
    font-family: "Aptos Display", "Segoe UI", Arial, sans-serif;
    font-weight: 700;
    letter-spacing: -.04em;
    text-transform: none;
    text-wrap: balance;
  }
  .section-heading .eyebrow { color: var(--accent); }
  .eyebrow { font-weight: 700; }

  .choice-grid { gap: 16px; }
  .occasion-card {
    position: relative;
    overflow: hidden;
    min-height: 148px;
    padding: 25px;
    border-color: rgba(34, 24, 116, .10);
    border-radius: var(--radius);
    background: rgba(255,255,255,.78);
    box-shadow: var(--shadow-card);
    transition: border-color .25s ease, box-shadow .3s var(--ease-out), transform .3s var(--ease-out), background .25s ease;
  }
  .occasion-card::before {
    content: "";
    position: absolute;
    right: -26px;
    top: -30px;
    width: 92px;
    height: 92px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(52,230,225,.18), rgba(117,239,184,.28));
    transition: transform .4s var(--ease-out);
  }
  .occasion-card::after {
    content: "→";
    position: absolute;
    right: 22px;
    bottom: 19px;
    color: var(--accent);
    font-size: 21px;
    opacity: 0;
    transform: translateX(-8px);
    transition: opacity .25s ease, transform .25s var(--ease-out);
  }
  .occasion-card:hover, .occasion-card.selected {
    border-color: rgba(61, 33, 191, .46);
    background: #fff;
    box-shadow: var(--shadow-hover);
    transform: translateY(-5px);
  }
  .occasion-card:hover::before, .occasion-card.selected::before { transform: scale(1.28); }
  .occasion-card:hover::after, .occasion-card.selected::after { opacity: 1; transform: none; }
  .occasion-card.selected { box-shadow: 0 0 0 2px var(--accent), var(--shadow-hover); }
  .occasion-card.selected::after { content: "✓"; }
  .occasion-card strong { position: relative; z-index: 1; font-family: "Aptos Display", "Segoe UI", Arial, sans-serif; font-size: 23px; }

  .guidance {
    border: 0;
    border-radius: var(--radius-small);
    box-shadow: inset 4px 0 var(--cyan);
    animation: noticeEnter .32s var(--ease-out) both;
  }
  .guidance.warning { box-shadow: inset 4px 0 #d8961f; }

  .field { position: relative; gap: 7px; }
  .field > span, .search-box > span { color: var(--ink); font-weight: 600; }
  .field input, .field textarea, .field select, .search-box input {
    min-height: 49px;
    padding: 12px 14px;
    border: 1px solid rgba(34, 24, 116, .13);
    border-radius: 12px;
    background: rgba(255,255,255,.78);
    box-shadow: inset 0 1px 2px rgba(34,24,116,.025);
    transition: border-color .2s ease, box-shadow .2s ease, background .2s ease, transform .2s ease;
  }
  .field textarea { min-height: 104px; resize: vertical; }
  .field input:hover, .field textarea:hover, .field select:hover, .search-box input:hover { border-color: rgba(61,33,191,.32); background: #fff; }
  .field input:focus, .field textarea:focus, .field select:focus, .search-box input:focus {
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(61,33,191,.10), 0 8px 20px rgba(34,24,116,.06);
    transform: translateY(-1px);
  }
  .field.invalid input, .field.invalid textarea { border-color: var(--error); box-shadow: 0 0 0 4px rgba(158,52,52,.10); animation: shake .36s ease; }

  .category-tabs { gap: 9px; padding: 3px 2px 13px; }
  .category-tab {
    padding: 10px 16px;
    border-color: rgba(34,24,116,.12);
    border-radius: 999px;
    background: rgba(255,255,255,.68);
    font-weight: 600;
    transition: transform .2s var(--ease-out), box-shadow .2s ease, color .2s ease, background .2s ease;
  }
  .category-tab:hover { color: var(--accent); background: #fff; box-shadow: 0 5px 14px rgba(34,24,116,.08); transform: translateY(-2px); }
  .category-tab.active { border-color: var(--accent); box-shadow: 0 7px 18px rgba(61,33,191,.22); }

  .menu-list { gap: 15px; }
  .menu-card {
    position: relative;
    border-color: rgba(34,24,116,.10);
    border-radius: var(--radius);
    background: rgba(255,255,255,.78);
    box-shadow: var(--shadow-card);
    transition: border-color .25s ease, box-shadow .3s var(--ease-out), transform .3s var(--ease-out);
    animation: cardEnter .42s var(--ease-out) both;
  }
  .menu-card:hover { border-color: rgba(61,33,191,.28); box-shadow: var(--shadow-hover); transform: translateY(-3px); }
  .menu-card.selected { border-color: rgba(61,33,191,.52); box-shadow: 0 0 0 2px rgba(61,33,191,.72), var(--shadow-hover); }
  .menu-card.selected::before {
    content: "Selected";
    position: absolute;
    right: 18px;
    top: -10px;
    padding: 4px 10px;
    border-radius: 999px;
    color: var(--accent-dark);
    background: var(--mint);
    box-shadow: 0 4px 12px rgba(34,24,116,.12);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .menu-card h3 { font-family: "Aptos Display", "Segoe UI", Arial, sans-serif; font-size: 22px; }
  .menu-price { display: inline-flex; padding: 5px 9px; border-radius: 8px; background: rgba(61,33,191,.07); }
  .quantity-control {
    overflow: hidden;
    border-color: rgba(61,33,191,.18);
