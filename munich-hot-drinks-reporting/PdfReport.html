<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @page { size: A4 landscape; margin: 12mm; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: #05090B;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      font-size: 10.5px;
    }
    .cover {
      min-height: 183mm;
      position: relative;
      overflow: hidden;
      padding: 18mm;
      color: #fff;
      background: linear-gradient(122deg, #00538A 0%, #08689f 58%, #ffffff 58.2%, #ffffff 100%);
      border: 1px solid #d9e4eb;
    }
    .cover:after {
      content: "";
      position: absolute;
      right: 74mm;
      bottom: -34mm;
      width: 118mm;
      height: 118mm;
      border: 17mm solid rgba(255,255,255,.14);
      border-radius: 50%;
    }
    .cover-logos {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14mm;
    }
    .munich-logo {
      background: rgba(255,255,255,.96);
      padding: 5mm 6mm;
      border-radius: 3mm;
      border: 1px solid rgba(255,255,255,.65);
    }
    .munich-logo svg { width: 58mm; height: auto; }
    .partner-logos {
      display: flex;
      align-items: center;
      gap: 6mm;
      background: rgba(255,255,255,.94);
      padding: 5mm 6mm;
      border-radius: 3mm;
      border: 1px solid #d9e4eb;
    }
    .fika-logo svg { width: 27mm; height: auto; }
    .bloom-logo svg { width: 23mm; height: auto; }
    .just-eat-logo svg { width: 29mm; height: auto; }
    .cover-title {
      position: relative;
      z-index: 1;
      margin-top: 25mm;
      width: 54%;
    }
    .strapline {
      display: inline-block;
      padding: 2mm 3mm;
      background: rgba(255,255,255,.13);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 99mm;
      text-transform: uppercase;
      letter-spacing: 1.1px;
      font-size: 8.5px;
      font-weight: 700;
    }
    h1 {
      margin: 6mm 0 4mm;
      font-size: 34px;
      line-height: 1.02;
      letter-spacing: -.4px;
    }
    .period {
      font-size: 17px;
      font-weight: 700;
      color: rgba(255,255,255,.86);
    }
    .cover-meta {
      position: absolute;
      z-index: 2;
      right: 18mm;
      bottom: 16mm;
      width: 86mm;
      display: grid;
      gap: 3mm;
    }
    .meta-card {
      background: #fff;
      border: 1px solid #d9e4eb;
      border-left: 4px solid #00538A;
      padding: 4mm;
      border-radius: 3mm;
      color: #05090B;
    }
    .meta-card span {
      display: block;
      color: #667481;
      font-size: 8px;
      text-transform: uppercase;
      font-weight: 700;
    }
    .meta-card strong {
      display: block;
      margin-top: 1mm;
      font-size: 12.5px;
    }
    .page {
      page-break-before: always;
      padding: 0;
    }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5mm 6mm;
      margin-bottom: 5mm;
      color: #fff;
      background: linear-gradient(120deg, #00538A, #08689f);
      border-radius: 3mm;
    }
    .page-header h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -.2px;
    }
    .page-header span {
      display: block;
      margin-top: 1mm;
      color: rgba(255,255,255,.78);
      font-weight: 700;
    }
    .small-munich {
      background: #fff;
      border-radius: 2mm;
      padding: 3mm 4mm;
    }
    .small-munich svg { width: 34mm; height: auto; }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 3mm;
      margin-bottom: 5mm;
    }
    .kpi {
      min-height: 25mm;
      border: 1px solid #d9e4eb;
      border-top: 4px solid #00538A;
      border-radius: 3mm;
      padding: 4mm;
      background: linear-gradient(180deg, #fff, #f7fbfd);
    }
    .kpi:nth-child(3),
    .kpi:nth-child(4) { border-top-color: #ff8000; }
    .kpi:nth-child(5),
    .kpi:nth-child(6) { border-top-color: #167a62; }
    .kpi span {
      display: block;
      color: #667481;
      font-size: 7.8px;
      text-transform: uppercase;
      font-weight: 700;
    }
    .kpi strong {
      display: block;
      margin-top: 2.4mm;
      font-size: 20px;
      color: #00538A;
      line-height: 1;
    }
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4mm;
    }
    .panel {
      border: 1px solid #d9e4eb;
      border-radius: 3mm;
      padding: 4mm;
      min-height: 50mm;
      background: #fff;
    }
    .panel.wide { grid-column: 1 / -1; }
    .panel h3 {
      margin: 0 0 4mm;
      font-size: 14px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 3mm;
      align-items: center;
      margin-bottom: 3mm;
      font-weight: 700;
    }
    .row strong { color: #00538A; }
    .track {
      grid-column: 1 / -1;
      height: 3.2mm;
      background: #eaf3f8;
      border-radius: 99mm;
      overflow: hidden;
    }
    .fill {
      height: 3.2mm;
      border-radius: inherit;
      background: linear-gradient(90deg, #00538A, #52a4cd);
    }
    .trend {
      height: 49mm;
      display: flex;
      align-items: end;
      gap: 2mm;
      border-bottom: 1px solid #d9e4eb;
      padding: 8mm 1mm 8mm;
    }
    .bar {
      position: relative;
      flex: 1;
      min-width: 3mm;
      background: linear-gradient(180deg, #0b70a8, #00538A);
      border-radius: 1.6mm 1.6mm 0 0;
    }
    .bar span {
      position: absolute;
      top: -5.5mm;
      left: 50%;
      transform: translateX(-50%);
      font-size: 7px;
      font-weight: 700;
    }
    .bar small {
      position: absolute;
      bottom: -6mm;
      left: 50%;
      transform: translateX(-50%);
      color: #667481;
      font-size: 6.4px;
      white-space: nowrap;
      font-weight: 700;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 1.4mm;
      font-size: 8px;
    }
    th, td {
      border: 0;
      border-radius: 2mm;
      padding: 2.4mm;
      text-align: center;
    }
    th {
      background: #eaf3f8;
      color: #003a61;
      font-weight: 700;
    }
    .heat {
      background: rgba(0,83,138,var(--heat));
      color: #03283d;
      font-weight: 800;
    }
    .notes {
      margin-top: 4mm;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3mm;
    }
    .note {
      background: #f7fbfd;
      border: 1px solid #d9e4eb;
      border-left: 4px solid #00538A;
      border-radius: 2.5mm;
      padding: 3mm;
    }
    .note span {
      display: block;
      color: #667481;
      text-transform: uppercase;
      font-size: 7.2px;
      font-weight: 700;
    }
    .note strong {
      display: block;
      margin-top: 1mm;
      font-size: 11px;
      color: #00538A;
    }
  </style>
</head>
<body>
  <section class="cover">
    <div class="cover-logos">
      <div class="munich-logo"><?!= report.logos.munichRe ?></div>
      <div class="partner-logos">
        <span class="fika-logo"><?!= report.logos.fika ?></span>
        <span class="bloom-logo"><?!= report.logos.bloom ?></span>
        <span class="just-eat-logo"><?!= report.logos.justEat ?></span>
      </div>
    </div>
    <div class="cover-title">
      <div class="strapline"><?= report.strapline ?></div>
      <h1><?= report.title ?></h1>
      <div class="period"><?= report.period ?></div>
    </div>
    <div class="cover-meta">
      <div class="meta-card"><span>Prepared</span><strong><?= report.generatedAt ?></strong></div>
      <div class="meta-card"><span>Scope</span><strong><?= report.filters.floor ?> / <?= report.filters.drink ?></strong></div>
      <div class="meta-card"><span>Data handling</span><strong>Bank holidays <?= report.filters.bankHolidays ?> &middot; Closed periods <?= report.filters.closedPeriods ?></strong></div>
    </div>
  </section>

  <section class="page">
    <header class="page-header">
      <div>
        <h2>Executive summary</h2>
        <span><?= report.period ?></span>
      </div>
      <div class="small-munich"><?!= report.logos.munichRe ?></div>
    </header>

    <div class="kpi-grid">
      <? for (var i = 0; i < report.kpis.length; i++) { ?>
        <div class="kpi"><span><?= report.kpis[i].label ?></span><strong><?= report.kpis[i].value ?></strong></div>
      <? } ?>
    </div>

    <div class="content-grid">
      <article class="panel">
        <h3>Drink mix</h3>
        <? for (var d = 0; d < report.drinkRows.length; d++) { var drink = report.drinkRows[d]; ?>
          <div class="row">
            <span><?= drink.label ?></span><strong><?= drink.value ?> &middot; <?= drink.percent ?>%</strong>
            <div class="track"><div class="fill" style="width:<?= drink.width ?>%"></div></div>
          </div>
        <? } ?>
      </article>
      <article class="panel">
        <h3>Floor comparison</h3>
        <? for (var f = 0; f < report.floorRows.length; f++) { var floor = report.floorRows[f]; ?>
          <div class="row">
            <span><?= floor.label ?></span><strong><?= floor.value ?> &middot; <?= floor.percent ?>%</strong>
            <div class="track"><div class="fill" style="width:<?= floor.width ?>%"></div></div>
          </div>
        <? } ?>
      </article>
      <article class="panel">
        <h3>Weekday profile</h3>
        <? for (var w = 0; w < report.weekdayRows.length; w++) { var weekday = report.weekdayRows[w]; ?>
          <div class="row">
            <span><?= weekday.label ?></span><strong><?= weekday.value ?></strong>
            <div class="track"><div class="fill" style="width:<?= weekday.width ?>%"></div></div>
          </div>
        <? } ?>
      </article>
      <article class="panel wide">
        <h3>Trend over time</h3>
        <div class="trend">
          <? for (var t = 0; t < report.trendRows.length; t++) { var trend = report.trendRows[t]; ?>
            <div class="bar" style="height:<?= trend.height ?>%"><span><?= trend.total ?></span><small><?= trend.date ?></small></div>
          <? } ?>
        </div>
      </article>
    </div>

    <div class="notes">
      <div class="note"><span>Active days</span><strong><?= report.activeDays ?></strong></div>
      <div class="note"><span>Quietest hour</span><strong><?= report.quietestHour ?></strong></div>
      <div class="note"><span>Floor filter</span><strong><?= report.filters.floor ?></strong></div>
      <div class="note"><span>Drink filter</span><strong><?= report.filters.drink ?></strong></div>
    </div>
  </section>

  <section class="page">
    <header class="page-header">
      <div>
        <h2>Hourly heatmap</h2>
        <span>Service demand by weekday and time bucket</span>
      </div>
      <div class="small-munich"><?!= report.logos.munichRe ?></div>
    </header>
    <table>
      <thead>
        <tr>
          <th>Day</th>
          <? for (var b = 0; b < report.heatmapBuckets.length; b++) { ?>
            <th><?= report.heatmapBuckets[b] ?></th>
          <? } ?>
        </tr>
      </thead>
      <tbody>
        <? for (var dayIndex = 0; dayIndex < report.heatmapDays.length; dayIndex++) { var day = report.heatmapDays[dayIndex]; ?>
          <tr>
            <th><?= day ?></th>
            <? for (var bucketIndex = 0; bucketIndex < report.heatmapBuckets.length; bucketIndex++) {
              var bucket = report.heatmapBuckets[bucketIndex];
              var value = report.heatmap[day][bucket] || 0;
            ?>
              <td class="heat" style="--heat:<?= heatOpacity_(value, report.heatmapMax) ?>"><?= value ?></td>
            <? } ?>
          </tr>
        <? } ?>
      </tbody>
    </table>
  </section>
</body>
</html>
