<style>
:root {
  --ink: #101820;
  --muted: #64707d;
  --paper: #f5f2ec;
  --panel: #ffffff;
  --line: #ddd8cf;
  --accent: #167a62;
  --danger: #b42318;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  grid-template-columns: 248px minmax(0, 1fr);
  background: var(--paper);
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
button, input, select {
  font: inherit;
}
button {
  min-height: 40px;
  border: 0;
  border-radius: 8px;
  background: var(--ink);
  color: #fff;
  padding: 0 14px;
  font-weight: 800;
}
button[disabled] {
  opacity: .65;
}
.primary-action {
  background: #00538A;
}
.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  padding: 24px;
  background: var(--ink);
  color: #fff;
}
.brand {
  display: grid;
  gap: 6px;
  margin-bottom: 28px;
}
.brand strong {
  font-size: 22px;
}
.brand span {
  color: #d8d0c2;
}
.sidebar nav {
  display: grid;
  gap: 8px;
}
.nav-button {
  width: 100%;
  justify-content: flex-start;
  text-align: left;
  background: transparent;
  border: 1px solid rgba(255,255,255,.2);
}
.nav-button.active {
  background: #fff;
  color: var(--ink);
}
main {
  padding: 28px;
  display: grid;
  gap: 18px;
}
.view {
  display: grid;
  gap: 18px;
}
.page-header {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 16px;
}
.header-actions {
  display: flex;
  gap: 10px;
}
.page-header p {
  margin: 0 0 4px;
  color: var(--muted);
  font-weight: 800;
  text-transform: uppercase;
  font-size: 12px;
}
.page-header h1 {
  margin: 0;
  font-size: 34px;
  letter-spacing: 0;
}
.filters, .panel, .summary-grid, .danger-zone {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 16px;
}
.filters {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr)) auto;
  gap: 12px;
  align-items: end;
}
.filters label {
  display: grid;
  gap: 6px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
}
.filters .check {
  display: flex;
  align-items: center;
  min-height: 42px;
  color: var(--ink);
}
input, select {
  min-height: 42px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0 10px;
  background: #fff;
  color: var(--ink);
}
.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}
.metric {
  border-left: 4px solid var(--accent);
  padding: 10px 12px;
  background: #f9f7f3;
  border-radius: 8px;
}
.metric span {
  display: block;
  color: var(--muted);
  font-size: 12px;
  font-weight: 900;
}
.metric strong {
  display: block;
  margin-top: 4px;
  font-size: 27px;
}
.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
}
.panel.wide {
  grid-column: 1 / -1;
}
.panel h2, .danger-zone h2 {
  margin: 0 0 14px;
  font-size: 18px;
}
.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}
.heatmap {
  overflow-x: auto;
}
.heatmap table {
  width: 100%;
  min-width: 860px;
  border-collapse: collapse;
}
.heatmap th, .heatmap td {
  padding: 11px;
  border: 1px solid var(--line);
  text-align: center;
}
.heat-cell {
  background: rgba(22,122,98,var(--heat));
  font-weight: 900;
}
.trend {
  height: 220px;
  display: flex;
  align-items: end;
  gap: 8px;
  border-bottom: 1px solid var(--line);
  padding-top: 18px;
}
.bar {
  position: relative;
  flex: 1;
  min-width: 22px;
  background: #2f5f98;
  border-radius: 6px 6px 0 0;
}
.bar span {
  position: absolute;
  left: 50%;
  top: -20px;
  transform: translateX(-50%);
  font-size: 12px;
  font-weight: 800;
}
.list-chart {
  display: grid;
  gap: 12px;
}
.list-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: center;
}
.list-row span, .list-row strong {
  font-weight: 800;
}
.list-row i {
  grid-column: 1 / -1;
  display: block;
  height: 8px;
  border-radius: 999px;
  background: var(--accent);
}
.settings-editor {
  display: grid;
  gap: 8px;
}
.settings-row {
  display: grid;
  grid-template-columns: 160px 1fr 1fr 110px 2fr;
  gap: 8px;
}
.settings-actions, .danger-zone div {
  display: flex;
  gap: 10px;
}
.danger-zone {
  border-color: #f0b8ae;
  background: #fff4f2;
}
.danger-zone button {
  background: var(--danger);
}
.toast {
  position: fixed;
  right: 24px;
  bottom: 24px;
  min-width: 280px;
  max-width: 460px;
  padding: 14px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: 0 16px 34px rgba(16,24,32,.18);
}
.empty-state {
  color: var(--muted);
}
@media (max-width: 1100px) {
  body {
    grid-template-columns: 210px minmax(0, 1fr);
  }
  .filters, .summary-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .dashboard-grid {
    grid-template-columns: 1fr;
  }
}
</style>
