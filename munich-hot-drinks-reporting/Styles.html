<style>
:root {
  --munich: #00538A;
  --munich-dark: #003a61;
  --munich-soft: #eaf3f8;
  --ink: #05090b;
  --muted: #667481;
  --paper: #eef3f6;
  --panel: #ffffff;
  --line: #d9e4eb;
  --accent: #167a62;
  --orange: #ff8000;
  --violet: #4F34C7;
  --danger: #b42318;
  --shadow: 0 20px 50px rgba(0, 45, 76, .11);
}
* { box-sizing: border-box; }
[hidden] { display: none !important; }
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  grid-template-columns: 280px minmax(0, 1fr);
  background:
    linear-gradient(135deg, rgba(0,83,138,.13), transparent 36%),
    linear-gradient(180deg, #f8fbfd 0%, var(--paper) 100%);
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
button, input, select { font: inherit; }
button {
  min-height: 42px;
  border: 0;
  border-radius: 8px;
  background: var(--ink);
  color: #fff;
  padding: 0 15px;
  font-weight: 850;
  box-shadow: 0 10px 24px rgba(5,9,11,.12);
  transition: transform .16s ease, box-shadow .16s ease, filter .16s ease;
}
button:hover:not(:disabled) {
  filter: brightness(1.04);
  box-shadow: 0 13px 28px rgba(5,9,11,.16);
}
button:active:not(:disabled) {
  transform: translateY(1px) scale(.985);
}
button[disabled] {
  opacity: .72;
  cursor: wait;
}
button.is-busy {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.button-spinner, .spinner {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 2px solid currentColor;
  border-right-color: transparent;
  display: inline-block;
  animation: spin .75s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.activity-bar {
  position: sticky;
  top: 0;
  z-index: 20;
  height: 4px;
  overflow: hidden;
  border-radius: 999px;
  background: rgba(0,83,138,.1);
}
.activity-bar span {
  display: block;
  width: 42%;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--munich), var(--orange));
  animation: activity 1s ease-in-out infinite;
}
@keyframes activity {
  0% { transform: translateX(-110%); }
  100% { transform: translateX(250%); }
}
.primary-action { background: var(--munich); }
.secondary-action { background: var(--accent); }
.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  padding: 26px;
  background:
    linear-gradient(180deg, var(--munich) 0%, var(--munich-dark) 100%);
  color: #fff;
  overflow: hidden;
}
.sidebar:after {
  content: "";
  position: absolute;
  width: 210px;
  height: 210px;
  right: -84px;
  bottom: -78px;
  border: 32px solid rgba(255,255,255,.08);
  border-radius: 50%;
}
.brand {
  position: relative;
  z-index: 1;
  display: grid;
  gap: 12px;
  margin-bottom: 34px;
}
.brand-mark svg {
  display: block;
  width: 172px;
  height: auto;
}
.brand span:last-child {
  color: rgba(255,255,255,.78);
  font-weight: 750;
}
.sidebar nav {
  position: relative;
  z-index: 1;
  display: grid;
  gap: 10px;
}
.nav-button {
  width: 100%;
  text-align: left;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.16);
  box-shadow: none;
}
.nav-button.active {
  background: #fff;
  color: var(--munich);
}
main {
  padding: 30px;
  display: grid;
  gap: 20px;
}
.view {
  display: grid;
  gap: 20px;
}
.page-header {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 18px;
}
.hero-header {
  position: relative;
  overflow: hidden;
  min-height: 150px;
  padding: 24px;
  border-radius: 8px;
  color: #fff;
  background:
    linear-gradient(120deg, var(--munich) 0%, #08689f 58%, #ffffff 58.2%, #ffffff 100%);
  box-shadow: var(--shadow);
}
.hero-header:after {
  content: "";
  position: absolute;
  right: 124px;
  bottom: -62px;
  width: 170px;
  height: 170px;
  border: 24px solid rgba(255,255,255,.15);
  border-radius: 50%;
}
.hero-header > * {
  position: relative;
  z-index: 1;
}
.page-header p {
  margin: 0 0 4px;
  color: rgba(255,255,255,.78);
  font-weight: 850;
  text-transform: uppercase;
  font-size: 12px;
}
.page-header h1 {
  margin: 0;
  font-size: 40px;
  letter-spacing: 0;
}
.page-subtitle {
  display: block;
  margin-top: 8px;
  max-width: 560px;
  color: rgba(255,255,255,.82);
  font-weight: 650;
}
.header-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: end;
  max-width: 430px;
  padding: 8px;
  border-radius: 8px;
  background: rgba(255,255,255,.86);
  border: 1px solid rgba(255,255,255,.45);
}
.header-actions button {
  background: rgba(5,9,11,.9);
}
.header-actions .primary-action {
  background: var(--munich-dark);
}
.header-actions .secondary-action {
  background: var(--accent);
}
.filters, .panel, .summary-grid, .danger-zone, .seed-panel {
  background: rgba(255,255,255,.92);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
}
.filters {
  display: grid;
  grid-template-columns: 1.2fr repeat(4, minmax(0, 1fr)) auto;
  gap: 12px;
  align-items: end;
  padding: 16px;
}
.filters label {
  display: grid;
  gap: 6px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 850;
  text-transform: uppercase;
}
.filters .check {
  display: flex;
  align-items: center;
  min-height: 42px;
  color: var(--ink);
  text-transform: none;
}
input, select {
  min-height: 42px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0 11px;
  background: #fff;
  color: var(--ink);
  font-weight: 650;
  transition: border-color .16s ease, box-shadow .16s ease;
}
input:focus, select:focus {
  outline: none;
  border-color: var(--munich);
  box-shadow: 0 0 0 3px rgba(0,83,138,.15);
}
.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  padding: 14px;
}
.metric {

  padding: 16px;
  border-radius: 8px;
  background: linear-gradient(180deg, #fff, #f7fbfd);
  border: 1px solid var(--line);
  border-top: 5px solid var(--munich);
}
.metric span {
  display: block;
  color: var(--muted);
  font-size: 11px;
  font-weight: 900;
  text-transform: uppercase;
}
.metric strong {
  display: block;
  margin-top: 11px;
  font-size: 31px;
  line-height: 1;
  color: var(--munich);
}
.skeleton-card {
  overflow: hidden;
  position: relative;
  border-top-color: #c9dbe6;
}
.skeleton-card:before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(0,83,138,.08), transparent);
  animation: shimmer 1.1s linear infinite;
}
.skeleton-card span, .skeleton-card strong {
  display: block;
  border-radius: 999px;
  background: #dce9f0;
  color: transparent;
}
.skeleton-card span {
  width: 52%;
  height: 12px;
}
.skeleton-card strong {
  width: 38%;
  height: 30px;
}
@keyframes shimmer {
  from { transform: translateX(-100%); }
  to { transform: translateX(100%); }
}
.metric-peak, .metric-day { border-top-color: var(--orange); }
.metric-quiet { border-top-color: #8095a3; }
.metric-midweek, .metric-week { border-top-color: var(--accent); }
.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 20px;
}
.panel {
  padding: 18px;
}
.panel.wide { grid-column: 1 / -1; }
.panel h2, .danger-zone h2 {
  margin: 0 0 16px;
  font-size: 19px;
  letter-spacing: 0;
}
.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}
.heatmap { overflow-x: auto; }
.heatmap table {
  width: 100%;
  min-width: 880px;
  border-collapse: separate;
  border-spacing: 4px;
}
.heatmap th, .heatmap td {
  padding: 12px 10px;
  border: 0;
  border-radius: 8px;
  text-align: center;
}
.heatmap th {
  background: var(--munich-soft);
  color: var(--munich-dark);
  font-size: 12px;
}
.heat-cell {
  background: rgba(0,83,138,var(--heat));
  font-weight: 900;
  color: #03283d;
}
.trend {
  height: 250px;
  display: flex;
  align-items: end;
  gap: 9px;
  border-bottom: 1px solid var(--line);
  padding: 28px 4px 24px;
}
.bar {
  position: relative;
  flex: 1;
  min-width: 22px;
  background: linear-gradient(180deg, #0b70a8, var(--munich));
  border-radius: 7px 7px 0 0;
}
.bar span {
  position: absolute;
  left: 50%;
  top: -21px;
  transform: translateX(-50%);
  font-size: 12px;
  font-weight: 850;
}
.bar small {
  position: absolute;
  left: 50%;
  bottom: -20px;
  transform: translateX(-50%);
  color: var(--muted);
  font-size: 11px;
  font-weight: 750;
}
.list-chart {
  display: grid;
  gap: 14px;
}
.panel-loading, .settings-loading {
  min-height: 92px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--muted);
  font-weight: 800;
}
.list-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 4px 0;
}
.list-row span, .list-row strong {
  font-weight: 850;
}
.list-row i {
  grid-column: 1 / -1;
  display: block;
  height: 10px;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--munich), #52a4cd);
}
.settings-editor {
  display: grid;
  gap: 8px;
}
.settings-row {
  display: grid;
  grid-template-columns: 160px 1fr 1fr 110px 2fr;
  gap: 8px;
}
.settings-actions, .danger-zone div {
  display: flex;
  gap: 10px;
}
.inline-controls {
  display: flex;
  gap: 10px;
  align-items: center;
}
.inline-controls input {
  width: 120px;
}
.closed-day-controls input[type="text"] {
  width: 190px;
}
.seed-panel {
  display: grid;
  grid-template-columns: 1fr 220px auto;
  gap: 16px;
  align-items: center;
  padding: 18px;
  background: linear-gradient(135deg, #eef7fc, #fff);
  border-left: 6px solid var(--munich);
}
.seed-panel p {
  margin: 0 0 4px;
  color: var(--munich);
  font-size: 12px;
  font-weight: 900;
  text-transform: uppercase;
}
.seed-panel h2 {
  margin: 0 0 5px;
  font-size: 20px;
}
.seed-panel span {
  color: var(--muted);
}
.seed-panel label {
  display: grid;
  gap: 6px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 850;
}
.seed-panel button {
  background: var(--munich);
  min-height: 46px;
}
.header-seed-date { display: none !important; }
.danger-zone {
  padding: 16px;
  border-color: #f0b8ae;
  background: #fff4f2;
}
.danger-zone button {
  background: var(--danger);
}
.toast {
  position: fixed;
  right: 24px;
  bottom: 24px;
  min-width: 280px;
  max-width: 460px;
  padding: 14px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
  font-weight: 750;
}
.toast-error {
  border-color: #f0b8ae;
  background: #fff4f2;
  color: var(--danger);
}
.empty-state, .admin-note {
  margin: 0;
  color: var(--muted);
}
@media (max-width: 1180px) {
  body { grid-template-columns: 230px minmax(0, 1fr); }
  .filters, .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .dashboard-grid { grid-template-columns: 1fr; }
  .hero-header { background: var(--munich); }
}
</style>
