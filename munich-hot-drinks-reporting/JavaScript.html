<script>
(() => {
  const config = window.APP_CONFIG || {};
  const $ = selector => document.querySelector(selector);

  function init() {
    renderFilterOptions();
    bindEvents();
    runReport();
  }

  function renderFilterOptions() {
    $('[name="floor"]').innerHTML = [`<option>Combined</option>`].concat((config.floors || []).map(floor => `<option>${escapeHtml(floor)}</option>`)).join("");
    $('[name="drink"]').innerHTML = [`<option>All</option>`].concat((config.drinks || []).map(drink => `<option>${escapeHtml(drink)}</option>`)).join("");
    const today = config.serverDate || new Date().toISOString().slice(0, 10);
    $('[name="startDate"]').value = today;
    $('[name="endDate"]').value = today;
  }

  function bindEvents() {
    $("#dashboard-filters").addEventListener("submit", event => {
      event.preventDefault();
      runReport();
    });
    bindClick("#export-csv", exportCsv);
    bindClick("#export-pdf", exportPdf);
  }

  function bindClick(selector, handler) {
    const element = $(selector);
    if (element) element.addEventListener("click", handler);
  }

  function runReport() {
    startAction($("#dashboard-filters button[type='submit']"), "Running...");
    showReportLoading();
    google.script.run
      .withSuccessHandler(result => {
        finishAction($("#dashboard-filters button[type='submit']"), "Run report");
        renderReport(result);
        toast("Report updated");
      })
      .withFailureHandler(error => {
        finishAction($("#dashboard-filters button[type='submit']"), "Run report");
        toast(error.message || String(error), "error");
      })
      .getDashboardReport(readFilters());
  }

  function renderReport(result) {
    const summary = result.summary || {};
    renderReportContext(result.filters || readFilters(), summary);
    $("#report-summary").innerHTML = [
      metric("Total drinks", summary.total || 0, "selected range", "volume"),
      metric("Average per day", summary.averagePerDay || 0, "per active day", "daily"),
      metric("Peak hour", summary.peakHour || "-", "busiest hour", "peak"),
      metric("Quietest hour", summary.quietestHour || "-", "lowest active hour", "quiet"),
      metric("Busiest day", shortDate(summary.busiestDay) || "-", "highest volume day", "day"),
      metric("Tue-Thu average", summary.tuesdayThursdayDailyAverage || 0, "midweek benchmark", "midweek"),
      metric("Mon-Thu average", summary.mondayThursdayDailyAverage || 0, "core week benchmark", "week"),
      metric("Active days", Object.keys(summary.byDate || {}).length, "days with activity", "calendar")
    ].join("");
    animateMetricNumbers();
    renderHeatmap(summary.heatmap || {}, result.filters || readFilters());
    renderTrend(summary.trend || []);
    renderListChart("#drink-mix", summary.byDrink || {}, summary.drinkMix || {});
    renderListChart("#floor-comparison", summary.byFloor || {});
  }

  function renderHeatmap(heatmap, filters) {
    filters = filters || {};
    const bucketConfig = config.timeBuckets || [];
    const buckets = bucketConfig.map(bucket => bucket.label);
    const days = Object.keys(heatmap);
    const values = Object.values(heatmap).flatMap(row => Object.values(row || {}));
    const max = Math.max(1, ...values);
    const total = values.reduce((sum, value) => sum + Number(value || 0), 0);
    if (!days.length || !total) {
      $("#heatmap").innerHTML = `<div class="empty-state">No heatmap activity in this range</div>`;
      return;
    }
    $("#heatmap").innerHTML = `<div class="heatmap-grid" style="--cols:${buckets.length}">
      <div class="heat-head">Day</div>${bucketConfig.map(bucket => `<div class="heat-head${bucket.closed && filters.excludeClosedPeriods ? " is-closed" : ""}">${escapeHtml(bucket.label)}</div>`).join("")}
      ${days.map(day => `<div class="heat-day">${escapeHtml(day)}</div>${bucketConfig.map(bucket => {
        const value = heatmap[day][bucket.label] || 0;
        const intensity = Math.max(.05, value / max);
        const closed = bucket.closed && filters.excludeClosedPeriods;
        const title = closed ? `${day} ${bucket.label}: closed period` : `${day} ${bucket.label}: ${value}`;
        return `<div class="heat-cell${closed ? " is-closed" : ""}" title="${escapeAttr(title)}" style="--heat:${intensity}"><span>${closed ? "Closed" : value || ""}</span></div>`;
      }).join("")}`).join("")}
    </div>`;
  }

  function renderTrend(trend) {
    const max = Math.max(1, ...trend.map(item => item.total));
    $("#trend").innerHTML = trend.length ? trend.map(item =>
      `<div class="bar" title="${escapeHtml(item.date)}: ${item.total}" style="height:${Math.max(5, item.total / max * 100)}%"><span>${item.total}</span><small>${escapeHtml(shortDate(item.date))}</small></div>`
    ).join("") : `<span class="empty-state">No data in this range</span>`;
  }

  function renderListChart(selector, values, percentages) {
    const max = Math.max(1, ...Object.values(values));
    const keys = Object.keys(values);
    $(selector).innerHTML = keys.length ? keys.map(key => {
      const value = values[key] || 0;
      const suffix = percentages && percentages[key] != null ? ` (${percentages[key]}%)` : "";
      return `<div class="list-row">
        <span>${escapeHtml(key)}</span>
        <strong>${value}${suffix}</strong>
        <i style="width:${Math.max(2, value / max * 100)}%"></i>
      </div>`;
    }).join("") : `<span class="empty-state">No data in this range</span>`;
  }

  function exportCsv() {
    const button = $("#export-csv");
    startAction(button, "Exporting...");
    google.script.run
      .withSuccessHandler(result => {
        finishAction(button, "Export CSV");
        const blob = new Blob([result.csv], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = result.filename;
        link.click();
        URL.revokeObjectURL(url);
        toast("CSV exported");
      })
      .withFailureHandler(error => {
        finishAction(button, "Export CSV");
        toast(error.message || String(error), "error");
      })
      .exportFilteredCsv(readFilters());
  }

  function exportPdf() {
    const button = $("#export-pdf");
    startAction(button, "Building PDF...");
    google.script.run
      .withSuccessHandler(result => {
        finishAction(button, "Export PDF report");
        const bytes = atob(result.base64);
        const numbers = new Array(bytes.length);
        for (let i = 0; i < bytes.length; i += 1) numbers[i] = bytes.charCodeAt(i);
        const blob = new Blob([new Uint8Array(numbers)], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = result.filename;
        link.click();
        URL.revokeObjectURL(url);
        toast("PDF report exported");
      })
      .withFailureHandler(error => {
        finishAction(button, "Export PDF report");
        toast(error.message || String(error), "error");
      })
      .exportPdfReport(readFilters());
  }

  function readFilters() {
    const form = $("#dashboard-filters");
    return {
      preset: form.preset.value,
      startDate: form.startDate.value,
      endDate: form.endDate.value,
      floor: form.floor.value,
      drink: form.drink.value,
      excludeBankHolidays: form.excludeBankHolidays.checked,
      excludeClosedPeriods: form.excludeClosedPeriods.checked
    };
  }

  function metric(label, value, helper, tone) {
    const numeric = typeof value === "number" && isFinite(value);
    return `<div class="metric metric-${escapeHtml(tone || "default")}">
      <span>${escapeHtml(label)}</span>
      <strong ${numeric ? `data-count="${value}"` : ""}>${escapeHtml(value)}</strong>
      <small>${escapeHtml(helper || "")}</small>
    </div>`;
  }

  function renderReportContext(filters, summary) {
    const floor = filters.floor || "Combined";
    const drink = filters.drink || "All";
    const activeDays = Object.keys((summary && summary.byDate) || {}).length;
    $("#report-context").textContent = `Showing ${floor.toLowerCase()} results for ${formatDate(filters.startDate)} to ${formatDate(filters.endDate)}, ${drink === "All" ? "all drinks" : drink}, ${filters.excludeBankHolidays ? "excluding" : "including"} bank holidays and ${filters.excludeClosedPeriods ? "excluding" : "including"} closed periods. ${activeDays} active day${activeDays === 1 ? "" : "s"}.`;
  }

  function animateMetricNumbers() {
    document.querySelectorAll("[data-count]").forEach(node => {
      const target = Number(node.dataset.count || 0);
      const start = performance.now();
      const duration = 520;
      const decimals = Number.isInteger(target) ? 0 : 1;
      const tick = now => {
        const progress = Math.min(1, (now - start) / duration);
        const eased = 1 - Math.pow(1 - progress, 3);
        node.textContent = (target * eased).toFixed(decimals).replace(/\.0$/, "");
        if (progress < 1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    });
  }

  function formatDate(value) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(String(value || ""))) return value || "";
    const parts = value.split("-");
    return `${parts[2]}/${parts[1]}/${parts[0]}`;
  }

  function shortDate(value) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(String(value || ""))) return value || "";
    const parts = value.split("-");
    return `${parts[2]}/${parts[1]}`;
  }

  function startAction(button, label) {
    if (button) {
      button.disabled = true;
      button.dataset.originalHtml = button.dataset.originalHtml || button.innerHTML;
      button.innerHTML = `<span class="button-spinner"></span>${escapeHtml(label)}`;
      button.classList.add("is-busy");
    }
    setActivity(true);
  }

  function finishAction(button, fallbackText) {
    if (button) {
      button.disabled = false;
      button.innerHTML = button.dataset.originalHtml || escapeHtml(fallbackText);
      delete button.dataset.originalHtml;
      button.classList.remove("is-busy");
    }
    setActivity(false);
  }

  function setActivity(active) {
    const bar = $("#activity-bar");
    if (!bar) return;
    bar.hidden = !active;
  }

  function showReportLoading() {
    $("#report-context").textContent = "Refreshing report...";
    $("#report-summary").innerHTML = Array.from({ length: 8 }, () => `<div class="metric skeleton-card"><span></span><strong></strong></div>`).join("");
    $("#heatmap").innerHTML = `<div class="panel-loading"><span class="spinner"></span>Loading heatmap...</div>`;
    $("#trend").innerHTML = `<div class="panel-loading"><span class="spinner"></span>Loading trend...</div>`;
    $("#drink-mix").innerHTML = `<div class="panel-loading"><span class="spinner"></span>Loading drink mix...</div>`;
    $("#floor-comparison").innerHTML = `<div class="panel-loading"><span class="spinner"></span>Loading floors...</div>`;
  }

  function toast(text, tone) {
    const toastEl = $("#toast");
    toastEl.textContent = text;
    toastEl.classList.toggle("toast-error", tone === "error");
    toastEl.hidden = false;
    clearTimeout(toastEl.timer);
    toastEl.timer = setTimeout(() => { toastEl.hidden = true; }, tone === "error" ? 5200 : 2600);
  }

  function escapeHtml(value) {
    return String(value == null ? "" : value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
  }

  function escapeAttr(value) {
    return escapeHtml(value).replace(/"/g, "&quot;");
  }

  document.addEventListener("DOMContentLoaded", init);
})();
</script>
