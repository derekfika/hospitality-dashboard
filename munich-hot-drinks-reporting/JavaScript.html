<script>
(() => {
  const config = window.APP_CONFIG || {};
  const state = { settingsRows: [] };
  const $ = selector => document.querySelector(selector);

  function init() {
    renderFilterOptions();
    bindEvents();
    runReport();
  }

  function renderFilterOptions() {
    $('[name="floor"]').innerHTML = [`<option>Combined</option>`].concat((config.floors || []).map(floor => `<option>${escapeHtml(floor)}</option>`)).join("");
    $('[name="drink"]').innerHTML = [`<option>All</option>`].concat((config.drinks || []).map(drink => `<option>${escapeHtml(drink)}</option>`)).join("");
    const today = config.serverDate || new Date().toISOString().slice(0, 10);
    $('[name="startDate"]').value = today;
    $('[name="endDate"]').value = today;
    if ($("#seed-date")) $("#seed-date").value = today;
    if ($("#seed-date-header")) $("#seed-date-header").value = today;
  }

  function bindEvents() {
    document.addEventListener("click", event => {
      const viewButton = event.target.closest("[data-view]");
      if (viewButton) showView(viewButton.dataset.view);
    });
    $("#dashboard-filters").addEventListener("submit", event => {
      event.preventDefault();
      runReport();
    });
    $("#export-csv").addEventListener("click", exportCsv);
    $("#export-pdf").addEventListener("click", exportPdf);
    $("#setup-button").addEventListener("click", setupSheets);
    $("#load-settings").addEventListener("click", loadSettings);
    $("#clear-test-data").addEventListener("click", clearTestData);
    $("#seed-test-day").addEventListener("click", seedTestDay);
    $("#seed-test-day-header").addEventListener("click", seedTestDay);
    $("#install-archive-trigger").addEventListener("click", installArchiveTrigger);
    $("#archive-now").addEventListener("click", archiveNow);
  }

  function showView(view) {
    document.querySelectorAll(".view").forEach(section => section.hidden = section.id !== `${view}-view`);
    document.querySelectorAll(".nav-button").forEach(button => button.classList.toggle("active", button.dataset.view === view));
    if (view === "dashboard") runReport();
    if (view === "admin") loadSettings();
  }

  function runReport() {
    startAction($("#dashboard-filters button[type='submit']"), "Running...");
    showReportLoading();
    google.script.run
      .withSuccessHandler(result => {
        finishAction($("#dashboard-filters button[type='submit']"), "Run report");
        renderReport(result);
        toast("Report updated");
      })
      .withFailureHandler(error => {
        finishAction($("#dashboard-filters button[type='submit']"), "Run report");
        toast(error.message || String(error), "error");
      })
      .getDashboardReport(readFilters());
  }

  function renderReport(result) {
    const summary = result.summary || {};
    $("#report-summary").innerHTML = [
      metric("Total drinks", summary.total || 0, "volume"),
      metric("Average per day", summary.averagePerDay || 0, "daily"),
      metric("Peak hour", summary.peakHour || "-", "peak"),
      metric("Quietest hour", summary.quietestHour || "-", "quiet"),
      metric("Busiest day", summary.busiestDay || "-", "day"),
      metric("Tue-Thu average", summary.tuesdayThursdayDailyAverage || 0, "midweek"),
      metric("Mon-Thu average", summary.mondayThursdayDailyAverage || 0, "week"),
      metric("Active days", Object.keys(summary.byDate || {}).length, "calendar")
    ].join("");
    renderHeatmap(summary.heatmap || {});
    renderTrend(summary.trend || []);
    renderListChart("#drink-mix", summary.byDrink || {}, summary.drinkMix || {});
    renderListChart("#floor-comparison", summary.byFloor || {});
  }

  function renderHeatmap(heatmap) {
    const buckets = (config.timeBuckets || []).map(bucket => bucket.label);
    const max = Math.max(1, ...Object.values(heatmap).flatMap(row => Object.values(row)));
    $("#heatmap").innerHTML = `<table>
      <thead><tr><th>Day</th>${buckets.map(bucket => `<th>${escapeHtml(bucket)}</th>`).join("")}</tr></thead>
      <tbody>${Object.keys(heatmap).map(day => `<tr><th>${escapeHtml(day)}</th>${buckets.map(bucket => {
        const value = heatmap[day][bucket] || 0;
        return `<td class="heat-cell" style="--heat:${Math.max(.06, value / max)}">${value}</td>`;
      }).join("")}</tr>`).join("")}</tbody>
    </table>`;
  }

  function renderTrend(trend) {
    const max = Math.max(1, ...trend.map(item => item.total));
    $("#trend").innerHTML = trend.length ? trend.map(item =>
      `<div class="bar" title="${escapeHtml(item.date)}: ${item.total}" style="height:${Math.max(5, item.total / max * 100)}%"><span>${item.total}</span><small>${escapeHtml(shortDate(item.date))}</small></div>`
    ).join("") : `<span class="empty-state">No data in this range</span>`;
  }

  function renderListChart(selector, values, percentages) {
    const max = Math.max(1, ...Object.values(values));
    $(selector).innerHTML = Object.keys(values).map(key => {
      const value = values[key] || 0;
      const suffix = percentages && percentages[key] != null ? ` (${percentages[key]}%)` : "";
      return `<div class="list-row">
        <span>${escapeHtml(key)}</span>
        <strong>${value}${suffix}</strong>
        <i style="width:${Math.max(2, value / max * 100)}%"></i>
      </div>`;
    }).join("");
  }

  function exportCsv() {
    const button = $("#export-csv");
    startAction(button, "Exporting...");
    google.script.run
      .withSuccessHandler(result => {
        finishAction(button, "Export CSV");
        const blob = new Blob([result.csv], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = result.filename;
        link.click();
        URL.revokeObjectURL(url);
        toast("CSV exported");
      })
      .withFailureHandler(error => {
        finishAction(button, "Export CSV");
        toast(error.message || String(error), "error");
      })
      .exportFilteredCsv(readFilters());
  }

  function exportPdf() {
    const button = $("#export-pdf");
    startAction(button, "Building PDF...");
    google.script.run
      .withSuccessHandler(result => {
        finishAction(button, "Export PDF report");
        const bytes = atob(result.base64);
        const numbers = new Array(bytes.length);
        for (let i = 0; i < bytes.length; i += 1) numbers[i] = bytes.charCodeAt(i);
        const blob = new Blob([new Uint8Array(numbers)], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = result.filename;
        link.click();
        URL.revokeObjectURL(url);
        toast("PDF report exported");
      })
      .withFailureHandler(error => {
        finishAction(button, "Export PDF report");
        toast(error.message || String(error), "error");
      })
      .exportPdfReport(readFilters());
  }

  function setupSheets() {
    const button = $("#setup-button");
    startAction(button, "Setting up...");
    google.script.run
      .withSuccessHandler(result => {
        finishAction(button, "Set up sheets");
        toast(`Sheets ready: ${result.sheets.join(", ")}`);
      })
      .withFailureHandler(error => {
        finishAction(button, "Set up sheets");
        toast(error.message || String(error), "error");
      })
      .setupHotDrinkTally();
  }

  function loadSettings() {
    const button = $("#load-settings");
    startAction(button, "Loading...");
    $("#settings-editor").innerHTML = `<div class="settings-loading"><span class="spinner"></span>Loading settings...</div>`;
    google.script.run
      .withSuccessHandler(result => {
        finishAction(button, "Reload");
        state.settingsRows = result.rows || [];
        renderSettings();
      })
      .withFailureHandler(error => {
        finishAction(button, "Reload");
        toast(error.message || String(error), "error");
      })
      .getSettingsForAdmin();
  }

  function renderSettings() {
    $("#settings-editor").innerHTML = state.settingsRows.map((row, index) => `
      <div class="settings-row" data-index="${index}">
        <select>${["Floor","Drink","Opening Hours","Closed Period","Bank Holiday","Reporting Default"].map(type => `<option ${row[0] === type ? "selected" : ""}>${type}</option>`).join("")}</select>
        <input value="${escapeAttr(row[1])}" placeholder="Name">
        <input value="${escapeAttr(row[2])}" placeholder="Value">
        <select><option ${row[3] === true ? "selected" : ""}>true</option><option ${row[3] === false ? "selected" : ""}>false</option></select>
        <input value="${escapeAttr(row[4])}" placeholder="Notes">
      </div>
    `).join("") + `<div class="settings-actions"><button id="add-setting" type="button">Add setting</button><button id="save-settings" type="button">Save settings</button></div>`;
    $("#add-setting").addEventListener("click", () => {
      state.settingsRows.push(["Drink", "", "", true, ""]);
      renderSettings();
    });
    $("#save-settings").addEventListener("click", saveSettings);
  }

  function saveSettings() {
    const rows = Array.from(document.querySelectorAll(".settings-row")).map(row => {
      const fields = row.querySelectorAll("select,input");
      return [fields[0].value, fields[1].value, fields[2].value, fields[3].value, fields[4].value];
    });
    google.script.run
      .withSuccessHandler(newConfig => {
        Object.assign(config, newConfig);
        renderFilterOptions();
        toast("Settings saved");
      })
      .withFailureHandler(error => toast(error.message || String(error)))
      .saveSettingsRows(rows);
  }

  function clearTestData() {
    const button = $("#clear-test-data");
    startAction(button, "Clearing...");
    google.script.run
      .withSuccessHandler(result => {
        finishAction(button, "Clear test data");
        toast(`${result.cleared} test rows cleared`);
      })
      .withFailureHandler(error => {
        finishAction(button, "Clear test data");
        toast(error.message || String(error), "error");
      })
      .clearTestData($("#clear-confirm").value);
  }

  function installArchiveTrigger() {
    const button = $("#install-archive-trigger");
    startAction(button, "Installing...");
    google.script.run
      .withSuccessHandler(result => {
        finishAction(button, "Install nightly archive");
        toast(result.message || "Nightly archive installed");
      })
      .withFailureHandler(error => {
        finishAction(button, "Install nightly archive");
        toast(error.message || String(error), "error");
      })
      .installNightlyArchiveTrigger();
  }

  function archiveNow() {
    const button = $("#archive-now");
    startAction(button, "Archiving...");
    google.script.run
      .withSuccessHandler(result => {
        finishAction(button, "Archive now");
        toast(`${result.archivedRows} rows archived across ${result.archivedDates.length} day(s)`);
        runReport();
      })
      .withFailureHandler(error => {
        finishAction(button, "Archive now");
        toast(error.message || String(error), "error");
      })
      .archiveCompletedDrinkLogDays();
  }

  function seedTestDay(event) {
    const button = event && event.currentTarget ? event.currentTarget : $("#seed-test-day");
    const originalText = button.id === "seed-test-day-header" ? "Add demo data" : "Add coffee test data";
    const dateInput = $("#seed-date") || $("#seed-date-header");
    const dateValue = dateInput ? dateInput.value : "";
    startAction(button, "Adding data...");
    google.script.run
      .withSuccessHandler(result => {
        finishAction(button, originalText);
        toast(`${result.rowsAdded} coffee test rows added for ${result.date}`);
        showView("dashboard");
      })
      .withFailureHandler(error => {
        finishAction(button, originalText);
        toast(error.message || String(error), "error");
      })
      .seedMunichReCoffeeTestDay(dateValue);
  }

  function readFilters() {
    const form = $("#dashboard-filters");
    return {
      preset: form.preset.value,
      startDate: form.startDate.value,
      endDate: form.endDate.value,
      floor: form.floor.value,
      drink: form.drink.value,
      excludeBankHolidays: form.excludeBankHolidays.checked,
      excludeClosedPeriods: form.excludeClosedPeriods.checked
    };
  }

  function metric(label, value, tone) {
    return `<div class="metric metric-${escapeHtml(tone || "default")}"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`;
  }

  function shortDate(value) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(String(value || ""))) return value || "";
    const parts = value.split("-");
    return `${parts[2]}/${parts[1]}`;
  }

  function startAction(button, label) {
    if (button) {
      button.disabled = true;
      button.dataset.originalText = button.dataset.originalText || button.textContent;
      button.innerHTML = `<span class="button-spinner"></span>${escapeHtml(label)}`;
      button.classList.add("is-busy");
    }
    setActivity(true);
  }

  function finishAction(button, fallbackText) {
    if (button) {
      button.disabled = false;
      button.textContent = button.dataset.originalText || fallbackText;
      delete button.dataset.originalText;
      button.classList.remove("is-busy");
    }
    setActivity(false);
  }

  function setActivity(active) {
    const bar = $("#activity-bar");
    if (!bar) return;
    bar.hidden = !active;
  }

  function showReportLoading() {
    $("#report-summary").innerHTML = Array.from({ length: 8 }, () => `<div class="metric skeleton-card"><span></span><strong></strong></div>`).join("");
    $("#heatmap").innerHTML = `<div class="panel-loading"><span class="spinner"></span>Loading heatmap...</div>`;
    $("#trend").innerHTML = `<div class="panel-loading"><span class="spinner"></span>Loading trend...</div>`;
    $("#drink-mix").innerHTML = `<div class="panel-loading"><span class="spinner"></span>Loading drink mix...</div>`;
    $("#floor-comparison").innerHTML = `<div class="panel-loading"><span class="spinner"></span>Loading floors...</div>`;
  }

  function toast(text, tone) {
    const toastEl = $("#toast");
    toastEl.textContent = text;
    toastEl.classList.toggle("toast-error", tone === "error");
    toastEl.hidden = false;
    clearTimeout(toastEl.timer);
    toastEl.timer = setTimeout(() => { toastEl.hidden = true; }, tone === "error" ? 5200 : 2600);
  }

  function escapeHtml(value) {
    return String(value == null ? "" : value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
  }

  function escapeAttr(value) {
    return escapeHtml(value).replace(/"/g, "&quot;");
  }

  document.addEventListener("DOMContentLoaded", init);
})();
</script>
