body.theme-dark {
  --bg: #101014;

  --text: #FFFFFF;
  --text-secondary: #D7D1E8;
  --text-muted: #9A92AD;

  --border: #302A46;
  --border-soft: #282338;

  --primary: #4F34C7;
  --primary-dark: #280F8C;
}

body,
button,
input,
textarea,
select,
table {

}

h1 {
  font-family: 'VIM';
}

  body {

  .app {

.topbar {

  align-items: center;
  gap: 20px;
}
  .eyebrow {

  }

  h1 {
    margin: 0;
    font-size: 26px;
    font-weight: 650;
    letter-spacing: -0.02em;
  }

  .button {
    border: 1px solid var(--border);
    background:#4F34C7;
    color:white;
    border-radius: var(--radius);
    padding: 10px 14px;
    cursor: pointer;
  }

  .button:hover {
    background: var(--bg-hover);
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;

  .stat {

  input,

    font-size: 14px;
  }

  input {
    flex: 1;
  }

  .table-wrap {
    background: var(--bg-elevated);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    overflow: hidden;
  }

  table {
    width: 100%;

  .loading {

  }

  .badge {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 4px 9px;
    font-size: 11px;
    font-weight: 650;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    border: 1px solid transparent;
  }

  .fika-logo {
  height: 70px;
  width: auto;
  display: block;
}

  .status-READY,
  .status-CONFIRMED,
  .status-PRINTED {
    background: var(--success-bg);
    color: #AFC7B6;
    border-color: rgba(78, 107, 87, 0.45);

  .status-NEEDS_REVIEW {
    background: var(--warning-bg);
    color: #D1BEA2;
    border-color: rgba(138, 116, 88, 0.45);
  }

  .status-ERROR {
    background: var(--error-bg);
    color: #D8A7A7;
    border-color: rgba(122, 79, 79, 0.45);
  }

  .status-NEW,

  .status-CPU_CREATED {
    background: var(--info-bg);
    color: #AFC0D1;
    border-color: rgba(80, 101, 122, 0.45);
  }

  .muted {
    color: var(--text-muted);
  }

  .missing {
    color: #D1BEA2;
    font-size: 12px;
  }

  .row-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .mini-button {
    border: 1px solid var(--border);
    background: #181818;
    color: var(--text-secondary);
    border-radius: 8px;
    padding: 6px 8px;
    font-size: 12px;
    cursor: pointer;
  }

  .mini-button:hover {
    color: var(--text);
    background: var(--bg-hover);
  }

  .detail {
    margin-top: 18px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;

  .hidden {
    display: none;
  }

  .items {
    margin-top: 12px;
  }

  .item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border-soft);
  }

  .item-title {
    font-weight: 650;
  }

  .item-detail {
    color: var(--text-secondary);
    font-size: 12px;
    margin-top: 3px;
    font-style: italic;
  }

  .edit-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 12px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field span {
    color: var(--text-muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .field input,
  .field textarea {
    width: 100%;
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    font-size: 13px;
  }

  .field textarea {
    min-height: 70px;
    resize: vertical;
  }

  .field.full {
    grid-column: 1 / -1;
    margin-bottom: 12px;
  }

  .field-missing input {
    border-color: rgba(122, 79, 79, 0.8);
    background: rgba(122, 79, 79, 0.14);
  }

  .mini-button:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

.toast {
  position: fixed;
  right: 28px;
  bottom: 28px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 14px 18px;
  border-radius: var(--radius);
  box-shadow: 0 8px 30px rgba(0,0,0,0.35);
  z-index: 9999;
  max-width: 360px;
}

.toast.success {
  border-color: rgba(78,107,87,0.6);

}

.toast.error {
  border-color: rgba(122,79,79,0.6);
  background: rgba(122,79,79,0.18);
}

.toast.hidden {
  display: none !important;
}

.toast.loading {
  border-color: rgba(79, 52, 199, 0.35);
  background: rgba(79, 52, 199, 0.12);
  color: var(--primary-dark);
}

.spinner {
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: var(--text);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: inline-block;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.busy-cell {
  min-width: 18px;
}

.status-filters {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.status-filters label {
  color: var(--text-secondary);
  font-size: 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  padding: 8px 10px;
  border-radius: 999px;
  cursor: pointer;
}

.status-filters input {
  margin-right: 6px;
}

th[onclick] {
  cursor: pointer;
}

th[onclick]:hover {
  color: var(--text);
}

.detail-row td {
  background: #181818;
  padding: 0 !important;
}

.inline-detail {
  padding: 18px;
}

.detail-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
}

.action-spinner {
  width: 13px;
  height: 13px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: var(--text);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: inline-block;
  margin-left: 6px;
  vertical-align: middle;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.view-toggle {
  display: flex;
  gap: 10px;
  margin-bottom: 18px;
}

.calendar-view {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
}

.calendar-day {
  background: var(--bg-elevated);

}

.calendar-day-title {
  color: var(--text);

}

.calendar-card {
  background:white;

}

.calendar-card:hover {
  background:#F5F2FF;
  }

.calendar-time {
  font-weight: 700;

}

.calendar-meta {
  color: var(--text-secondary);

}

.row-highlight td {
  background: rgba(80,101,122,0.22) !important;
}

.calendar-controls {
  display: flex;

}

.calendar-week-label {
  margin-left: auto;

  font-size: 14px;
}

.calendar-date {
  color: var(--text-muted);

  margin-top: 4px;
}

.quote-stale {
  color: #D1BEA2;
  font-size: 11px;

}

tr.status-READY td {
  background: rgba(78,107,87,0.10);
}

tr.status-NEEDS_REVIEW td {
  background: rgba(122,97,62,0.12);
}

tr.status-CONFIRMED td {

}

tr.status-CANCELLED td {
  background: rgba(90,90,90,0.10);

}

tr.status-READY td:first-child {

}

tr.status-NEEDS_REVIEW td:first-child {

}

tr.status-CONFIRMED td:first-child {

}

tr.status-CANCELLED td:first-child {

}

.calendar-card.status-READY {
  border-left: 4px solid #6C8A74;
}

.calendar-card.status-NEEDS_REVIEW {
  border-left: 4px solid #A98A5A;
}

.calendar-card.status-CONFIRMED {
  border-left: 4px solid #5B7EA0;
}

.calendar-card.status-CANCELLED {
  border-left: 4px solid #777;
}

.calendar-day.today {
  border: 2px solid #5B7EA0;
  box-shadow: 0 0 0 1px rgba(91,126,160,0.2);
}

tbody tr:hover td {
  background: rgba(255,255,255,0.04);
  transition: 0.15s;
}

.row-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.action-spinner-slot {
  width: 18px;

  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 18px;
}

.topbar {
  display: grid;
  grid-template-columns: 1fr auto 1fr;

.header-title {
  text-align: center;
}

.header-spacer {

.header-title h1 {

}

.action-panel {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 260px;
}

.action-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(112px, 1fr));
  gap: 7px;
}

.action-button {
  height: 36px;
  padding: 0 10px;

  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 8px;

  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 12px;

  background: rgba(255,255,255,0.035);
  color: var(--text);

  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;

  cursor: pointer;

  box-shadow: 0 2px 0 rgba(0,0,0,0.22);

  transform: translateY(0);

  transition:
    transform 0.08s ease,
    box-shadow 0.08s ease,
    background 0.15s ease,
    border-color 0.15s ease;
}

.action-button:hover:not(:disabled) {
  background: rgba(255,255,255,0.07);
  border-color: rgba(255,255,255,0.18);
  transform: translateY(-1px);
  box-shadow: 0 3px 0 rgba(0,0,0,0.22);
}

.action-button:active:not(:disabled) {
  transform: translateY(2px);
  box-shadow: 0 0 0 rgba(0,0,0,0.22);
}

.action-button:disabled {
  opacity: 0.34;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.action-button svg {
  width: 15px;
  height: 15px;
  flex: 0 0 15px;
  pointer-events: none;
}

.action-button span {
  white-space: nowrap;
}

.action-confirm {
  color: #AFC7B6;
  border-color: rgba(108,138,116,0.35);
  background: rgba(108,138,116,0.13);
}

.action-confirm:hover:not(:disabled) {
  background: rgba(108,138,116,0.22);
}

.action-cancel {
  color: #D7A7A7;
  border-color: rgba(139,94,94,0.35);
  background: rgba(139,94,94,0.13);
}

.action-cancel:hover:not(:disabled) {
  background: rgba(139,94,94,0.22);
}

.action-muted {
  color: var(--text-muted);
}

.action-meta {
  min-height: 20px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.action-spinner-slot {
  width: 18px;
  height: 18px;

  display: inline-flex;
  align-items: center;
  justify-content: center;

  flex: 0 0 18px;
}

.action-spinner {
  width: 13px;
  height: 13px;

  border: 2px solid rgba(255,255,255,0.20);
  border-top-color: currentColor;
  border-radius: 50%;

  animation: spin 0.8s linear infinite;

}

.status-chip.warn {
  color: #D1BEA2;
  border: 1px solid rgba(176,139,82,0.45);

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
