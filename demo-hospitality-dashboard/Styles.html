<style>
  /* =========================================================
     Demo Hospitality Dashboard Styles
     ---------------------------------------------------------
     Sections:
     01. Theme tokens & fonts
     02. Base layout
     03. Header & controls
     04. Stats
     05. Table & rows
     06. Statuses
     07. Action buttons
     08. Detail / edit panel
     09. Calendar view
     10. Modals
     11. Toasts & spinners
     12. Utilities
     ========================================================= */

  /* 01. Theme tokens & fonts */
  :root {
    --bg: #E8EEF3;
    --bg-elevated: #FFFFFF;
    --bg-card: #FAFAFC;
    --bg-hover: #F4F0FF;

    --text: #241F33;
    --text-secondary: #50495F;
    --text-muted: #81788F;

    --border: #D7D0EA;
    --border-soft: #ECE7F8;

    --primary: #4F34C7;
    --primary-dark: #280F8C;

    --success: #50D700;
    --warning: #FFE800;
    --error: #FF5C00;
    --info: #4DF7C2;

    --ready-bg: rgba(78, 107, 87, 0.10);
    --ready-border: #6C8A74;

    --review-bg: rgba(122, 97, 62, 0.12);
    --review-border: #A98A5A;

    --confirmed-bg: rgba(64, 94, 120, 0.12);
    --confirmed-border: #5B7EA0;

    --cancelled-bg: rgba(90, 90, 90, 0.10);
    --cancelled-border: #777777;

    --archived-bg: rgba(90, 90, 90, 0.08);
    --archived-border: #A8A2B5;

    --radius: 16px;
    --radius-lg: 24px;

    --shadow-soft: 0 6px 18px rgba(40, 15, 140, 0.06);
    --shadow-medium: 0 8px 24px rgba(40, 15, 140, 0.08);
    --shadow-modal: 0 24px 70px rgba(40, 15, 140, 0.25);

    --font-title: 'VIM', serif;
    --font-body: 'Gilroy', Arial, sans-serif;
  }

  body.theme-dark {
    --bg: #101014;
    --bg-elevated: #18181D;
    --bg-card: #202027;
    --bg-hover: #292634;

    --text: #FFFFFF;
    --text-secondary: #D7D1E8;
    --text-muted: #9A92AD;

    --border: #302A46;
    --border-soft: #282338;

    --shadow-soft: 0 6px 18px rgba(0, 0, 0, 0.25);
    --shadow-medium: 0 8px 24px rgba(0, 0, 0, 0.32);
    --shadow-modal: 0 24px 70px rgba(0, 0, 0, 0.45);
  }

  /* 02. Base layout */
  * {
    box-sizing: border-box;
  }

  body,
  button,
  input,
  textarea,
  select,
  table {
    font-family: var(--font-body);
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
  }

  h1,
  h2 {
    font-family: var(--font-title);
  }

  .app {
    padding: 28px;
  }

  .hidden {
    display: none !important;
  }

  .muted {
    color: var(--text-muted);
  }

  .eyebrow {
    margin: 0 0 6px;
    color: var(--text-muted);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  /* 03. Header & controls */
  .topbar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 20px;

    background: var(--bg-elevated);
    border-radius: var(--radius-lg);
    padding: 22px 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-medium);
  }

  .logo-wrap {
    justify-self: start;
  }

  .fika-logo {
    height: 70px;
    width: auto;
    display: block;
  }

  .demo-logo-placeholder {
    align-items: center;
    background: rgba(255, 255, 255, 0.82);
    border: 1px dashed var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    display: inline-flex;
    font-size: 12px;
    font-weight: 800;
    height: 58px;
    justify-content: center;
    letter-spacing: 0.12em;
    min-width: 150px;
    padding: 0 18px;
    text-transform: uppercase;
  }

  .header-title {
    text-align: center;
  }

  .header-title h1 {
    color: var(--primary);
    font-family: var(--font-title);
    font-size: 48px;
    font-weight: 400;
    line-height: 1;
    margin: 0;
    letter-spacing: 0.02em;
    text-shadow: none;
  }

  .header-actions {
    justify-self: end;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .header-settings-btn {
    width: 42px;
    min-width: 42px;
    height: 42px;
    padding: 0;
    background: var(--primary);
    color: #FFFFFF;
    border: 0;
    box-shadow: 0 3px 0 var(--primary-dark);
  }

  .header-settings-btn:hover:not(:disabled) {
    background: var(--primary-dark);
    border-color: transparent;
    box-shadow: 0 3px 0 rgba(40, 15, 140, 0.18);
  }

  .button,
  .theme-toggle {
    border: 0;
    background: var(--primary);
    color: #FFFFFF;
    border-radius: var(--radius);
    padding: 10px 14px;
    cursor: pointer;
    box-shadow: 0 3px 0 var(--primary-dark);
    transition: background 0.15s ease, transform 0.08s ease, box-shadow 0.08s ease;
  }

  .button:hover,
  .theme-toggle:hover {
    background: var(--primary-dark);
  }

  .button:active,
  .theme-toggle:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 var(--primary-dark);
  }

  .button:disabled,
  .theme-toggle:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .button.secondary {
    background: #FFFFFF;
    color: var(--primary-dark);
    border: 1px solid var(--border);
    box-shadow: none;
  }

  .button.danger {
    background: var(--error);
    color: #FFFFFF;
    box-shadow: 0 3px 0 rgba(255, 92, 0, 0.35);
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 18px;
  }

  input,
  select,
  textarea {
    background: var(--bg-elevated);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 14px;
  }

  input {
    flex: 1;
  }

  .status-filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .status-filters label {
    color: var(--text-secondary);
    font-size: 12px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    padding: 8px 10px;
    border-radius: 999px;
    cursor: pointer;
  }

  .status-filters input {
    margin-right: 6px;
  }

  .view-toggle,
  .calendar-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }

  .calendar-week-label {
    margin-left: auto;
    color: var(--text-secondary);
    font-size: 14px;
  }

  /* 04. Stats */
  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    overflow-x: auto;
  }

  .feedback-insights {
    margin: 0 0 22px;
    padding: 22px;
    border: 1px solid var(--border);
    border-radius: 18px;
    background:
      radial-gradient(circle at 100% 0, color-mix(in srgb, var(--primary) 10%, transparent), transparent 38%),
      var(--bg-elevated);
    box-shadow: 0 14px 35px rgba(28, 21, 88, 0.07);
  }

  .feedback-insights-heading {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 16px;
  }

  .feedback-insights-heading h2 {
    margin: 3px 0 0;
    font-family: var(--font-title);
    font-size: 24px;
  }

  .feedback-insights .eyebrow {
    color: var(--primary);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .feedback-metrics {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }

  .feedback-metric {
    display: grid;
    gap: 4px;
    padding: 15px 16px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.78);
  }

  .feedback-metric strong {
    color: var(--primary);
    font-size: 25px;
  }

  .feedback-metric span {
    color: var(--text-muted);
    font-size: 12px;
  }

  .feedback-metric.needs-attention {
    border-color: color-mix(in srgb, var(--error) 35%, var(--border));
  }

  .feedback-items {
    margin-top: 15px;
  }

  .feedback-items-title {
    margin-bottom: 8px;
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .feedback-item-list {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px 18px;
  }

  .feedback-item-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
  }

  .feedback-item-score {
    white-space: nowrap;
    color: var(--primary);
    font-weight: 800;
  }

  .feedback-item-score small {
    color: var(--text-muted);
    font-weight: 500;
  }

  @media (max-width: 760px) {
    .feedback-metrics {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .feedback-item-list {
      grid-template-columns: 1fr;
    }
  }

  .stat-card {
    flex: 1;
    min-width: 140px;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    padding: 16px;
    border-radius: 18px;

    background: var(--bg-card);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-soft);
  }

  .stat-card strong {
    font-size: 32px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-card span {
    font-size: 13px;
    color: var(--text-muted);
  }

  .status-archived {
    opacity: 0.7;
  }

  /* Legacy stat classes kept in case older HTML still renders them */
  .stat {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    box-shadow: var(--shadow-soft);
  }

  .stat-label {
    color: var(--text-muted);
    font-size: 12px;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 700;
  }

  /* 05. Table & rows */
  .table-wrap {
    width: 100%;
    overflow-x: auto;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow-soft);
    padding-right: 0;
  }

  table,
  .bookings-table {
    width: 100%;
    min-width: 100%;
    table-layout: fixed;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    text-align: left;
    color: var(--primary-dark);
    font-weight: 700;
    padding: 12px;
    border-bottom: 1px solid var(--border);
    background: #F4F0FF;
  }

  th[onclick] {
    cursor: pointer;
  }

  th[onclick]:hover {
    color: var(--primary);
  }

  td {
    padding: 12px;
    border-bottom: 1px solid var(--border-soft);
    vertical-align: top;
    color: var(--text);
    background: var(--bg-card);
  }

  .table-titlecase {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  tbody tr:hover td {
    background: var(--bg-hover);
    transition: background 0.15s ease;
  }

  .bookings-table tr td:first-child {
    border-top-left-radius: 18px;
    border-bottom-left-radius: 18px;
  }

  .bookings-table tr td:last-child {
    border-top-right-radius: 18px;
    border-bottom-right-radius: 18px;
    text-align: right;
  }

  .loading {
    color: var(--text-muted);
    text-align: center;
    padding: 32px;
  }

  .missing {
    color: #B08B52;
    font-size: 12px;
  }

  .row-highlight td {
    background: rgba(80, 101, 122, 0.22) !important;
  }

  /* 06. Statuses */
  .badge,
  .status-chip {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 4px 9px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: #F4F0FF;
    color: var(--primary-dark);
  }

  tr.status-READY td {
    background: var(--ready-bg);
  }

  tr.status-NEEDS_REVIEW td {
    background: var(--review-bg);
  }

  tr.status-CONFIRMED td {
    background: var(--confirmed-bg);
  }

  tr.status-CANCELLED td {
    background: var(--cancelled-bg);
    opacity: 0.7;
  }

  tr.status-ARCHIVED td,
  tr.status-ARCHIVED {
    background: var(--archived-bg);
    opacity: 0.55;
  }

  tr.status-READY td:first-child {
    border-left: 4px solid var(--ready-border);
  }

  tr.status-NEEDS_REVIEW td:first-child {
    border-left: 4px solid var(--review-border);
  }

  tr.status-CONFIRMED td:first-child {
    border-left: 4px solid var(--confirmed-border);
  }

  tr.status-CANCELLED td:first-child {
    border-left: 4px solid var(--cancelled-border);
  }

  tr.status-ARCHIVED td:first-child {
    border-left: 4px solid var(--archived-border);
  }

  .status-READY,
  .status-CONFIRMED {
    color: var(--primary-dark);
    border-color: var(--border);
  }

  .status-NEEDS_REVIEW {
    color: var(--primary-dark);
    border-color: rgba(169, 138, 90, 0.45);
  }

  .status-CANCELLED,
  .status-ARCHIVED {
    color: var(--text-muted);
  }

  .status-ERROR {
    color: #8A3434;
    border-color: rgba(122, 79, 79, 0.45);
  }

  .status-NEW,
  .status-QUOTE_GENERATED,
  .status-CPU_CREATED {
    color: var(--primary-dark);
  }

  .status-chip.warn,
  .quote-stale {
    color: #B08B52;
    border: 1px solid rgba(176, 139, 82, 0.45);
    background: rgba(176, 139, 82, 0.14);
  }

  .quote-stale {
    font-size: 11px;
    padding: 4px 7px;
    border-radius: 999px;
  }

  /* 07. Action buttons */
  .row-actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
    width: 100%;
    flex-wrap: nowrap;
  }

  .archived-actions {
    gap: 8px;
  }

  .icon-btn,
  .mini-button,
  .action-button {
    min-width: 34px;
    height: 34px;
    padding: 0 9px;

    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;

    border: 1px solid var(--border);
    border-radius: 8px;

    background: #FFFFFF;
    color: var(--primary-dark);

    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;

    cursor: pointer;
    box-shadow: 0 2px 0 rgba(40, 15, 140, 0.18);

    transform: translateY(0);
    transition:
      transform 0.08s ease,
      box-shadow 0.08s ease,
      background 0.15s ease,
      border-color 0.15s ease,
      opacity 0.15s ease;
  }

  .icon-btn:hover:not(:disabled),
  .mini-button:hover:not(:disabled),
  .action-button:hover:not(:disabled) {
    background: #F4F0FF;
    border-color: var(--primary);
    transform: translateY(-1px);
    box-shadow: 0 3px 0 rgba(40, 15, 140, 0.18);
  }

  .icon-btn:active:not(:disabled),
  .mini-button:active:not(:disabled),
  .action-button:active:not(:disabled) {
    transform: translateY(2px);
    box-shadow: none;
  }

  .icon-btn:disabled,
  .mini-button:disabled,
  .action-button:disabled {
    opacity: 0.34;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .icon-btn.warning,
  .action-button.warning {
    color: #B08B52;
    border-color: rgba(176, 139, 82, 0.45);
    background: rgba(176, 139, 82, 0.14);
  }

  .icon-btn.danger,
  .action-cancel {
    color: #8A3434;
    border-color: rgba(139, 94, 94, 0.35);
    background: rgba(139, 94, 94, 0.13);
  }

  .icon-btn svg,
  .mini-button svg,
  .action-button svg {
    width: 18px;
    height: 18px;
    flex: 0 0 18px;
    pointer-events: none;
  }

  .archived-pill {
    display: inline-flex;
    align-items: center;
    padding: 8px 12px;
    border-radius: 999px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 700;
  }

  th:last-child {
    text-align: right;
    padding-right: 18px;
  }

  /* 08. Detail / edit panel */
  .detail-row td {
    background: var(--bg-card) !important;
    padding: 0 !important;
  }

  .inline-detail,
  .detail,
  .detail-panel,
  .detail-card,
  .edit-panel {
    background: var(--bg-elevated);
    color: var(--text);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-medium);
  }

  .inline-detail {
    padding: 18px;
    border-radius: 0 0 18px 18px;
  }

  .detail,
  .detail-panel,
  .detail-card,
  .edit-panel {
    border-radius: var(--radius);
    padding: 18px;
  }

  .detail-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }

  .edit-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 12px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field span,
  .detail-panel label,
  .edit-panel label {
    color: var(--text-muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .field input,
  .field textarea,
  .detail-panel input,
  .detail-panel textarea,
  .detail-panel select,
  .edit-panel input,
  .edit-panel textarea,
  .edit-panel select {
    width: 100%;
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    font-size: 13px;
  }

  .field textarea {
    min-height: 70px;
    resize: vertical;
  }

  .field.full {
    grid-column: 1 / -1;
    margin-bottom: 12px;
  }

  .charge-toggle {
    align-items: center;
    background: linear-gradient(135deg, rgba(23, 111, 142, 0.10), rgba(47, 128, 104, 0.10));
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    flex-direction: row;
    gap: 12px;
    padding: 14px;
  }

  .charge-toggle input {
    accent-color: var(--primary);
    flex: 0 0 auto;
    height: 18px;
    margin: 0;
    padding: 0;
    width: 18px;
  }

  .charge-toggle span {
    display: grid;
    gap: 3px;
  }

  .charge-toggle strong {
    color: var(--text);
    font-size: 13px;
    letter-spacing: 0;
    text-transform: none;
  }

  .charge-toggle small {
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: 0;
    text-transform: none;
  }

  .field input:focus,
  .field textarea:focus,
  .detail-panel input:focus,
  .detail-panel textarea:focus,
  .detail-panel select:focus,
  .edit-panel input:focus,
  .edit-panel textarea:focus,
  .edit-panel select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79, 52, 199, 0.14);
  }

  .field-missing input {
    border-color: rgba(122, 79, 79, 0.8);
    background: rgba(122, 79, 79, 0.14);
  }

  .items {
    margin-top: 12px;
  }

  .item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border-soft);
  }

  .item-title {
    font-weight: 700;
  }

  .item-detail {
    color: var(--text-secondary);
    font-size: 12px;
    margin-top: 3px;
    font-style: italic;
  }

  .detail-row-highlight {
    animation: detailPulse 0.8s ease;
  }

  @keyframes detailPulse {
    0% {
      box-shadow: 0 0 0 rgba(79, 52, 199, 0);
    }

    50% {
      box-shadow: 0 0 0 4px rgba(79, 52, 199, 0.15);
    }

    100% {
      box-shadow: 0 0 0 rgba(79, 52, 199, 0);
    }
  }

  /* 09. Calendar view */
  .calendar-view {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    margin-bottom: 20px;
  }

  .calendar-view.hidden {
    display: none;
  }

  .calendar-day {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    min-height: 420px;
    box-shadow: var(--shadow-soft);
  }

  .calendar-day.today {
    border: 2px solid var(--confirmed-border);
    box-shadow: 0 0 0 1px rgba(91, 126, 160, 0.2);
  }

  .calendar-day-title {
    color: var(--text);
    font-weight: 700;
    margin-bottom: 12px;
  }

  .calendar-date {
    color: var(--text-muted);
    font-size: 12px;
    margin-top: 4px;
  }

  .calendar-card {
    background: #FFFFFF;
    color: var(--text);
    border: 2px solid var(--primary);
    border-left: 4px solid var(--info);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 10px;
    cursor: pointer;
    box-shadow: 0 3px 0 rgba(79, 52, 199, 0.25);
  }

  .calendar-card:hover {
    background: #F5F2FF;
  }
