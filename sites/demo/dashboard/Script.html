<script>
  let BOOKINGS = [];
  let BUSY_BOOKING_ID = "";
  let SORT_KEY = "date";
  let SORT_DIR = "asc";
  let OPEN_BOOKING_ID = "";
  let CURRENT_VIEW = "table";
  let HIGHLIGHT_BOOKING_ID = "";
  let CALENDAR_WEEK_START = getMonday_(new Date());

  let CANCEL_BOOKING_ID = null;
  let CALENDAR_BOOKING_ID = null;
  let CALENDAR_ATTENDEE_OPTIONS = [];
  let REGENERATE_BOOKING_ID = null;
  let SCAN_STATE = null;
  let TOAST_TIMER = null;
  let SETTINGS_STATE = null;
  let ACTIVE_SETTINGS_TAB = "";
  let ADMIN_UNLOCKED = false;
  let PENDING_ADMIN_TAB = "";

  let scanTotals = {
    logged: 0,
    skipped: 0,
    errors: 0,
    archived: 0
  };

  console.log("SCRIPT LOADED VERSION BETA TEST v0.9.2");

  document.addEventListener("DOMContentLoaded", () => {
    loadBookings();
    loadFeedbackMetrics();
  });

  function toggleTheme() {
    document.body.classList.toggle("theme-dark");
  }

  function openSettingsModal() {
    const modal = document.getElementById("settingsModal");
    if (!modal) return;

    modal.classList.remove("hidden");
    setSettingsStatus_("Loading settings...");
    setSettingsSaving_(true, "Loading...");

    google.script.run
      .withSuccessHandler(res => {
        SETTINGS_STATE = normaliseSettingsResponse_(res);
        ACTIVE_SETTINGS_TAB =
          ACTIVE_SETTINGS_TAB ||
          (SETTINGS_STATE.schema[0] && SETTINGS_STATE.schema[0].id) ||
          "";

        renderSettingsModal_();
        setSettingsSaving_(false);
        setSettingsStatus_("Settings loaded.");
      })
      .withFailureHandler(err => {
        SETTINGS_STATE = normaliseSettingsResponse_({ ok: false });
        ACTIVE_SETTINGS_TAB =
          ACTIVE_SETTINGS_TAB ||
          (SETTINGS_STATE.schema[0] && SETTINGS_STATE.schema[0].id) ||
          "";

        renderSettingsModal_();
        setSettingsSaving_(false);
        setSettingsStatus_("Settings failed to load: " + (err.message || err), true);
      })
      .getDashboardSettings();
  }

  function normaliseSettingsResponse_(res) {
    const state = res || {};
    const fallbackSchema = Array.isArray(window.DASHBOARD_SETTINGS_SCHEMA)
      ? window.DASHBOARD_SETTINGS_SCHEMA
      : [];

    const schema =
      Array.isArray(state.schema) && state.schema.length
        ? state.schema
        : Array.isArray(state.sections) && state.sections.length
          ? state.sections
          : fallbackSchema;

    console.log("Settings response debug", {
      hasStateSchema: Array.isArray(state.schema),
      stateSchemaLength: Array.isArray(state.schema) ? state.schema.length : null,
      hasStateSections: Array.isArray(state.sections),
      stateSectionsLength: Array.isArray(state.sections) ? state.sections.length : null,
      fallbackSchemaLength: fallbackSchema.length,
      finalSchemaLength: schema.length
    });

    return {
      ok: state.ok !== false,
      schema,
      values: {
        ...buildSettingsFallbackValues_(schema),
        ...(state.values || {})
      },
      validation: state.validation || { ok: true, errors: [], errorsByKey: {} },
      about: state.about || {},
      raw: state
    };
  }

  function buildSettingsFallbackValues_(schema) {
    return (schema || []).reduce((values, section) => {
      (section.fields || []).forEach(field => {
        values[field.key] = normaliseClientSettingValue_(field.fallback, field);
      });
      return values;
    }, {});
  }

  function closeSettingsModal() {
    const modal = document.getElementById("settingsModal");
    if (modal) modal.classList.add("hidden");
  }

  function renderSettingsModal_() {
    if (!SETTINGS_STATE) return;

    const tabsEl = document.getElementById("settingsTabs");
    const formEl = document.getElementById("settingsForm");
    if (!tabsEl || !formEl) return;

    if (!Array.isArray(SETTINGS_STATE.schema) || SETTINGS_STATE.schema.length === 0) {
      console.log(
        "Admin debug",
        SETTINGS_STATE.schema.map(s => ({
          id: s.id,
          title: s.title,
          access: s.access,
          locked: s.access === "admin" && !ADMIN_UNLOCKED
        }))
      ); tabsEl.innerHTML = "";
      formEl.innerHTML = `
        <div class="loading">
          Settings schema did not load. Try refreshing the web app after pushing the latest script.
        </div>
      `;
      setSettingsStatus_("Settings schema did not load from Apps Script.", true);
      return;
    }

    tabsEl.innerHTML = SETTINGS_STATE.schema.map(section => {
      const locked =
        section.access === "admin" &&
        !ADMIN_UNLOCKED;

      return `
    <button
      class="settings-tab
             ${section.id === ACTIVE_SETTINGS_TAB ? "active" : ""}
             ${sectionHasSettingsErrors_(section) ? "has-error" : ""}
             ${locked ? "locked" : ""}"
      type="button"
      onclick="selectSettingsTab('${section.id}')">
      ${locked ? "🔒 " : ""}
      ${escapeHtml(section.title)}
    </button>
  `;
    }).join("");

    const section =
      SETTINGS_STATE.schema.find(item => item.id === ACTIVE_SETTINGS_TAB) ||
      SETTINGS_STATE.schema[0];

    if (!section) {
      formEl.innerHTML = `<div class="loading">No settings have been configured.</div>`;
      return;
    }

    formEl.innerHTML = `
      <h3>${escapeHtml(section.title)}</h3>
      <div class="settings-fields">
        ${section.fields.map(field => renderSettingsField_(field)).join("")}
      </div>
    `;
  }

  function openAdminPinModal() {
    const modal = document.getElementById("adminPinModal");
    const input = document.getElementById("adminPinInput");
    const status = document.getElementById("adminPinStatus");
    console.log("Admin modal found?", !!modal);

    if (!modal) return;

    if (status) {
      status.textContent = "";
      status.classList.add("hidden");
      status.classList.remove("settings-error");
    }

    if (input) input.value = "";

    modal.classList.remove("hidden");

    setTimeout(() => {
      if (input) input.focus();
    }, 50);
  }

  function closeAdminPinModal() {
    const modal = document.getElementById("adminPinModal");
    if (modal) modal.classList.add("hidden");

    PENDING_ADMIN_TAB = "";
  }

  function submitAdminPin() {
    const input = document.getElementById("adminPinInput");
    const status = document.getElementById("adminPinStatus");
    const pin = input ? input.value : "";

    if (!pin) {
      if (status) {
        status.textContent = "Enter the admin PIN.";
        status.classList.remove("hidden");
        status.classList.add("settings-error");
      }
      return;
    }

    if (status) {
      status.textContent = "Checking PIN...";
      status.classList.remove("hidden");
      status.classList.remove("settings-error");
    }

    google.script.run
      .withSuccessHandler(res => {
        if (res && res.ok) {
          ADMIN_UNLOCKED = true;

          const targetTab = PENDING_ADMIN_TAB;
          PENDING_ADMIN_TAB = "";

          closeAdminPinModal();

          if (targetTab) {
            updateSettingsStateFromForm_();
            ACTIVE_SETTINGS_TAB = targetTab;
          }

          renderSettingsModal_();
          setSettingsStatus_("Admin settings unlocked for this session.");
          showToast("Admin unlocked.", "success");
          return;
        }

        if (status) {
          status.textContent = "Incorrect PIN.";
          status.classList.remove("hidden");
          status.classList.add("settings-error");
        }
      })
      .withFailureHandler(err => {
        if (status) {
          status.textContent = "PIN check failed: " + (err.message || err);
          status.classList.remove("hidden");
          status.classList.add("settings-error");
        }
      })
      .verifyAdminPin(pin);
  }

  function renderSettingsField_(field) {
    const values = (SETTINGS_STATE && SETTINGS_STATE.values) || {};
    const validation = (SETTINGS_STATE && SETTINGS_STATE.validation) || {};
    const errorsByKey = validation.errorsByKey || {};
    const errors = errorsByKey[field.key] || [];
    const rawValue = values[field.key] ?? "";
    const value = Array.isArray(rawValue) ? rawValue.join(", ") : rawValue;
    const readonly = field.readonly ? "readonly" : "";
    const disabledClass = field.readonly ? " readonly" : "";
    const errorClass = errors.length ? " settings-field-error" : "";
    const noteHtml = field.notes ? `<small class="settings-help">${escapeHtml(field.notes)}</small>` : "";
    const errorHtml = errors.length ? `<small class="settings-error-text">${escapeHtml(errors.join(" "))}</small>` : "";

    if (field.type === "textarea") {
      return `
        <label class="field settings-field${disabledClass}${errorClass}">
          <span>${escapeHtml(field.label)}</span>
          <textarea data-setting-key="${escapeHtml(field.key)}" ${readonly}>${escapeHtml(value)}</textarea>
          ${noteHtml}
          ${errorHtml}
        </label>
      `;
    }

    return `
      <label class="field settings-field${disabledClass}${errorClass}">
        <span>${escapeHtml(field.label)}</span>
        <input
          data-setting-key="${escapeHtml(field.key)}"
          type="${escapeHtml(field.type || "text")}"
          value="${escapeHtml(value)}"
          ${readonly}>
        ${noteHtml}
        ${errorHtml}
      </label>
    `;
  }

  function sectionHasSettingsErrors_(section) {
    const validation = (SETTINGS_STATE && SETTINGS_STATE.validation) || {};
    const errorsByKey = validation.errorsByKey || {};
    return section.fields.some(field => errorsByKey[field.key] && errorsByKey[field.key].length);
  }

  function selectSettingsTab(tabId) {
    const section = SETTINGS_STATE.schema.find(item => item.id === tabId);

    if (section && section.access === "admin" && !ADMIN_UNLOCKED) {
      PENDING_ADMIN_TAB = tabId;
      openAdminPinModal();
      return;
    }

    updateSettingsStateFromForm_();
    ACTIVE_SETTINGS_TAB = tabId;
    renderSettingsModal_();
  }
  function resetCurrentSettingsTab() {
    if (!SETTINGS_STATE) return;

    const section =
      SETTINGS_STATE.schema.find(item => item.id === ACTIVE_SETTINGS_TAB) ||
      SETTINGS_STATE.schema[0];

    if (!section) return;

    SETTINGS_STATE.values = SETTINGS_STATE.values || {};
    SETTINGS_STATE.validation = { ok: true, errors: [], errorsByKey: {} };

    section.fields.forEach(field => {
      if (field.readonly) return;
      SETTINGS_STATE.values[field.key] = normaliseClientSettingValue_(field.fallback, field);
    });

    renderSettingsModal_();
    setSettingsStatus_(`${section.title} reset to defaults. Save settings to apply.`);
  }

  function updateSettingsStateFromForm_() {
    if (!SETTINGS_STATE) return;
    SETTINGS_STATE.values = SETTINGS_STATE.values || {};
    SETTINGS_STATE.validation = { ok: true, errors: [], errorsByKey: {} };

    document
      .querySelectorAll("[data-setting-key]")
      .forEach(el => {
        if (el.hasAttribute("readonly")) return;
        SETTINGS_STATE.values[el.dataset.settingKey] = el.value;
      });
  }

  function collectSettingsValues_() {
    updateSettingsStateFromForm_();

    const values = {};
    const editableKeys = new Set();

    ((SETTINGS_STATE && SETTINGS_STATE.schema) || []).forEach(section => {
      section.fields.forEach(field => {
        if (!field.readonly) editableKeys.add(field.key);
      });
    });

    editableKeys.forEach(key => {
      values[key] = SETTINGS_STATE.values[key] ?? "";
    });

    return values;
  }

  function normaliseClientSettingValue_(value, field) {
    if (field.type === "textarea") {
      if (Array.isArray(value)) return value.join(", ");
      return String(value || "")
        .split(/\r?\n|,/)
        .map(item => item.trim())
        .filter(Boolean)
        .join(", ");
    }

    return value ?? "";
  }

  function saveSettings() {
    if (!SETTINGS_STATE) return;

    const validation = validateSettingsState_();
    if (!validation.ok) {
      SETTINGS_STATE.validation = validation;
      renderSettingsModal_();
      setSettingsStatus_("Settings were not saved. Please fix the highlighted fields.", true);
      showToast("Settings need attention.", "error");
      return;
    }

    setSettingsSaving_(true);
    setSettingsStatus_("Saving settings...");

    google.script.run
      .withSuccessHandler(res => {
        SETTINGS_STATE = normaliseSettingsResponse_(res || SETTINGS_STATE);
        renderSettingsModal_();
        setSettingsSaving_(false);
        setSettingsStatus_("Settings saved. Refresh the page to see title, logo, font, or colour changes.");
        showToast("Settings saved.", "success");
      })
      .withFailureHandler(err => {
        setSettingsSaving_(false);
        setSettingsStatus_(err.message || String(err), true);
        showToast("Settings failed: " + (err.message || err), "error");
      })
      .saveDashboardSettings(collectSettingsValues_());
  }

  function validateSettingsState_() {
    const values = collectSettingsValues_();
    const errors = [];
    const errorsByKey = {};

    function addError(field, message) {
      errors.push(`${field.label}: ${message}`);
      if (!errorsByKey[field.key]) errorsByKey[field.key] = [];
      errorsByKey[field.key].push(message);
    }

    ((SETTINGS_STATE && SETTINGS_STATE.schema) || []).forEach(section => {
      section.fields.forEach(field => {
        if (field.readonly) return;

        const value = values[field.key];
        const text = String(value === null || value === undefined ? "" : value).trim();

        if (field.required && !text) {
          addError(field, "required.");
          return;
        }

        if (!text) return;

        if (field.type === "email" && !isValidSettingsEmail_(text)) {
          addError(field, "enter a valid email address.");
        }

        if (field.type === "url" && !/^https?:\/\/\S+$/i.test(text)) {
          addError(field, "enter a valid URL starting with http:// or https://.");
        }

        if (field.type === "color" && !/^#[0-9a-fA-F]{6}$/.test(text)) {
          addError(field, "use a hex colour like #F8F6F2.");
        }

        if (field.type === "number") {
          const n = Number(text);

          if (isNaN(n)) {
            addError(field, "enter a number.");
          } else if (field.min !== undefined && n < field.min) {
            addError(field, `must be at least ${field.min}.`);
          }
        }

        if (field.type === "date" && !/^\d{4}-\d{2}-\d{2}$/.test(text)) {
          addError(field, "use YYYY-MM-DD.");
        }

        if (field.type === "textarea" && field.key === "CALENDAR_ATTENDEES") {
          text
            .split(/\r?\n|,/)
            .map(item => item.trim())
            .filter(Boolean)
            .forEach(email => {
              if (!isValidSettingsEmail_(email)) {
                addError(field, `${email} is not a valid email address.`);
              }
            });
        }
      });
    });

    return {
      ok: errors.length === 0,
      errors,
      errorsByKey
    };
  }

  function isValidSettingsEmail_(value) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(value || "").trim());
  }

  function setSettingsSaving_(saving, label) {
    const button = document.getElementById("settingsSaveBtn");
    if (button) {
      button.disabled = saving;
      button.textContent = saving ? (label || "Saving...") : "Save Settings";
    }
  }

  function setSettingsStatus_(message, isError = false) {
    const el = document.getElementById("settingsStatus");
    if (!el) return;

    el.textContent = message;
    el.classList.toggle("settings-error", isError);
  }

  function loadBookings(showLoading = true) {
    if (showLoading) showToast("Refreshing bookings...", "loading", true);

    google.script.run
      .withSuccessHandler(data => {
        BOOKINGS = data || [];
        renderStats();
        renderCalendar();
        renderBookings();
        if (showLoading) showToast("Bookings refreshed.", "success");
      })
      .withFailureHandler(err => {
        showToast("Refresh failed: " + (err.message || err), "error");
      })
      .getDashboardBookings();
  }

  function loadFeedbackMetrics() {
    const status = document.getElementById("feedbackInsightsStatus");
    google.script.run
      .withSuccessHandler(renderFeedbackMetrics)
      .withFailureHandler(err => {
        if (status) status.textContent = "Feedback unavailable";
        console.warn("Feedback metrics failed:", err);
      })
      .getHospitalityFeedbackMetrics();
  }

  function renderFeedbackMetrics(data) {
    const metrics = document.getElementById("feedbackMetrics");
    const items = document.getElementById("feedbackItems");
    const status = document.getElementById("feedbackInsightsStatus");
    if (!metrics || !items || !status) return;

    if (!data || !data.available) {
      status.textContent = "Portal not set up yet";
      metrics.innerHTML = "";
      items.innerHTML = "";
      return;
    }

    status.textContent = `${data.completed || 0} responses from ${data.sent || 0} requests`;
    metrics.innerHTML = `
      <div class="feedback-metric"><strong>${data.averageOverall ?? "—"}</strong><span>Average rating / 5</span></div>
      <div class="feedback-metric"><strong>${data.responseRate || 0}%</strong><span>Response rate</span></div>
      <div class="feedback-metric"><strong>${data.nps ?? "—"}</strong><span>Net promoter score</span></div>
      <div class="feedback-metric ${data.lowRatings ? "needs-attention" : ""}"><strong>${data.lowRatings || 0}</strong><span>Low ratings</span></div>
    `;

    const itemRows = Array.isArray(data.items) ? data.items : [];
    items.innerHTML = itemRows.length
      ? `<div class="feedback-items-title">Menu item intelligence</div>
         <div class="feedback-item-list">${itemRows.map(item => `
           <div class="feedback-item-row">
             <span>${escapeHtml(item.itemName)}</span>
             <span class="feedback-item-score">${item.average} ★ <small>${item.responses} response${item.responses === 1 ? "" : "s"}</small></span>
           </div>`).join("")}</div>`
      : `<span class="muted">Item-level ratings will appear here after the first responses.</span>`;
  }

  function showToast(message, type = "success", persist = false) {
    const el = document.getElementById("toast");
    if (!el) {
      console.log("Toast:", message);
      return;
    }

    if (TOAST_TIMER) {
      clearTimeout(TOAST_TIMER);
      TOAST_TIMER = null;
    }

    el.className = `toast ${type}`;
    el.textContent = message;
    el.classList.remove("hidden");

    if (!persist) {
      TOAST_TIMER = setTimeout(() => {
        el.classList.add("hidden");
      }, 3500);
    }
  }

  function hideToast() {
    const el = document.getElementById("toast");
    if (!el) return;

    if (TOAST_TIMER) {
      clearTimeout(TOAST_TIMER);
      TOAST_TIMER = null;
    }

    el.classList.add("hidden");
  }

  function setBusy(bookingId) {
    BUSY_BOOKING_ID = bookingId;
    renderBookings();
  }

  function clearBusy() {
    BUSY_BOOKING_ID = "";
    renderBookings();
  }

  function actionSpinner(bookingId) {
    if (BUSY_BOOKING_ID !== bookingId) return "";
    return `<span class="action-spinner"></span>`;
  }

  function renderStats() {
    const counts = {
      READY: 0,
      NEEDS_REVIEW: 0,
      CONFIRMED: 0,
      CANCELLED: 0,
      ARCHIVED: 0
    };

    BOOKINGS.forEach(row => {
      const status = row.Status || "NEEDS_REVIEW";
      if (counts[status] !== undefined) counts[status]++;
    });

    document.getElementById("stats").innerHTML = `
      <div class="stat-card">
        <strong>${BOOKINGS.length}</strong>
        <span>Total</span>
      </div>
      <div class="stat-card status-ready">
        <strong>${counts.READY}</strong>
        <span>Ready</span>
      </div>
      <div class="stat-card status-review">
        <strong>${counts.NEEDS_REVIEW}</strong>
        <span>Needs Review</span>
      </div>
      <div class="stat-card status-confirmed">
        <strong>${counts.CONFIRMED}</strong>
        <span>Confirmed</span>
      </div>
      <div class="stat-card status-cancelled">
        <strong>${counts.CANCELLED}</strong>
        <span>Cancelled</span>
      </div>
      <div class="stat-card status-archived">
        <strong>${counts.ARCHIVED}</strong>
        <span>Archived</span>
      </div>
    `;
  }

  function getSortValue(b, key) {
    switch (key) {
      case "date": return getDisplayDate(b) || "";
      case "time": return getDisplayTime(b) || "";
      case "company": return String(b.ClientCompany || "").toLowerCase();
      case "pax": return Number(b.Pax || 0);
      case "service": return String(b.ServiceType || "").toLowerCase();
      case "floor": return String(b.Floor || "").toLowerCase();
      case "room": return String(getDisplayRoom_(b) || "").toLowerCase();
      case "total": return Number(b.TotalPrice || 0);
      case "status": return String(b.Status || "").toLowerCase();
      default: return "";
    }
  }

  function setSort(key) {
    if (SORT_KEY === key) {
      SORT_DIR = SORT_DIR === "asc" ? "desc" : "asc";
    } else {
      SORT_KEY = key;
      SORT_DIR = "asc";
    }

    renderBookings();
  }

  function getVisibleBookings_() {
    const searchEl = document.getElementById("searchInput");
    const search = searchEl ? searchEl.value.toLowerCase() : "";

    const selectedStatuses = Array.from(
      document.querySelectorAll(".status-filters input:checked")
    ).map(cb => cb.value);

    return filterBookings_(BOOKINGS, selectedStatuses, search);
  }

  function filterBookings_(bookings, selectedStatuses, search) {
    let rows = (bookings || []).slice();
    const needle = String(search || "").toLowerCase();

    if (selectedStatuses.length) {
      rows = rows.filter(b => selectedStatuses.includes(b.Status));
    }

    if (needle) {
      rows = rows.filter(b => {
        const text = [
          b.ClientCompany,
          b.HostName,
          b.HostEmail,
          b.ServiceType,
          b.Location,
          b.Floor,
          getDisplayRoom_(b),
          b.Status
        ].join(" ").toLowerCase();

        return text.includes(needle);
      });
    }

    return rows;
  }

  function renderBookings() {
    let rows = getVisibleBookings_();

    rows.sort((a, b) => {
      const aa = getSortValue(a, SORT_KEY);
      const bb = getSortValue(b, SORT_KEY);

      if (aa < bb) return SORT_DIR === "asc" ? -1 : 1;
      if (aa > bb) return SORT_DIR === "asc" ? 1 : -1;
      return 0;
    });

    const html = rows.map(b => `
      <tr data-booking-id="${b.BookingID}"
          class="status-${b.Status} ${HIGHLIGHT_BOOKING_ID === b.BookingID ? "row-highlight" : ""}"
          ondblclick="toggleDetail('${b.BookingID}')">
        <td>${escapeHtml(formatDate(getDisplayDate(b)))}</td>
        <td>${escapeHtml(getDisplayTime(b) || "-")}</td>
        <td>
          <strong>${escapeHtml(b.ClientCompany || "-")}</strong>
          <div class="muted">${escapeHtml(b.HostEmail || "")}</div>
        </td>
        <td>${escapeHtml(b.Pax || "-")}</td>
        <td class="table-titlecase">${escapeHtml(formatTableTitleCase_(b.ServiceType || "-"))}</td>
        <td>${escapeHtml(b.Floor || "-")}</td>
        <td class="table-titlecase">${escapeHtml(formatTableTitleCase_(getDisplayRoom_(b) || "-"))}</td>
        <td>&pound;${Number(b.TotalPrice || 0).toFixed(2)}</td>
        <td><span class="badge status-${escapeHtml(b.Status)}">${escapeHtml(b.Status)}</span></td>
        <td class="missing">${escapeHtml((b.ValidationErrorsParsed || []).join(", "))}</td>
        <td>${renderActionButtons(b)}</td>
      </tr>

      ${OPEN_BOOKING_ID === b.BookingID ? `
        <tr id="detail-${b.BookingID}" class="detail-row">
          <td colspan="11">
            ${renderDetailPanel(b)}
          </td>
        </tr>
      ` : ""}
    `).join("");

    document.getElementById("bookingRows").innerHTML =
      html || `<tr><td colspan="11" class="loading">No bookings found.</td></tr>`;
  }

  function getDisplayRoom_(row) {
    const parsed = row.ParsedBooking || {};
    const clientEvent = parsed.clientBooking && parsed.clientBooking.event
      ? parsed.clientBooking.event
      : {};
    const room =
      parsed.room ||
      parsed.roomOrArea ||
      parsed.deliveryPoint ||
      clientEvent.roomOrArea ||
      clientEvent.deliveryPoint ||
      "";

    if (room) return room;

    const location = String(parsed.location || row.Location || "").trim();
    const siteAddress = "FIKA Hospitality";

    return location && location !== siteAddress ? location : "";
  }

  function formatTableTitleCase_(value) {

  function editField(key, label, value, type = "text") {
    const missing = value === "" || value === null || value === undefined;

    return `

  function editItemField(index, key, label, value) {
    return `

  function saveDetail(bookingId) {
    const row = BOOKINGS.find(x => x.BookingID === bookingId);
    if (!row) return;

    const itemPatch = Array.from(document.querySelectorAll("[data-item]"))
      .reduce((acc, el) => {
        const i = Number(el.dataset.item);
        const key = el.dataset.key;

        if (!acc[i]) acc[i] = {};
        acc[i][key] = el.value;

        return acc;
      }, []);

    const existingItems =
      (row.ParsedBooking && row.ParsedBooking.items && row.ParsedBooking.items.length)
        ? row.ParsedBooking.items
        : (row.ItemsParsed || []);

    const serviceTimesText = document.getElementById("edit-serviceTimes").value.trim();
    const serviceTimes = serviceTimesText
      ? serviceTimesText.split("/").map(s => s.trim()).filter(Boolean)
      : [];

    const mainStartTime = serviceTimes[0] || "";

    const mergedItems = existingItems.map((item, i) => {
      const patch = itemPatch[i] || {};
      let time = (patch.time !== undefined ? patch.time.trim() : (item.time || ""));
      if (!time) time = mainStartTime;

      return {
        ...item,
        ...patch,
        time: normaliseTime_(time)
      };
    });

    const patch = {
      clientCompany: document.getElementById("edit-clientCompany").value.trim(),
      hostName: document.getElementById("edit-hostName").value.trim(),
      hostEmail: document.getElementById("edit-hostEmail").value.trim(),
      pax: document.getElementById("edit-pax").value.trim(),
      eventDate: document.getElementById("edit-eventDate").value.trim(),
      serviceTimes: serviceTimes.map(t => normaliseTime_(t)),
      serviceType: document.getElementById("edit-serviceType").value.trim(),
      location: document.getElementById("edit-location").value.trim(),
      floor: document.getElementById("edit-floor").value.trim(),
      notes: document.getElementById("edit-notes") ? document.getElementById("edit-notes").value.trim() : "",
      deliveryChargeRequired: document.getElementById("edit-deliveryCharge") ? document.getElementById("edit-deliveryCharge").checked : false,
      items: mergedItems
    };

    BUSY_BOOKING_ID = bookingId;
    showToast("Saving booking...", "loading", true);

    google.script.run
      .withSuccessHandler(res => {
        applySavedBookingResponse_(row, res && res.booking);
        BUSY_BOOKING_ID = "";
        OPEN_BOOKING_ID = "";
        renderBookings();
        showToast("Booking saved.", "success");
        loadBookings(false);
      })
      .withFailureHandler(err => {
        clearBusy();
        showToast("Save failed: " + (err.message || err), "error");
      })
      .updateBookingFromDashboard(row.RowNumber, patch);
  }

  function applySavedBookingResponse_(row, booking) {
    if (!row || !booking) return;

    row.ParsedBooking = booking;
    row.ItemsParsed = booking.items || [];
    row.Status = booking.status || row.Status;
    row.ValidationErrors = (booking.validationErrors || []).join(", ");
    row.ValidationErrorsParsed = booking.validationErrors || [];
    row.ClientCompany = booking.clientCompany || "";
    row.HostName = booking.hostName || "";
    row.HostEmail = booking.hostEmail || "";
    row.Pax = booking.pax || "";
    row.EventDate = booking.eventDate || "";
    row.ServiceTimes = JSON.stringify(booking.serviceTimes || []);
    row.ServiceTimesParsed = booking.serviceTimes || [];
    row.ServiceType = booking.serviceType || "";
    row.Location = booking.location || "";
    row.Floor = booking.floor || "";
    row.Notes = booking.notes || "";
    row.TotalPrice = booking.totalPrice || 0;
    row.MgmtFee = booking.mgmtFee || 0;
    row.NetPrice = booking.netPrice || 0;
    row.Vat = booking.vat || 0;
    row.GrossPrice = booking.grossPrice || 0;
    row.QuoteURL = booking.quoteUrl || row.QuoteURL || "";
    row.QuoteStale = booking.quoteStale;
  }

  function hasDeliveryCharge_(booking) {
    return !!(
      booking.deliveryChargeRequired ||
      (booking.charges && booking.charges.delivery && booking.charges.delivery.enabled)
    );
  }

  function handleQuoteClick(bookingId) {
    const row = BOOKINGS.find(x => x.BookingID === bookingId);
    if (!row) return;

    const parsed = row.ParsedBooking || {};
    const hasQuote = !!row.QuoteURL || !!parsed.quoteUrl;
    const quoteStale = parsed.quoteStale === true || parsed.quoteStale === "TRUE";

    if (hasQuote && quoteStale) {
      executeGenerateQuote_(bookingId);
      return;
    }

    generateQuote(bookingId);
  }

  function generateQuote(bookingId) {
    const row = BOOKINGS.find(x => x.BookingID === bookingId);

  function openCalendarAttendeesDialog_() {
    const modal = document.getElementById("calendarAttendeesModal");
    if (!modal) return;

    const status = document.getElementById("calendarAttendeesStatus");
    const list = document.getElementById("calendarAttendeesList");

    CALENDAR_ATTENDEE_OPTIONS = [];

      status.classList.remove("settings-error", "hidden");
      status.textContent = "Loading attendees...";

    google.script.run
      .withSuccessHandler(res => {
        CALENDAR_ATTENDEE_OPTIONS = (res && res.attendees) || [];
        renderCalendarAttendeesDialog_(res || {});

      .withFailureHandler(err => {
        if (status) {
          status.classList.add("settings-error");
          status.textContent = "Could not load calendar attendees: " + (err.message || err);

  function renderCalendarAttendeesDialog_(res) {
    const status = document.getElementById("calendarAttendeesStatus");
    const list = document.getElementById("calendarAttendeesList");
    if (!list) return;

    if (status) {
      status.classList.remove("settings-error");
      if (res.invalid && res.invalid.length) {
        status.classList.add("settings-error");
        status.textContent = "Settings contains invalid attendee emails: " + res.invalid.join(", ");
      } else if (CALENDAR_ATTENDEE_OPTIONS.length) {
        status.textContent = "Untick anyone who should not be involved in this booking.";
      } else {
        status.textContent = "No default attendees are configured. The event will be created on the configured calendar only.";
      }
    }

    list.innerHTML = CALENDAR_ATTENDEE_OPTIONS.length
      ? CALENDAR_ATTENDEE_OPTIONS.map((attendee, index) => `
        <label class="modal-check">
          <input
            class="calendar-attendee-check"
            type="checkbox"
            value="${escapeHtml(attendee.email)}"
            ${attendee.selected === false ? "" : "checked"}

            <strong>${escapeHtml(attendee.label || attendee.email)}</strong>
            <small>${escapeHtml(attendee.email)}</small>

      : `<div class="empty-state">No attendee emails are configured in Settings.</div>`;

  function resetScanStats() {

      if (el) el.textContent = "0";

  function startInboxScan() {
    document.getElementById("scan-start-btn").disabled = true;
    document.getElementById("scan-close-btn").disabled = true;
    document.getElementById("scan-ticker").textContent = "Scanning...";
    scanTotals = {
      logged: 0,
      skipped: 0,
      errors: 0,
      archived: 0
    };

    processScanChunk(0, {
      logged: 0,
      skipped: 0,
      errors: 0
    });
  }

  function processScanChunk(offset, totals) {
    google.script.run
      .withSuccessHandler(res => {
        totals.logged += res.logged || 0;
        totals.skipped += res.skipped || 0;
        totals.errors += res.errors || 0;

        scanTotals.logged += Number(res.logged || 0);
        scanTotals.skipped += Number(res.skipped || 0);
        scanTotals.errors += Number(res.errors || 0);
        scanTotals.archived += Number(res.archived || 0);

        document.getElementById("scan-logged").textContent = scanTotals.logged + " ";
        document.getElementById("scan-skipped").textContent = scanTotals.skipped + " ";
        document.getElementById("scan-errors").textContent = scanTotals.errors + " ";
        document.getElementById("scan-archived").textContent = scanTotals.archived + " ";

        document.getElementById("scan-logged").textContent = totals.logged;
        document.getElementById("scan-skipped").textContent = totals.skipped;
        document.getElementById("scan-errors").textContent = totals.errors;
        if (res.archived !== undefined) {
          document.getElementById("scan-archived").textContent = String(res.archived) + " ";
        }
        scanTotals.archived += Number(res.archived || 0);
        document.getElementById("scan-archived").textContent = scanTotals.archived + " ";
        document.getElementById("scan-ticker").textContent =
          `Processed ${res.nextOffset} of ${SCAN_STATE.totalFound} thread(s)...`;

        if (res.done) {
          document.getElementById("scan-ticker").textContent = "Scan complete.";
          document.getElementById("scan-close-btn").disabled = false;
          showToast("Inbox scan complete.", "success");
          loadBookings(false);
          return;
        }

        processScanChunk(res.nextOffset, totals);
      })
      .withFailureHandler(err => {
        document.getElementById("scan-ticker").textContent =
          "Scan failed: " + (err.message || err);

        document.getElementById("scan-close-btn").disabled = false;
        showToast("Scan failed: " + (err.message || err), "error");
      })
      .scanInboxChunk(offset, 5);
  }

  function renderCalendar() {
    const el = document.getElementById("calendarView");
    if (!el) return;

    const weekDays = getWorkingWeekDays_(CALENDAR_WEEK_START);
    const bookings = BOOKINGS.filter(b => b.Status !== "CANCELLED");

    document.getElementById("calendarWeekLabel").textContent =
      `Week commencing ${formatDateForCalendarLabel_(weekDays[0])}`;

    const grouped = {};
    weekDays.forEach(day => {
      grouped[toIsoDate_(day)] = [];
    });

    bookings.forEach(b => {
      const iso = getDisplayDate(b);
      if (!iso || !grouped[iso]) return;

      grouped[iso].push(b);
    });

    Object.keys(grouped).forEach(iso => {
      grouped[iso].sort((a, b) => {
        const aa = getCalendarSortTime_(a);
        const bb = getCalendarSortTime_(b);

        if (aa < bb) return -1;
        if (aa > bb) return 1;

        return String(a.ClientCompany || "").localeCompare(
          String(b.ClientCompany || "")
        );
      });
    });

    el.innerHTML = weekDays.map(day => {
      const iso = toIsoDate_(day);
      const bookingsForDay = grouped[iso] || [];
      const isToday = toIsoDate_(day) === toIsoDate_(new Date());

      return `
        <div class="calendar-day ${isToday ? 'today' : ''}">
          <div class="calendar-day-title">
            <div>${day.toLocaleDateString("en-GB", { weekday: "long" })}</div>
            <div class="calendar-date">${day.toLocaleDateString("en-GB", { day: "2-digit", month: "short" })}</div>
          </div>

          ${bookingsForDay.length
          ? bookingsForDay.map(b => renderCalendarCard_(b)).join("")
          : `<div class="muted">No bookings</div>`
        }
        </div>
      `;
    }).join("");
  }

  function renderCalendarCard_(b) {
    return `
      <div class="calendar-card status-${b.Status}" onclick="jumpToBooking('${b.BookingID}')">
        <div class="calendar-time">${escapeHtml(getDisplayTime(b) || "-")}</div>
        <strong>${escapeHtml(b.ClientCompany || "-")}</strong>
        <div class="calendar-meta">
          ${escapeHtml(b.ServiceType || "")} &middot; ${escapeHtml(b.Pax || "")} pax
        </div>
        <div class="calendar-meta">${escapeHtml(b.Floor || "")}</div>
      </div>
    `;
  }

  function jumpToBooking(bookingId) {
    CURRENT_VIEW = "table";
    HIGHLIGHT_BOOKING_ID = bookingId;

    setView("table");

    setTimeout(() => {
      const row = document.querySelector(`[data-booking-id="${bookingId}"]`);
      if (row) {
        row.scrollIntoView({ behavior: "smooth", block: "center" });
      }

      OPEN_BOOKING_ID = bookingId;
      renderBookings();

      setTimeout(() => {
        HIGHLIGHT_BOOKING_ID = "";
        renderBookings();
      }, 2500);
    }, 100);
  }

  function changeCalendarWeek(direction) {
    CALENDAR_WEEK_START.setDate(CALENDAR_WEEK_START.getDate() + direction * 7);
    renderCalendar();
  }

  function goToCurrentWeek() {
    CALENDAR_WEEK_START = getMonday_(new Date());
    renderCalendar();
  }

  function getMonday_(date) {
    const d = new Date(date);
    d.setHours(0, 0, 0, 0);

    const day = d.getDay();
    const diff = day === 0 ? -6 : 1 - day;

    d.setDate(d.getDate() + diff);
    return d;
  }

  function getWorkingWeekDays_(monday) {
    return [0, 1, 2, 3, 4].map(offset => {
      const d = new Date(monday);
      d.setDate(d.getDate() + offset);
      return d;
    });
  }

  function toIsoDate_(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  function formatDateForCalendarLabel_(date) {
    return date.toLocaleDateString("en-GB", {
      day: "2-digit",
      month: "long",
      year: "numeric"
    });
  }

  function getDisplayDate(b) {
    return (b.ParsedBooking && b.ParsedBooking.eventDate) || b.EventDate || "";
  }

  function getDisplayTime(b) {
    const parsed =
      (b.ParsedBooking && b.ParsedBooking.serviceTimes) ||
      b.ServiceTimesParsed ||
      [];

    return parsed.length ? parsed.join(" / ") : "";
  }

  function getCalendarSortTime_(booking) {
    const displayTime = getDisplayTime(booking);

    const firstTime = String(displayTime || "")
      .split("/")
      .map(t => t.trim())
      .filter(Boolean)[0] || "";

    const match = firstTime.match(/^(\d{1,2}):(\d{2})/);
    if (!match) return "99:99";

    return `${match[1].padStart(2, "0")}:${match[2]}`;
  }

  function formatDate(value) {
    if (!value) return "-";

    if (/^\d{4}-\d{2}-\d{2}$/.test(value)) {
      const [y, m, d] = value.split("-");
      return `${d}/${m}/${y}`;
    }

    const d = new Date(value);
    if (isNaN(d.getTime())) return value;

    return d.toLocaleDateString("en-GB");
  }

  /**
   * Normalises a time string to ISO HH:mm format.
   * Handles formats like "9", "9:00", "9am", "2pm", "14.30"
   */
  function normaliseTime_(timeStr) {
    if (!timeStr) return "";

    let clean = String(timeStr).toLowerCase().replace(/[^0-9ap:.]/g, "");
    if (!clean) return "";

    let hours = 0;
    let minutes = 0;

    const isPm = clean.includes("pm");
    const isAm = clean.includes("am");
    clean = clean.replace(/[apm]/g, "");

    const parts = clean.split(/[:.]/);
    if (parts.length >= 2) {
      hours = parseInt(parts[0], 10);
      minutes = parseInt(parts[1], 10);
    } else if (parts.length === 1 && parts[0]) {
      if (parts[0].length <= 2) {
        hours = parseInt(parts[0], 10);
      } else {
        hours = parseInt(parts[0].substring(0, parts[0].length - 2), 10);
        minutes = parseInt(parts[0].slice(-2), 10);
      }
    }

    if (isPm && hours < 12) hours += 12;
    if (isAm && hours === 12) hours = 0;

    if (isNaN(hours) || hours < 0 || hours > 23) hours = 0;
    if (isNaN(minutes) || minutes < 0 || minutes > 59) minutes = 0;

    return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}`;
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function runDashboardClientTests() {
    const fixture = [
      { BookingID: "A", Status: "READY", ClientCompany: "Acme", HostName: "Alex", HostEmail: "alex@example.com", ServiceType: "Breakfast", Location: "FIKA Hospitality", Floor: "7" },
      { BookingID: "B", Status: "CONFIRMED", ClientCompany: "Beta", HostName: "Bea", HostEmail: "bea@example.com", ServiceType: "Lunch", Location: "FIKA Hospitality", Floor: "8" },
      { BookingID: "C", Status: "ARCHIVED", ClientCompany: "Gamma", HostName: "Gus", HostEmail: "gus@example.com", ServiceType: "Drinks", Location: "FIKA Hospitality", Floor: "9" }
    ];

    const tests = [
      {
        name: "status filter",
        ok: filterBookings_(fixture, ["READY"], "").map(item => item.BookingID).join(",") === "A"
      },
      {
        name: "search filter",
        ok: filterBookings_(fixture, [], "bea@example.com").map(item => item.BookingID).join(",") === "B"
      },
      {
        name: "combined filters",
        ok: filterBookings_(fixture, ["CONFIRMED", "READY"], "breakfast").map(item => item.BookingID).join(",") === "A"
      },
      {
        name: "empty filters return all",
        ok: filterBookings_(fixture, [], "").length === 3
      }
    ];

    return {
      ok: tests.every(test => test.ok),
      tests
    };
  }

  function formatScanDateTime_(value) {
    if (!value) return "recent inbox";

    const date = new Date(value);
    if (isNaN(date.getTime())) return String(value);

    return date.toLocaleString("en-GB", {
      day: "2-digit",
      month: "short",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  window.setView = setView;
  window.openSettingsModal = openSettingsModal;
  window.closeSettingsModal = closeSettingsModal;
  window.selectSettingsTab = selectSettingsTab;
  window.resetCurrentSettingsTab = resetCurrentSettingsTab;
  window.saveSettings = saveSettings;
  window.openScanModal = openScanModal;
  window.loadBookings = loadBookings;
  window.renderBookings = renderBookings;
  window.toggleTheme = toggleTheme;
  window.createCalendar = createCalendar;
  window.closeCalendarAttendeesDialog = closeCalendarAttendeesDialog;
  window.submitCalendarAttendeesDialog = submitCalendarAttendeesDialog;
  window.changeCalendarWeek = changeCalendarWeek;
  window.goToCurrentWeek = goToCurrentWeek;
  window.runDashboardClientTests = runDashboardClientTests;
  window.closeAdminPinModal = closeAdminPinModal;
  window.submitAdminPin = submitAdminPin;
</script>
