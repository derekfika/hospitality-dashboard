<script>
  const state={bookings:[],today:localIso(new Date())};
  document.getElementById("search").addEventListener("input",renderHistory);
  document.getElementById("pinForm").addEventListener("submit",event=>{event.preventDefault();unlock(document.getElementById("pinInput").value)});
  const rememberedPin=sessionStorage.getItem("mnk-portal-pin");
  if(rememberedPin)unlock(rememberedPin);

  function unlock(pin){const button=document.getElementById("pinButton");const error=document.getElementById("pinError");button.disabled=true;button.textContent="Checking…";error.hidden=true;google.script.run.withSuccessHandler(data=>{sessionStorage.setItem("mnk-portal-pin",pin);document.getElementById("pinGate").hidden=true;start(data)}).withFailureHandler(failure=>{sessionStorage.removeItem("mnk-portal-pin");button.disabled=false;button.textContent="Open dashboard";error.textContent=(failure&&failure.message)||"That PIN could not be checked.";error.hidden=false;document.getElementById("pinInput").select()}).getClientPortalData(pin)}

  function start(data){state.bookings=data.bookings||[];document.getElementById("welcome").textContent="Welcome back, "+(data.viewer.name||"there")+". Here’s your MNK hospitality at a glance.";if(data.site.bookingUrl){const b=document.getElementById("bookButton");b.href=data.site.bookingUrl;b.hidden=false}const s=document.getElementById("supportLink");s.href="mailto:"+data.site.supportEmail;document.getElementById("loading").hidden=true;document.getElementById("portal").hidden=false;renderAll()}
  function renderAll(){const upcoming=state.bookings.filter(b=>b.eventDate>=state.today&&b.status!=="Cancelled").sort(byDate);const history=state.bookings.filter(b=>b.eventDate<state.today||b.status==="Cancelled").sort((a,b)=>-byDate(a,b));const week=weekBounds(new Date());const weekRows=state.bookings.filter(b=>b.eventDate>=week.start&&b.eventDate<=week.end&&b.status!=="Cancelled");document.getElementById("weekBookings").textContent=weekRows.length;document.getElementById("weekPax").textContent=sumPax(weekRows).toLocaleString("en-GB");document.getElementById("nextBooking").textContent=upcoming.length?shortDate(upcoming[0].eventDate):"—";document.getElementById("upcoming").innerHTML=upcoming.length?upcoming.map(card).join(""):empty("No upcoming bookings.");state.history=history;renderHistory()}
  function renderHistory(){const q=document.getElementById("search").value.trim().toLowerCase();const rows=(state.history||[]).filter(b=>!q||[b.bookingId,b.serviceType,b.location,b.floor,b.room,b.eventDate].join(" ").toLowerCase().includes(q));document.getElementById("history").innerHTML=rows.length?rows.map(card).join(""):empty(q?"No previous bookings match that search.":"Your previous bookings will appear here.")}
  function card(b){const place=[b.location,b.floor&&"Floor "+b.floor,b.room].filter(Boolean).join(" · ");return `<article class="booking"><div class="date"><strong>${escapeHtml(day(b.eventDate))}</strong><span>${escapeHtml(shortDate(b.eventDate))}${b.startTime?" · "+escapeHtml(b.startTime):""}</span></div><div><h3>${escapeHtml(b.serviceType||"Hospitality")}</h3><span class="ref">${escapeHtml(b.bookingId)}</span><br><span class="status ${b.status==="Cancelled"?"cancelled":""}">${escapeHtml(b.status)}</span></div><div class="place">${escapeHtml(place||"Location to be confirmed")}</div><div class="pax"><strong>${Number(b.pax||0)}</strong><div class="meta">pax</div></div></article>`}
  function showError(error){document.getElementById("loading").hidden=true;const el=document.getElementById("error");el.hidden=false;el.textContent=(error&&error.message)||"We could not load your bookings. Please contact the Fika at MNK team."}
  function byDate(a,b){return String(a.eventDate+" "+a.startTime).localeCompare(String(b.eventDate+" "+b.startTime))}function sumPax(rows){return rows.reduce((n,b)=>n+Number(b.pax||0),0)}function localIso(d){return [d.getFullYear(),String(d.getMonth()+1).padStart(2,"0"),String(d.getDate()).padStart(2,"0")].join("-")}function weekBounds(now){const d=new Date(now);const offset=(d.getDay()+6)%7;const start=new Date(d);start.setDate(d.getDate()-offset);const end=new Date(start);end.setDate(start.getDate()+6);return{start:localIso(start),end:localIso(end)}}function parsedDate(value){return new Date(value+"T12:00:00")}function day(value){return parsedDate(value).toLocaleDateString("en-GB",{weekday:"short"})}function shortDate(value){return parsedDate(value).toLocaleDateString("en-GB",{day:"numeric",month:"short"})}function empty(message){return `<div class="empty">${escapeHtml(message)}</div>`}function escapeHtml(value){return String(value==null?"":value).replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]))}
</script>
