<script>
  const state={bookings:[],today:localIso(new Date()),calendarStart:startOfWeek(new Date()),openBooking:""};
  document.getElementById("search").addEventListener("input",renderHistory);
  document.getElementById("pinForm").addEventListener("submit",event=>{event.preventDefault();unlock(document.getElementById("pinInput").value)});
  document.getElementById("pinInput").addEventListener("input",event=>{event.target.value=event.target.value.replace(/\D/g,"").slice(0,4);if(event.target.value.length===4)unlock(event.target.value)});
  document.getElementById("previousWeek").addEventListener("click",()=>moveWeek(-7));document.getElementById("nextWeek").addEventListener("click",()=>moveWeek(7));document.getElementById("thisWeek").addEventListener("click",()=>{state.calendarStart=startOfWeek(new Date());renderCalendar();renderStats()});
  setTimeout(()=>document.getElementById("pinInput").focus(),0);
  const rememberedPin=sessionStorage.getItem("mnk-portal-pin");
  if(rememberedPin)unlock(rememberedPin);

  function unlock(pin){const button=document.getElementById("pinButton");if(button.disabled)return;const error=document.getElementById("pinError");button.disabled=true;button.textContent="Checking…";error.hidden=true;google.script.run.withSuccessHandler(data=>{sessionStorage.setItem("mnk-portal-pin",pin);document.getElementById("pinGate").hidden=true;start(data)}).withFailureHandler(failure=>{sessionStorage.removeItem("mnk-portal-pin");button.disabled=false;button.textContent="Open dashboard";error.textContent=(failure&&failure.message)||"That PIN could not be checked.";error.hidden=false;document.getElementById("pinInput").select()}).getClientPortalData(pin)}

  function start(data){state.bookings=data.bookings||[];document.getElementById("welcome").textContent="Welcome back, "+(data.viewer.name||"there")+". Here’s your MNK hospitality at a glance.";if(data.site.bookingUrl){const b=document.getElementById("bookButton");b.href=data.site.bookingUrl;b.hidden=false}const s=document.getElementById("supportLink");s.href="mailto:"+data.site.supportEmail;document.getElementById("loading").hidden=true;document.getElementById("portal").hidden=false;renderAll()}
  function renderAll(){const upcoming=state.bookings.filter(b=>b.eventDate>=state.today&&b.status!=="Cancelled").sort(byDate);const history=state.bookings.filter(b=>b.eventDate<state.today||b.status==="Cancelled").sort((a,b)=>-byDate(a,b));document.getElementById("upcoming").innerHTML=upcoming.length?upcoming.map(card).join(""):empty("No upcoming bookings.");state.history=history;renderHistory();renderCalendar();renderStats()}
  function renderStats(){const start=new Date(state.calendarStart);const end=new Date(start);end.setDate(start.getDate()+4);const startIso=localIso(start);const endIso=localIso(end);const rows=state.bookings.filter(b=>b.eventDate>=startIso&&b.eventDate<=endIso&&b.status!=="Cancelled");const range=`${shortDate(startIso)}–${shortDate(endIso)}`;document.getElementById("bookingsStatLabel").textContent=`Bookings · ${range}`;document.getElementById("paxStatLabel").textContent=`Pax · ${range}`;document.getElementById("drinksStatLabel").textContent=`Coffee / tea · ${range}`;document.getElementById("foodStatLabel").textContent=`Food · ${range}`;document.getElementById("weekBookings").textContent=rows.length;document.getElementById("weekPax").textContent=sumPax(rows).toLocaleString("en-GB");document.getElementById("weekDrinks").textContent=sumCategory(rows,"drink").toLocaleString("en-GB");document.getElementById("weekFood").textContent=sumCategory(rows,"food").toLocaleString("en-GB")}
  function renderHistory(){const q=document.getElementById("search").value.trim().toLowerCase();const rows=(state.history||[]).filter(b=>!q||[b.bookingId,b.serviceType,b.location,b.floor,b.room,b.eventDate].join(" ").toLowerCase().includes(q));document.getElementById("history").innerHTML=rows.length?rows.map(card).join(""):empty(q?"No previous bookings match that search.":"Your previous bookings will appear here.")}
  function card(b){const place=[b.location,b.floor&&"Floor "+b.floor,b.room].filter(Boolean).join(" · ");const open=state.openBooking===b.bookingId;return `<div class="booking-wrap ${open?"open":""}"><article class="booking" role="button" tabindex="0" onclick="toggleBooking('${escapeJs(b.bookingId)}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleBooking('${escapeJs(b.bookingId)}')}"><div class="date"><strong>${escapeHtml(day(b.eventDate))}</strong><span>${escapeHtml(shortDate(b.eventDate))}${b.startTime?" · "+escapeHtml(b.startTime):""}</span></div><div><h3>${escapeHtml(b.serviceType||"Hospitality")}</h3><span class="ref">${escapeHtml(b.bookingId)}</span><br><span class="status ${b.status==="Cancelled"?"cancelled":""}">${escapeHtml(b.status)}</span><span class="expand-hint">${open?"Hide":"View"} line items</span></div><div class="place">${escapeHtml(place||"Location to be confirmed")}</div><div class="pax"><strong>${Number(b.pax||0)}</strong><div class="meta">pax</div></div></article>${open?bookingDetail(b):""}</div>`}
  function bookingDetail(b){const items=b.items||[];return `<div class="booking-detail"><div class="line-items">${items.length?items.map(item=>`<div class="line-item"><div><strong>${escapeHtml(item.name)}</strong><br><span>${escapeHtml([item.section,item.detail,item.time].filter(Boolean).join(" · "))}</span></div><b>${Number(item.quantity||0).toLocaleString("en-GB")}×</b></div>`).join(""):empty("No line items are available for this booking.")}</div></div>`}
  function toggleBooking(id){state.openBooking=state.openBooking===id?"":id;renderAll()}
  function renderCalendar(){const start=new Date(state.calendarStart);const end=new Date(start);end.setDate(start.getDate()+4);document.getElementById("calendarTitle").textContent=`${shortDate(localIso(start))} – ${shortDate(localIso(end))}`;const days=[];for(let i=0;i<5;i++){const date=new Date(start);date.setDate(start.getDate()+i);const iso=localIso(date);const rows=state.bookings.filter(b=>b.eventDate===iso&&b.status!=="Cancelled").sort(byDate);days.push(`<article class="calendar-day ${iso===state.today?"today":""}"><div class="calendar-date"><strong>${date.toLocaleDateString("en-GB",{weekday:"long"})}</strong><span>${shortDate(iso)}</span></div><div class="day-totals"><span>${sumPax(rows)} pax</span><span>${sumCategory(rows,"drink")} coffee/tea</span><span>${sumCategory(rows,"food")} food</span></div>${rows.map(b=>`<button class="calendar-event" type="button" onclick="openFromCalendar('${escapeJs(b.bookingId)}')"><strong>${escapeHtml((b.startTime?b.startTime+" · ":"")+(b.serviceType||"Hospitality"))}</strong><span>${escapeHtml([b.floor&&"Floor "+b.floor,b.room].filter(Boolean).join(" · "))}</span></button>`).join("")||'<span class="meta">No bookings</span>'}</article>`)}document.getElementById("calendar").innerHTML=days.join("")}
  function openFromCalendar(id){state.openBooking=id;const booking=state.bookings.find(b=>b.bookingId===id);if(booking&&booking.eventDate<state.today){document.getElementById("search").value="";renderHistory();document.getElementById("history").scrollIntoView({behavior:"smooth"})}else{document.getElementById("upcoming").innerHTML=state.bookings.filter(b=>b.eventDate>=state.today&&b.status!=="Cancelled").sort(byDate).map(card).join("");document.getElementById("upcoming").scrollIntoView({behavior:"smooth"})}}
  function moveWeek(days){state.calendarStart.setDate(state.calendarStart.getDate()+days);renderCalendar();renderStats()}
  function sumCategory(rows,type){return rows.reduce((total,b)=>total+(b.items||[]).reduce((sum,item)=>sum+(itemType(item)===type?Number(item.quantity||0):0),0),0)}function itemType(item){const text=((item.section||"")+" "+(item.name||"")).toLowerCase();if(/coffee|tea|hot drink/.test(text))return"drink";if(/water|juice|smoothie|soft drink|beverage|drinks?|wine|beer/.test(text))return"other";return"food"}
  function showError(error){document.getElementById("loading").hidden=true;const el=document.getElementById("error");el.hidden=false;el.textContent=(error&&error.message)||"We could not load your bookings. Please contact the Fika at MNK team."}
  function byDate(a,b){return String(a.eventDate+" "+a.startTime).localeCompare(String(b.eventDate+" "+b.startTime))}function sumPax(rows){return rows.reduce((n,b)=>n+Number(b.pax||0),0)}function localIso(d){return [d.getFullYear(),String(d.getMonth()+1).padStart(2,"0"),String(d.getDate()).padStart(2,"0")].join("-")}function startOfWeek(now){const d=new Date(now);d.setHours(12,0,0,0);d.setDate(d.getDate()-((d.getDay()+6)%7));return d}function weekBounds(now){const start=startOfWeek(now);const end=new Date(start);end.setDate(start.getDate()+6);return{start:localIso(start),end:localIso(end)}}function parsedDate(value){return new Date(value+"T12:00:00")}function day(value){return parsedDate(value).toLocaleDateString("en-GB",{weekday:"short"})}function shortDate(value){return parsedDate(value).toLocaleDateString("en-GB",{day:"numeric",month:"short"})}function empty(message){return `<div class="empty">${escapeHtml(message)}</div>`}function escapeJs(value){return String(value||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'")}function escapeHtml(value){return String(value==null?"":value).replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]))}
</script>
