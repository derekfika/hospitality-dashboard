<style>
  :root{--ink:#063f59;--accent:#177492;--pale:#edf8fb;--line:#d8e8ed;--muted:#60747c;--white:#fff;--shadow:0 18px 45px rgba(7,80,111,.10)}
  .gate[hidden]{display:none}
  *{box-sizing:border-box} body{margin:0;background:linear-gradient(145deg,#f7fcfd 0,#e8f5f8 100%);color:var(--ink);font-family:Inter,Arial,sans-serif;min-height:100vh}.gate{position:fixed;inset:0;z-index:20;display:grid;place-items:center;padding:20px;background:linear-gradient(145deg,#063f59 0,#177492 100%)}.pin-card{width:min(420px,100%);padding:38px;border-radius:24px;background:#fff;box-shadow:0 24px 70px rgba(0,0,0,.25)}.pin-card h1{margin:10px 0;font-family:Georgia,serif;font-size:38px;font-weight:400}.pin-card p{color:var(--muted);line-height:1.5}.pin-card label{display:block;margin:24px 0 7px;font-size:12px;font-weight:800}.pin-card input{width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;font-size:20px;letter-spacing:.2em}.pin-card button{width:100%;margin-top:12px;padding:14px;border:0;border-radius:12px;background:var(--ink);color:#fff;font-weight:800;cursor:pointer}.pin-card button:disabled{opacity:.6}.pin-card .pin-error{margin:12px 0 0;color:#9a2929;font-size:13px}.shell{width:min(1100px,calc(100% - 32px));margin:auto;padding:40px 0 64px}.hero{display:flex;justify-content:space-between;align-items:end;gap:24px;padding:36px 40px;border-radius:26px;background:var(--ink);color:#fff;box-shadow:var(--shadow)}.eyebrow{font-size:11px;font-weight:800;letter-spacing:.18em;color:#63c4d8}.hero h1{font-family:Georgia,serif;font-size:clamp(36px,7vw,66px);font-weight:400;line-height:.95;margin:12px 0}.hero p{margin:0;color:#cce3e9}.book{padding:13px 19px;border-radius:999px;background:#fff;color:var(--ink);text-decoration:none;font-weight:800;white-space:nowrap}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:22px 0}.stats article,.panel,.state{background:rgba(255,255,255,.94);border:1px solid var(--line);box-shadow:var(--shadow)}.stats article{border-radius:18px;padding:22px}.stats span{display:block;color:var(--muted);font-size:12px;font-weight:700}.stats strong{display:block;margin-top:10px;font-family:Georgia,serif;font-size:34px;font-weight:400}.panel{margin-top:18px;border-radius:22px;padding:26px}.panel-head{display:flex;justify-content:space-between;align-items:end;gap:16px;margin-bottom:18px}.panel h2{margin:6px 0 0;font-size:22px}.panel input{width:min(240px,100%);border:1px solid var(--line);border-radius:12px;padding:11px 14px;color:var(--ink)}.booking-list{display:grid;gap:10px}.booking{display:grid;grid-template-columns:90px 1.2fr .8fr 100px;gap:18px;align-items:center;padding:17px 18px;border-radius:15px;background:var(--pale);border:1px solid transparent}.booking:hover{border-color:#a9d5df}.date strong,.booking h3{display:block;margin:0 0 4px}.date span,.meta,.ref{font-size:12px;color:var(--muted)}.place{font-weight:700}.pax{text-align:right}.pax strong{font-size:20px}.status{display:inline-block;margin-top:5px;padding:4px 8px;border-radius:999px;background:#d5edf3;color:var(--ink);font-size:10px;font-weight:800}.status.cancelled{background:#f7dddd;color:#8a2424}.state{margin-top:22px;padding:35px;border-radius:20px;text-align:center}.error{color:#8a2424}.empty{padding:25px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:14px}footer{text-align:center;color:var(--muted);font-size:13px;margin-top:30px}footer a{color:var(--accent);font-weight:700}
