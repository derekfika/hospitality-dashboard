<script>
  let BOOKINGS = [];
  let BUSY_BOOKING_ID = "";
  let SORT_KEY = "date";
  let SORT_DIR = "asc";
  let OPEN_BOOKING_ID = "";
  let CURRENT_VIEW = "table";
  let HIGHLIGHT_BOOKING_ID = "";
  let CALENDAR_WEEK_START = getMonday_(new Date());

  document.addEventListener("DOMContentLoaded", loadBookings);

  function toggleTheme() {
    document.body.classList.toggle("theme-dark");
  }

  function jumpToBooking(bookingId) {
    CURRENT_VIEW = "table";
    HIGHLIGHT_BOOKING_ID = bookingId;

    setView("table");

    setTimeout(() => {
      const row = document.querySelector(`[data-booking-id="${bookingId}"]`);
      if (row) row.scrollIntoView({ behavior: "smooth", block: "center" });

      setTimeout(() => {
        HIGHLIGHT_BOOKING_ID = "";
        renderBookings();
      }, 2500);
    }, 100);
  }

  function loadBookings(showLoading = true) {
    if (showLoading) {
      showToast("Refreshing bookings…", "loading", true);
    }

    google.script.run
      .withSuccessHandler(data => {
        BOOKINGS = data || [];
        renderStats();
        renderCalendar();
        renderBookings();

        if (showLoading) {
          showToast("Bookings refreshed.", "success");
        }
      })
      .withFailureHandler(err => {
        showToast("Refresh failed: " + (err.message || err), "error");
      })
      .getDashboardBookings();
  }


  function renderCalendar() {
    const el = document.getElementById("calendarView");
    if (!el) return;

    const weekDays = getWorkingWeekDays_(CALENDAR_WEEK_START);
    const bookings = getVisibleBookings_();

    const weekStart = weekDays[0];
    const weekEnd = weekDays[4];

    document.getElementById("calendarWeekLabel").textContent =
      `Week commencing ${formatDateForCalendarLabel_(weekStart)}`;

    const grouped = {};

    weekDays.forEach(day => {
      grouped[toIsoDate_(day)] = [];
    });

    bookings.forEach(b => {
      const iso = getDisplayDate(b);
      if (!iso) return;

      if (!grouped[iso]) return;

      grouped[iso].push(b);
    });

    el.innerHTML = weekDays.map(day => {
      const iso = toIsoDate_(day);
      const bookingsForDay = grouped[iso] || [];
      const isToday =
        toIsoDate_(day) === toIsoDate_(new Date());



      return `
      <div class="calendar-day ${isToday ? 'today' : ''}">
        <div class="calendar-day-title">
          <div>${day.toLocaleDateString("en-GB", { weekday: "long" })}</div>
          <div class="calendar-date">${day.toLocaleDateString("en-GB", { day: "2-digit", month: "short" })}</div>
        </div>

        ${bookingsForDay.length
          ? bookingsForDay.map(b => renderCalendarCard_(b)).join("")
          : `<div class="muted">No bookings</div>`
        }
      </div>
    `;
    }).join("");
  }

  function getMonday_(date) {
    const d = new Date(date);
    d.setHours(0, 0, 0, 0);

    const day = d.getDay(); // Sunday = 0
    const diff = day === 0 ? -6 : 1 - day;

    d.setDate(d.getDate() + diff);
    return d;
  }

  function getWorkingWeekDays_(monday) {
    return [0, 1, 2, 3, 4].map(offset => {
      const d = new Date(monday);
      d.setDate(d.getDate() + offset);
      return d;
    });
  }

  function changeCalendarWeek(direction) {
    CALENDAR_WEEK_START.setDate(CALENDAR_WEEK_START.getDate() + direction * 7);
    renderCalendar();
  }

  function goToCurrentWeek() {
    CALENDAR_WEEK_START = getMonday_(new Date());
    renderCalendar();
  }

  function toIsoDate_(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  function formatDateForCalendarLabel_(date) {
    return date.toLocaleDateString("en-GB", {
      day: "2-digit",
      month: "long",
      year: "numeric"
    });
  }

  function getVisibleBookings_() {
    const searchEl = document.getElementById("searchInput");
    const search = searchEl ? searchEl.value.toLowerCase() : "";

    const selectedStatuses = Array.from(
      document.querySelectorAll(".status-filters input:checked")
    ).map(cb => cb.value);

    let rows = BOOKINGS.slice();

    if (selectedStatuses.length) {
      rows = rows.filter(b => selectedStatuses.includes(b.Status));
    }

    if (search) {
      rows = rows.filter(b => {
        const text = [
          b.ClientCompany,
          b.HostName,
          b.HostEmail,
          b.ServiceType,
          b.Location,
          b.Floor,
          b.Status
        ].join(" ").toLowerCase();

        return text.includes(search);
      });
    }

    return rows;
  }

  function renderCalendarCard_(b) {
    return `
    <div class="calendar-card status-${b.Status}" onclick="jumpToBooking('${b.BookingID}')">
      <div class="calendar-time">${escapeHtml(getDisplayTime(b) || "—")}</div>
      <strong>${escapeHtml(b.ClientCompany || "—")}</strong>
      <div class="calendar-meta">
        ${escapeHtml(b.ServiceType || "")} · ${escapeHtml(b.Pax || "")} pax
      </div>
      <div class="calendar-meta">${escapeHtml(b.Floor || "")}</div>
    </div>
  `;
  }

  function getWeekdayName_(isoDate) {
    if (!isoDate) return "";

    let d;

    if (/^\d{4}-\d{2}-\d{2}$/.test(isoDate)) {
      const [y, m, day] = isoDate.split("-").map(Number);
      d = new Date(y, m - 1, day);
    } else {
      d = new Date(isoDate);
    }

    if (isNaN(d.getTime())) return "";

    return d.toLocaleDateString("en-GB", { weekday: "long" });
  }
  function setView(view) {
    CURRENT_VIEW = view;

    document.getElementById("tableView").classList.toggle("hidden", view !== "table");
    document.getElementById("calendarView").classList.toggle("hidden", view !== "calendar");
    document.getElementById("calendarControls").classList.toggle("hidden", view !== "calendar");

    if (view === "calendar") {
      renderCalendar();
    } else {
      renderBookings();
    }
  }
  function jumpToBooking(bookingId) {
    HIGHLIGHT_BOOKING_ID = bookingId;

    renderBookings();

    setTimeout(() => {
      const row = document.querySelector(
        `[data-booking-id="${bookingId}"]`
      );

      if (row) {
        row.scrollIntoView({
          behavior: "smooth",
          block: "center"
        });
      }

      OPEN_BOOKING_ID = bookingId;
      renderBookings();

    }, 100);
  }
  function archivePastBookings() {
    const bookings = getDashboardBookings();

    let archived = 0;

    bookings.forEach(row => {

      if (row.Status === "ARCHIVED") return;

      const booking = row.ParsedBooking || {};

      if (!booking.eventDate) return;

      const eventDate = new Date(booking.eventDate);
      eventDate.setHours(0, 0, 0, 0);

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      if (eventDate < today) {

        booking.status = "ARCHIVED";
        booking.archivedAt = new Date();
        booking.updatedAt = new Date();

        writeBookingObjectToExistingRow_(
          row.RowNumber,
          booking
        );

        archived++;
      }

    });

    return archived;
  }

  function resetCalendar(bookingId) {
    const row = BOOKINGS.find(x => x.BookingID === bookingId);
    if (!row) return;

    google.script.run
      .withSuccessHandler(() => {
        showToast("Calendar link reset.", "success");
        loadBookings(false);
      })
      .withFailureHandler(err => {
        showToast("Reset failed: " + (err.message || err), "error");
      })
      .resetCalendarForRow(row.RowNumber);
  }

  let TOAST_TIMER = null;

  function showToast(message, type = "success", persist = false) {
    const el = document.getElementById("toast");

    if (!el) {
      console.log("Toast:", message);
      return;
    }

    if (TOAST_TIMER) {
      clearTimeout(TOAST_TIMER);
      TOAST_TIMER = null;
    }

    el.className = `toast ${type}`;
    el.textContent = message;
    el.classList.remove("hidden");

    if (!persist) {
      TOAST_TIMER = setTimeout(() => {
        el.classList.add("hidden");
      }, 3500);
    }
  }

  function hideToast() {
    const el = document.getElementById("toast");
    if (!el) return;

    if (TOAST_TIMER) {
      clearTimeout(TOAST_TIMER);
      TOAST_TIMER = null;
    }

    el.classList.add("hidden");
  }

  function renderStats() {
    const counts = {
      READY: 0,
      NEEDS_REVIEW: 0,
      CONFIRMED: 0,
      CANCELLED: 0,
      ARCHIVED: 0
    };

    BOOKINGS.forEach(row => {
      const status = row.Status || "NEEDS_REVIEW";
      if (counts[status] !== undefined) counts[status]++;
    });

    document.getElementById("stats").innerHTML = `
    <div class="stat-card">
      <strong>${BOOKINGS.length}</strong>
      <span>Total</span>
    </div>
    <div class="stat-card status-ready">
      <strong>${counts.READY}</strong>
      <span>Ready</span>
    </div>
    <div class="stat-card status-review">
      <strong>${counts.NEEDS_REVIEW}</strong>
      <span>Needs Review</span>
    </div>
    <div class="stat-card status-confirmed">
      <strong>${counts.CONFIRMED}</strong>
      <span>Confirmed</span>
    </div>
    <div class="stat-card status-cancelled">
      <strong>${counts.CANCELLED}</strong>
      <span>Cancelled</span>
    </div>
    <div class="stat-card status-archived">
      <strong>${counts.ARCHIVED}</strong>
      <span>Archived</span>
    </div>
  `;
  }

  function getSortValue(b, key) {
    switch (key) {
      case "date":
        return getDisplayDate(b) || "";

      case "time":
        return getDisplayTime(b) || "";

      case "company":
        return String(b.ClientCompany || "").toLowerCase();

      case "pax":
        return Number(b.Pax || 0);

      case "service":
        return String(b.ServiceType || "").toLowerCase();

      case "floor":
        return String(b.Floor || "").toLowerCase();

      case "total":
        return Number(b.TotalPrice || 0);

      case "status":
        return String(b.Status || "").toLowerCase();

      default:
        return "";
    }
  }

  function setSort(key) {
    if (SORT_KEY === key) {
      SORT_DIR = SORT_DIR === "asc" ? "desc" : "asc";
    } else {
      SORT_KEY = key;
      SORT_DIR = "asc";
    }

    renderBookings();
  }

  function renderBookings() {
    const search = document.getElementById("searchInput").value.toLowerCase();

    let rows = BOOKINGS.slice();

    const selectedStatuses = Array.from(
      document.querySelectorAll(".status-filters input:checked")
    ).map(cb => cb.value);

    if (selectedStatuses.length) {
      rows = rows.filter(b => selectedStatuses.includes(b.Status));
    }

    if (search) {
      rows = rows.filter(b => {
        const text = [
          b.ClientCompany,
          b.HostName,
          b.HostEmail,
          b.ServiceType,
          b.Location,
          b.Floor,
          b.Status
        ].join(" ").toLowerCase();

        return text.includes(search);
      });
    }

    rows.sort((a, b) => {
      const aa = getSortValue(a, SORT_KEY);
      const bb = getSortValue(b, SORT_KEY);

      if (aa < bb) return SORT_DIR === "asc" ? -1 : 1;
      if (aa > bb) return SORT_DIR === "asc" ? 1 : -1;
      return 0;
    });

    const html = rows.map(b => `
    <tr data-booking-id="${b.BookingID}"
    class="status-${b.Status} ${HIGHLIGHT_BOOKING_ID === b.BookingID ? "row-highlight" : ""}"
    ondblclick="toggleDetail('${b.BookingID}')">
    <td>${escapeHtml(formatDate(getDisplayDate(b)))}</td>
    <td>${escapeHtml(getDisplayTime(b) || "—")}</td>
    <td>
      <strong>${escapeHtml(b.ClientCompany || "—")}</strong>
      <div class="muted">${escapeHtml(b.HostEmail || "")}</div>
    </td>
    <td>${escapeHtml(b.Pax || "—")}</td>
    <td>${escapeHtml(b.ServiceType || "—")}</td>
    <td>${escapeHtml(b.Floor || "—")}</td>
    <td>£${Number(b.TotalPrice || 0).toFixed(2)}</td>
    <td><span class="badge status-${escapeHtml(b.Status)}">${escapeHtml(b.Status)}</span></td>
    <td class="missing">${escapeHtml((b.ValidationErrorsParsed || []).join(", "))}</td>
    <td>${renderActionButtons(b)}</td>
  </tr>

  ${OPEN_BOOKING_ID === b.BookingID ? `
    <tr class="detail-row">
      <td colspan="10">
        ${renderDetailPanel(b)}
      </td>
    </tr>
  ` : ""}
`).join("");
    document.getElementById("bookingRows").innerHTML =
      html || `<tr><td colspan="11" class="loading">No bookings found.</td></tr>`;
  }

  function toggleDetail(bookingId) {
    if (OPEN_BOOKING_ID === bookingId) {
      OPEN_BOOKING_ID = "";
      renderBookings();
      requestAnimationFrame(() => {
        const detailRow = document.getElementById(`detail-${bookingId}`);

        if (!detailRow) return;

        const rect = detailRow.getBoundingClientRect();

        window.scrollTo({
          top: window.scrollY + rect.top - (window.innerHeight * 0.25),
          behavior: "smooth"
        });

        detailRow.classList.add("detail-row-highlight");

        setTimeout(() => {
          detailRow.classList.remove("detail-row-highlight");
        }, 800);
      });
      return;
    }

    OPEN_BOOKING_ID = bookingId;

    renderBookings();

    requestAnimationFrame(() => {
      const detailRow = document.getElementById(`detail-${bookingId}`);

      if (!detailRow) return;

      const rect = detailRow.getBoundingClientRect();

      window.scrollTo({
        top: window.scrollY + rect.top - (window.innerHeight * 0.25),
        behavior: "smooth"
      });

      detailRow.classList.add("detail-row-highlight");

      setTimeout(() => {
        detailRow.classList.remove("detail-row-highlight");
      }, 800);
    });
  }

  function icon(name) {
    return (typeof ICONS !== "undefined" && ICONS[name]) ? ICONS[name] : "";
  }

  function actionSpinner(bookingId) {
    if (BUSY_BOOKING_ID !== bookingId) return "";
    return `<span class="action-spinner"></span>`;
  }

  function renderActionButtons(b) {
    const isArchived = b.Status === "ARCHIVED";
    if (isArchived) {
      return `
    <div class="action-cluster archived-actions">

      <button class="icon-btn"
        title="Open Quote"
        ${hasQuote ? "" : "disabled"}
        onclick="event.stopPropagation(); openQuote('${b.BookingID}')">
        ${ICONS.open || "Open"}
      </button>

      <button class="icon-btn"
        title="Print Quote"
        ${hasQuote ? "" : "disabled"}
        onclick="event.stopPropagation(); printQuote('${b.BookingID}')">
        ${ICONS.print || "Print"}
      </button>

      <span class="archived-pill">Archived</span>

    </div>
  `;
    }

    const parsed = b.ParsedBooking || {};

    const hasQuote =
      !!b.QuoteURL ||
      !!parsed.quoteUrl;

    const quoteStale =
      parsed.quoteStale === true ||
      parsed.quoteStale === "TRUE";

    const canGenerateQuote =
      !hasQuote || quoteStale; const hasCalendar = !!b.CalendarEventId || !!(b.ParsedBooking && b.ParsedBooking.calendarEventId);

    return `
    <div class="action-cluster">
      <button class="icon-btn" title="Edit" onclick="event.stopPropagation(); toggleDetail('${b.BookingID}')">
        ${ICONS.edit || "Edit"}
      </button>

      <button
  class="icon-btn ${quoteStale ? "warning" : ""}"
  title="${quoteStale ? "Regenerate outdated quote" : hasQuote ? "Quote already generated" : "Generate quote"}"
  ${canGenerateQuote ? "" : "disabled"}
  onclick="event.stopPropagation(); handleQuoteClick('${b.BookingID}')">
  ${ICONS.quote || "Quote"}
</button>

      <button class="icon-btn" title="Open Quote" ${hasQuote ? "" : "disabled"} onclick="event.stopPropagation(); openQuote('${b.BookingID}')">
        ${ICONS.open || "Open"}
      </button>

      <button class="icon-btn" title="Create Calendar Event" ${hasCalendar ? "disabled" : ""} onclick="event.stopPropagation(); createCalendar('${b.BookingID}')">
        ${ICONS.calendar || "Calendar"}
      </button>

      <button class="icon-btn" title="Confirm Booking" onclick="event.stopPropagation(); confirmBooking('${b.BookingID}')">
        ${ICONS.confirm || "Confirm"}
      </button>

      <button class="icon-btn danger" title="Cancel Booking" onclick="event.stopPropagation(); openCancelDialog('${b.BookingID}')">
        ${ICONS.cancel || "Cancel"}
      </button>
     ${actionSpinner(b.BookingID)}
    </div>
  `;
  }

  function confirmBooking(bookingId) {
    const row = BOOKINGS.find(x => x.BookingID === bookingId);
    if (!row) return;

    setBusy(bookingId);

    showToast("Sending confirmation email...", "loading", true);

    google.script.run
      .withSuccessHandler(res => {
        clearBusy();

        showToast(
          `Booking confirmed. Test email sent to ${res.sentTo}.`,
          "success"
        );

        loadBookings(false);
      })
      .withFailureHandler(err => {
        clearBusy();

        console.error(err);

        showToast(
          "Confirmation failed: " + (err.message || err),
          "error"
        );
      })
      .confirmBookingForRow(row.RowNumber);
  }

  function createCalendar(bookingId) {
    const row = BOOKINGS.find(x => x.BookingID === bookingId);
    if (!row) return;

    setBusy(bookingId);

    google.script.run
      .withSuccessHandler(res => {
        clearBusy();
        showToast("Calendar event created.", "success");
        loadBookings();
      })
      .withFailureHandler(err => {
        showBusy();
        showToast("Calendar failed: " + (err.message || err), "error");
      })
      .createCalendarEventForRow(row.RowNumber);
  }

  function cancelBooking(bookingId) {
    const row = BOOKINGS.find(x => x.BookingID === bookingId);
    if (!row) return;

    const ok = confirm(
      "Are you sure you want to cancel this booking?\n\nThis will remove the calendar event and email attendees."
    );

    if (!ok) return;

    setBusy(bookingId);

    google.script.run
      .withSuccessHandler(() => {
        clearBusy();
        showToast("Booking cancelled and calendar event removed.", "success");
        loadBookings(false);
      })
      .withFailureHandler(err => {
        clearBusy();
        showToast("Cancel failed: " + (err.message || err), "error");
      })
      .cancelBookingForRow(row.RowNumber);
  }

  let CANCEL_BOOKING_ID = null;

  function openCancelDialog(bookingId) {
    console.log("openCancelDialog", bookingId);
    CANCEL_BOOKING_ID = bookingId;

    const modal = document.getElementById("cancelModal");
    if (!modal) return;

    document.getElementById("cancel-send-email").checked = false;
    document.getElementById("cancel-remove-calendar").checked = true;

    modal.classList.remove("hidden");
  }

  function closeCancelDialog() {
    CANCEL_BOOKING_ID = null;
    document.getElementById("cancelModal").classList.add("hidden");
  }

  function continueCancelDialog() {
    const sendEmail = document.getElementById("cancel-send-email").checked;
    const removeCalendar = document.getElementById("cancel-remove-calendar").checked;
    console.log("continueCancelDialog");
    const summary = [
      "You are about to cancel this booking.",
      "",
      `Send cancellation email: ${sendEmail ? "YES" : "NO"}`,
      `Remove from calendar: ${removeCalendar ? "YES" : "NO"}`,
      "",
      "This cannot be undone."
    ].join("\n");

    const ok = confirm(summary);
    if (!ok) return;

    confirmCancelBooking({
      sendEmail,
      removeCalendar
    });
  }

  function confirmCancelBooking(options) {
    const row = BOOKINGS.find(x => x.BookingID === CANCEL_BOOKING_ID);
    if (!row) return;

    closeCancelDialog();
    console.log("confirmCancelBooking", CANCEL_BOOKING_ID, options);
    setBusy(row.BookingID);
    showToast("Cancelling booking…", "loading", true);

    google.script.run
      .withSuccessHandler(res => {
        clearBusy();
        console.log("Cancel result:", res);

        showToast("Booking cancelled.", "success");
        loadBookings(false);
      })
      .withFailureHandler(err => {
        clearBusy();
        console.error("Cancel failed:", err);

        showToast("Cancel failed: " + (err.message || err), "error");
      })
      .cancelBookingForRow(row.RowNumber, options);
  }

  function renderDetailPanel(row) {
    const b = row.ParsedBooking || {};
    const items = b.items || row.ItemsParsed || [];

    return `
    <div class="inline-detail">
      <div class="detail-header">
        <h3>${escapeHtml(b.clientCompany || "")}</h3>

        <div style="display:flex; gap:8px;">
          <button class="button" onclick="saveDetail('${row.BookingID}')">
            Save
          </button>

          <button class="button"
            onclick="toggleDetail('${row.BookingID}')">
            Close
          </button>
        </div>
      </div>

      <div class="edit-grid">
        ${editField("clientCompany", "Company", b.clientCompany)}
        ${editField("hostName", "Host name", b.hostName)}
        ${editField("hostEmail", "Host email", b.hostEmail)}
        ${editField("pax", "Pax", b.pax)}
        ${editField("eventDate", "Event date", b.eventDate, "date")}
        ${editField("serviceTimes", "Service time", (b.serviceTimes || []).join(" / "))}
        ${editField("serviceType", "Service type", b.serviceType)}
        ${editField("location", "Location", b.location)}
        ${editField("floor", "Floor", b.floor)}
      </div>
      <label class="field full">
  <span>Dietary / allergen info</span>
  <textarea id="edit-notes">${escapeHtml(b.notes || "")}</textarea>
</label>

<h3 style="margin-top:20px;">Line items</h3>

<div class="items">
  ${items.map((item, i) => `
    <div class="item">
      <div class="edit-grid">
        ${editItemField(i, "time", "Time", item.time)}
        ${editItemField(i, "section", "Section", item.section)}
        ${editItemField(i, "name", "Item", item.name)}
        ${editItemField(i, "qty", "Qty", item.qty)}
      </div>

      <label class="field full">
        <span>Detail</span>
        <textarea data-item="${i}" data-key="detail">${escapeHtml(item.detail || "")}</textarea>
      </label>

      <label class="field full">
        <span>Info</span>
        <textarea data-item="${i}" data-key="info">${escapeHtml(item.info || "")}</textarea>
      </label>

      <label class="field full">
        <span>Comment</span>
        <textarea data-item="${i}" data-key="comment">${escapeHtml(item.comment || "")}</textarea>
      </label>
    </div>
  `).join("")}
</div>
    </div>
  `;
  }

  function openQuote(bookingId) {
    const row = BOOKINGS.find(x => x.BookingID === bookingId);
    if (!row) return;

    const url =
      row.QuoteURL ||
      (row.ParsedBooking && row.ParsedBooking.quoteUrl);

    if (!url) {
      showToast("No URL found!", "error")
      return;
    }

    window.open(url, "_blank");
  }

  function printQuote(bookingId) {
    const row = BOOKINGS.find(x => x.BookingID === bookingId);
    if (!row) return;

    setBusy(bookingId);

    google.script.run
      .withSuccessHandler(() => {
        clearBusy();
        showToast("Quote sent to printer.", "success");
        loadBookings(false);
      })
      .withFailureHandler(err => {
        clearBusy();
        showToast("Print failed: " + (err.message || err), "error");
      })
      .printQuoteForRow(row.RowNumber);
  }

  function saveDetail(bookingId) {
    const row = BOOKINGS.find(x => x.BookingID === bookingId);
    if (!row) return;

    const hadQuote = !!booking.quoteUrl;

    if (hadQuote) {
      booking.quoteStale = true;
    }

    if (
      dateOrTimeChanged &&
      (booking.calendarEventId || booking.calendarEventUrl)
    ) {
      booking.calendarStale = true;
    }

    const items = Array.from(document.querySelectorAll("[data-item]"))
      .reduce((acc, el) => {
        const i = Number(el.dataset.item);
        const key = el.dataset.key;

        if (!acc[i]) acc[i] = {};
        acc[i][key] = el.value;

        return acc;
      }, []);

    const existingItems =
      (row.ParsedBooking && row.ParsedBooking.items && row.ParsedBooking.items.length)
        ? row.ParsedBooking.items
        : (row.ItemsParsed || []);

    const serviceTimesText = document.getElementById("edit-serviceTimes").value.trim();

    const serviceTimes = serviceTimesText
      ? serviceTimesText
        .split("/")
        .map(s => s.trim())
        .filter(Boolean)
      : [];

    const patch = {
      clientCompany: document.getElementById("edit-clientCompany").value.trim(),
      hostName: document.getElementById("edit-hostName").value.trim(),
      hostEmail: document.getElementById("edit-hostEmail").value.trim(),
      pax: document.getElementById("edit-pax").value.trim(),
      eventDate: document.getElementById("edit-eventDate").value.trim(),
      serviceTimes: serviceTimes,
      serviceType: document.getElementById("edit-serviceType").value.trim(),
      location: document.getElementById("edit-location").value.trim(),
      floor: document.getElementById("edit-floor").value.trim(),
      notes: document.getElementById("edit-notes") ? document.getElementById("edit-notes").value.trim() : "",
      items: items.length ? items : existingItems
    };

    setBusy(bookingId);

    google.script.run
      .withSuccessHandler(() => {
        clearBusy();
        showToast("Booking saved.", "success");
        OPEN_BOOKING_ID = "";
        loadBookings(false);
      })
      .withFailureHandler(err => {
        clearBusy();
        showToast("Save failed: " + (err.message || err), "error");
      })
      .updateBookingFromDashboard(row.RowNumber, patch);
  }
  

  let REGENERATE_BOOKING_ID = null;

function openRegenerateQuoteModal(bookingId) {
  REGENERATE_BOOKING_ID = bookingId;
  document.getElementById("regenerateQuoteModal")
    .classList.remove("hidden");
}

function closeRegenerateQuoteModal() {
  REGENERATE_BOOKING_ID = null;
  document.getElementById("regenerateQuoteModal")
    .classList.add("hidden");
}

function confirmRegenerateQuote() {
  if (!REGENERATE_BOOKING_ID) return;

  const bookingId = REGENERATE_BOOKING_ID;

  closeRegenerateQuoteModal();

  setBusy(bookingId);

  google.script.run
    .withSuccessHandler(...)
    .withFailureHandler(...)
    .generateQuote(bookingId);
}

  function generateQuote(bookingId) {
    const row = BOOKINGS.find(x => x.BookingID === bookingId);
    if (!row) return;

    const booking = row.ParsedBooking || {};
    const hasQuote = !!(row.QuoteURL || booking.quoteUrl);

    if (hasQuote) {
      openRegenerateQuoteModal(bookingId);
      return;
    }

    setBusy(bookingId);

    google.script.run
      .withSuccessHandler(res => {
        clearBusy();
        showToast("Quote generated.", "success");
        loadBookings(false);
        if (res.quoteUrl) window.open(res.quoteUrl, "_blank");
      })
      .withFailureHandler(err => {
        clearBusy();
        showToast("Quote failed: " + (err.message || err), "error");
      })
      .generateQuoteForRow(row.RowNumber);
  }

  function scanInbox() {
    showToast("Scanning inbox…", "loading", true);

    google.script.run
      .withSuccessHandler(res => {
        showToast(
          `Scan complete. Logged ${res.logged}, skipped ${res.skipped}, errors ${res.errors}.`,
          "success"
        );
        loadBookings(false);
      })
      .withFailureHandler(err => {
        showToast("Scan failed: " + (err.message || err), "error");
      })
      .scanInboxForDashboardBookings();
  }

  function setStatus(bookingId, status) {
    const row = BOOKINGS.find(x => x.BookingID === bookingId);
    if (!row) return;

    google.script.run
      .withSuccessHandler(() => {
        loadBookings(false);
      })
      .withFailureHandler(err => {
        showToast("Status update failed: " + (err.message || err), "error");
      })
      .setBookingStatus(row.RowNumber, status);
  }

  function setBusy(bookingId) {
    BUSY_BOOKING_ID = bookingId;
    renderBookings();
  }

  function clearBusy() {
    BUSY_BOOKING_ID = "";
    renderBookings();
  }

  function showDetail(bookingId) {
    const row = BOOKINGS.find(x => x.BookingID === bookingId);
    if (!row) return;

    const b = row.ParsedBooking || {};
    const items = b.items || row.ItemsParsed || [];

    document.getElementById("detailPanel").classList.remove("hidden");
    document.getElementById("detailPanel").innerHTML = `
    <div style="display:flex; justify-content:space-between; gap:20px; margin-bottom:18px;">
      <div>
        <p class="eyebrow">${escapeHtml(row.BookingID)}</p>
        <h2 style="margin:0 0 8px;">${escapeHtml(b.clientCompany || row.ClientCompany || "Untitled booking")}</h2>
        <div class="muted">${escapeHtml(row.Status || "")}</div>
      </div>

      <div style="display:flex; gap:8px;">
        <button class="button" onclick="saveDetail('${row.BookingID}')">Save</button>
        <button class="button" onclick="closeDetail()">Close</button>
      </div>
    </div>

    <div class="edit-grid">
      ${editField("clientCompany", "Company", b.clientCompany)}
      ${editField("hostName", "Host name", b.hostName)}
      ${editField("hostEmail", "Host email", b.hostEmail)}
      ${editField("pax", "Pax", b.pax)}
      ${editField("eventDate", "Event date", b.eventDate, "date")}
      ${editField("serviceTimes", "Service time", (b.serviceTimes || []).join(" / "))}
      ${editField("serviceType", "Service type", b.serviceType)}
      ${editField("location", "Location", b.location)}
      ${editField("floor", "Floor", b.floor)}
    </div>

    <label class="field full">
      <span>Notes</span>
      <textarea id="edit-notes">${escapeHtml(b.notes || "")}</textarea>
    </label>

    <h3 style="margin-top:20px;">Line items</h3>
    <div class="items">
      ${items.map((item, i) => `
        <div class="item">
          <div class="edit-grid">
            ${editItemField(i, "time", "Time", item.time)}
            ${editItemField(i, "section", "Section", item.section)}
            ${editItemField(i, "name", "Item", item.name)}
            ${editItemField(i, "qty", "Qty", item.qty)}
          </div>
          <label class="field full">
            <span>Detail</span>
            <textarea data-item="${i}" data-key="detail">${escapeHtml(item.detail || "")}</textarea>
          </label>
          <label class="field full">
            <span>Comment</span>
            <textarea data-item="${i}" data-key="comment">${escapeHtml(item.comment || "")}</textarea>
          </label>
        </div>
      `).join("")}
    </div>
  `;
  }

  function editField(key, label, value, type = "text") {
    const missing = value === "" || value === null || value === undefined;
    return `
    <label class="field ${missing ? "field-missing" : ""}">
      <span>${label}</span>
      <input id="edit-${key}" type="${type}" value="${escapeHtml(value || "")}">
    </label>
  `;
  }

  function editItemField(index, key, label, value) {
    return `
    <label class="field">
      <span>${label}</span>
      <input data-item="${index}" data-key="${key}" value="${escapeHtml(value || "")}">
    </label>
  `;
  }

  function saveDetail(bookingId) {
    const row = BOOKINGS.find(x => x.BookingID === bookingId);
    if (!row) return;

    const items = Array.from(document.querySelectorAll("[data-item]"))
      .reduce((acc, el) => {
        const i = Number(el.dataset.item);
        const key = el.dataset.key;
        if (!acc[i]) acc[i] = {};
        acc[i][key] = el.value;
        return acc;
      }, []);

    const serviceTimesText = document.getElementById("edit-serviceTimes").value.trim();
    const serviceTimes = serviceTimesText
      ? serviceTimesText.split("/")
        .map(s => s.trim())
        .filter(Boolean)
      : [];

    const patch = {
      clientCompany: document.getElementById("edit-clientCompany").value.trim(),
      hostName: document.getElementById("edit-hostName").value.trim(),
      hostEmail: document.getElementById("edit-hostEmail").value.trim(),
      pax: document.getElementById("edit-pax").value.trim(),
      eventDate: document.getElementById("edit-eventDate").value.trim(),
      serviceTimes: serviceTimes,
      serviceType: document.getElementById("edit-serviceType").value.trim(),
      location: document.getElementById("edit-location").value.trim(),
      floor: document.getElementById("edit-floor").value.trim(),
      notes: document.getElementById("edit-notes") ? document.getElementById("edit-notes").value.trim() : "",
      items: items.length ? items : ((row.ParsedBooking && row.ParsedBooking.items) || row.ItemsParsed || [])
    };

    google.script.run
      .withSuccessHandler(() => {
        loadBookings(false);
        closeDetail();
      })
      .withFailureHandler(err => {
        showToast("Save failed: " + (err.message || err), "error");
      })
      .updateBookingFromDashboard(row.RowNumber, patch);
  }

  function closeDetail() {
    OPEN_BOOKING_ID = "";
    renderBookings();
  }

  function getDisplayDate(b) {
    return (b.ParsedBooking && b.ParsedBooking.eventDate) || b.EventDate || "";
  }

  function getDisplayTime(b) {
    const parsed = b.ServiceTimesParsed || [];
    return parsed.length ? parsed.join(" / ") : "";
  }

  function formatDate(value) {
    if (!value) return "—";

    if (/^\d{4}-\d{2}-\d{2}$/.test(value)) {
      const [y, m, d] = value.split("-");
      return `${d}/${m}/${y}`;
    }

    const d = new Date(value);
    if (isNaN(d.getTime())) return value;

    return d.toLocaleDateString("en-GB");
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }
  let SCAN_STATE = null;

  function openScanModal() {
    const modal = document.getElementById("scanModal");
    modal.classList.remove("hidden");

    resetScanStats();

    document.getElementById("scan-start-btn").disabled = true;
    document.getElementById("scan-close-btn").disabled = false;
    document.getElementById("scan-summary").textContent = "Preparing scan…";
    document.getElementById("scan-ticker").textContent = "Checking inbox settings…";

    google.script.run
      .withSuccessHandler(res => {
        SCAN_STATE = res;

        document.getElementById("scan-found").textContent = res.totalFound || 0;
        document.getElementById("scan-summary").textContent =
          `Scan from: ${res.scanFromLabel}. ${res.totalFound} thread(s) found.`;

        document.getElementById("scan-ticker").textContent = "Ready to scan.";
        document.getElementById("scan-start-btn").disabled = false;
      })
      .withFailureHandler(err => {
        document.getElementById("scan-ticker").textContent =
          "Scan setup failed: " + (err.message || err);
      })
      .prepareInboxScan();
  }

  function closeScanModal() {
    document.getElementById("scanModal").classList.add("hidden");
  }

  function resetScanStats() {
    ["found", "logged", "skipped", "errors"].forEach(k => {
      const el = document.getElementById(`scan-${k}`);
      if (el) el.textContent = "0";
    });
  }

  function startInboxScan() {
    document.getElementById("scan-start-btn").disabled = true;
    document.getElementById("scan-close-btn").disabled = true;
    document.getElementById("scan-ticker").textContent = "Scanning…";

    processScanChunk(0, {
      logged: 0,
      skipped: 0,
      errors: 0
    });
  }

  function processScanChunk(offset, totals) {
    google.script.run
      .withSuccessHandler(res => {
        totals.logged += res.logged || 0;
        totals.skipped += res.skipped || 0;
        totals.errors += res.errors || 0;

        document.getElementById("scan-logged").textContent = totals.logged;
        document.getElementById("scan-skipped").textContent = totals.skipped;
        document.getElementById("scan-errors").textContent = totals.errors;

        document.getElementById("scan-ticker").textContent =
          `Processed ${res.nextOffset} of ${SCAN_STATE.totalFound} thread(s)…`;

        if (res.done) {
          document.getElementById("scan-ticker").textContent = "Scan complete.";
          document.getElementById("scan-close-btn").disabled = false;
          showToast("Inbox scan complete.", "success");
          loadBookings(false);
          return;
        }

        processScanChunk(res.nextOffset, totals);
      })
      .withFailureHandler(err => {
        document.getElementById("scan-ticker").textContent =
          "Scan failed: " + (err.message || err);

        document.getElementById("scan-close-btn").disabled = false;
        showToast("Scan failed: " + (err.message || err), "error");
      })
      .scanInboxChunk(offset, 5);
  }

  function handleQuoteClick(bookingId) {
    const row = BOOKINGS.find(x => x.BookingID === bookingId);
    if (!row) return;

    const parsed = row.ParsedBooking || {};
    const quoteStale = parsed.quoteStale === true || parsed.quoteStale === "TRUE";
    const hasQuote = !!row.QuoteURL || !!parsed.quoteUrl;

    if (hasQuote && quoteStale) {
      const ok = confirm("This booking has changed since the quote was generated. Regenerate the quote now?");
      if (!ok) return;
    }

    generateQuote(bookingId);
  }

</script>
