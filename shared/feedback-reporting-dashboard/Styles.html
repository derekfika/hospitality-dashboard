<style>
:root {
  --ink:#241F33;
  --muted:#6F67A8;
  --paper:#f4f3ff;
  --surface:#fff;
  --line:#d9d4f4;
  --primary:#4F34C7;
  --primary-dark:#280F8C;
  --accent:#4DF7C2;
  --danger:#FF5C00;
  --shadow:0 20px 54px rgba(40,15,140,.14);
}
* { box-sizing:border-box; }
[hidden] { display:none !important; }
body {
  margin:0;
  min-height:100vh;
  display:grid;
  grid-template-columns:250px minmax(0,1fr);
  color:var(--ink);
  font-family:Gilroy,Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(180deg,#fbfaff,var(--paper));
}
button,input,select { font:inherit; }
button {
  min-height:42px;
  border:0;
  border-radius:10px;
  padding:0 16px;
  background:var(--primary-dark);
  color:#fff;
  font-weight:850;
  cursor:pointer;
}
button:focus-visible,input:focus-visible,select:focus-visible { outline:3px solid rgba(77,247,194,.45); outline-offset:2px; }
button:disabled { opacity:.65; cursor:wait; }
.sidebar {
  position:sticky;
  top:0;
  height:100vh;
  padding:28px 22px;
  color:#fff;
  background:
    radial-gradient(circle at 28% 12%, rgba(77,247,194,.18), transparent 15rem),
    linear-gradient(180deg,var(--primary-dark),var(--primary));
}
.brand { display:grid; gap:8px; margin-bottom:32px; }
.brand strong { font-size:42px; line-height:.9; letter-spacing:-.03em; }
.brand span { color:rgba(255,255,255,.76); font-weight:800; }
nav { display:grid; gap:8px; }
nav a { color:rgba(255,255,255,.82); text-decoration:none; font-weight:800; padding:10px 0; }
main { min-width:0; padding:28px; display:grid; gap:18px; }
.activity-bar { position:sticky; top:0; z-index:20; height:4px; overflow:hidden; background:rgba(79,52,199,.12); }
.activity-bar span { display:block; width:44%; height:100%; background:linear-gradient(90deg,var(--primary),var(--accent)); animation:activity 1s linear infinite; }
@keyframes activity { from { transform:translateX(-100%); } to { transform:translateX(250%); } }
.page-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  min-height:150px;
  padding:26px 28px;
  border-radius:16px;
  color:#fff;
  background:
    radial-gradient(circle at 82% 24%, rgba(255,232,0,.18), transparent 22rem),
    linear-gradient(135deg,var(--primary-dark),var(--primary));
  box-shadow:var(--shadow);
}
.page-header p { margin:0 0 8px; color:rgba(255,255,255,.8); font-size:12px; font-weight:950; letter-spacing:.1em; text-transform:uppercase; }
.page-header h1 { margin:0; font-size:clamp(34px,4vw,52px); line-height:.98; }
.page-header span { display:block; margin-top:10px; color:rgba(255,255,255,.76); font-weight:650; }
.status-dot { display:inline-block; width:8px; height:8px; margin-right:8px; border-radius:50%; background:var(--accent); }
.header-actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:end; }
.header-actions button { background:#fff; color:var(--primary-dark); }
.header-actions .primary-action { background:var(--accent); }
.filters,.health,.summary-grid,.panel {
  border:1px solid rgba(255,255,255,.72);
  border-radius:16px;
  background:rgba(255,255,255,.86);
  box-shadow:0 12px 34px rgba(36,48,54,.08);
}
.filters {
  position:sticky;
  top:10px;
  z-index:12;
  display:grid;
  grid-template-columns:1.1fr repeat(5,minmax(120px,1fr)) auto;
  gap:12px;
  align-items:end;
  padding:14px;
}
label { display:grid; gap:6px; color:var(--muted); font-size:11px; font-weight:950; letter-spacing:.08em; text-transform:uppercase; }
input,select {
  min-height:42px;
  border:1px solid var(--line);
  border-radius:10px;
  padding:0 11px;
  background:#fff;
  color:var(--ink);
  font-weight:750;
}
.health { display:flex; flex-wrap:wrap; gap:8px; min-height:44px; align-items:center; padding:10px 14px; color:var(--muted); font-weight:800; }
.health-warning { padding:7px 10px; border-radius:999px; color:var(--danger); background:#fff0ed; }
.summary-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; padding:12px; }
.metric { min-height:124px; display:grid; gap:10px; align-content:space-between; padding:18px; border-radius:14px; background:#fff; border:1px solid rgba(79,52,199,.12); }
.metric span,.panel-heading span { color:var(--muted); font-size:11px; font-weight:950; letter-spacing:.08em; text-transform:uppercase; }
.metric strong { color:var(--primary); font-size:42px; line-height:.95; }
.metric small { color:var(--muted); font-weight:750; }
.grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:18px; }
.panel { padding:20px; }
.panel.wide { grid-column:1 / -1; }
.panel-heading { display:flex; justify-content:space-between; gap:14px; margin-bottom:16px; }
.panel h2 { margin:4px 0 0; font-size:22px; }
.trend { height:250px; display:flex; align-items:end; gap:8px; border-bottom:1px solid var(--line); padding:30px 4px 26px; overflow-x:auto; }
.bar { position:relative; flex:1; min-width:28px; border-radius:9px 9px 0 0; background:linear-gradient(180deg,var(--accent),var(--primary)); }
.bar span { position:absolute; top:-24px; left:50%; transform:translateX(-50%); font-size:12px; font-weight:900; }
.bar small { position:absolute; bottom:-22px; left:50%; transform:translateX(-50%); color:var(--muted); font-size:11px; font-weight:800; }
.list-chart,.comment-list,.dimension-grid { display:grid; gap:12px; }
.list-row { display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; }
.list-row span,.list-row strong { font-weight:900; }
.list-row i { grid-column:1 / -1; height:10px; border-radius:999px; background:linear-gradient(90deg,var(--primary),var(--accent)); }
.list-row small { grid-column:1 / -1; color:var(--muted); font-weight:750; }
.dimension { display:grid; gap:8px; padding:14px; border:1px solid var(--line); border-radius:12px; background:#fff; }
.dimension strong { color:var(--primary); font-size:34px; }
.dimension span { color:var(--muted); font-weight:850; }
.dimension i { height:10px; border-radius:999px; background:linear-gradient(90deg,var(--primary),var(--accent)); }
.comment { display:grid; gap:8px; padding:14px; border:1px solid var(--line); border-radius:12px; background:#fff; }
.comment header { display:flex; justify-content:space-between; gap:12px; color:var(--primary); }
.comment header span { color:var(--muted); font-weight:800; }
.comment p { margin:0; color:#4B426C; line-height:1.45; }
.empty-state { min-height:110px; display:grid; place-items:center; border:1px dashed var(--line); border-radius:12px; color:var(--muted); font-weight:850; text-align:center; }
.toast { position:fixed; right:24px; bottom:24px; max-width:460px; padding:14px 16px; border-radius:14px; background:#fff; color:var(--ink); border:1px solid var(--line); box-shadow:var(--shadow); font-weight:850; }
.toast-error { color:var(--danger); background:#fff4f2; }
@media (max-width:1200px) {
  body { grid-template-columns:1fr; }
  .sidebar { position:relative; height:auto; }
  .filters { grid-template-columns:repeat(3,minmax(0,1fr)); }
  .summary-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
}
@media (max-width:760px) {
  main { padding:18px; }
  .page-header { align-items:start; flex-direction:column; }
  .filters,.summary-grid,.grid { grid-template-columns:1fr; }
}
</style>
