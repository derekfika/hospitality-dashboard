<script>
  const state = {
    loading: false,
    settings: {},
    settingsLoaded: false,
    gapsLoaded: false,
    cockpitLoaded: false,
    showFullRota: false,
    currentCockpit: null,
    cockpitRefreshTimer: null,
    selectedPerson: null,
    gapsById: {}
  };

  document.addEventListener("DOMContentLoaded", () => {
    mountSettingsModal();
    bindActions();
    bindNavigation();
    loadDashboard();
  });

  function bindNavigation() {
    document.querySelectorAll(".sidebar nav a[href^='#']").forEach(link => {
      link.addEventListener("click", event => {
        event.preventDefault();
        const target = document.querySelector(link.getAttribute("href"));
        if (!target) return;
        document.querySelectorAll(".sidebar nav a").forEach(item => {
          item.classList.toggle("active", item === link);
        });
        if (link.getAttribute("href") === "#gaps" && !state.gapsLoaded) loadCoverageGaps();
        if (link.getAttribute("href") === "#settings" && !state.settingsLoaded) loadSettingsLibrary();
        target.scrollIntoView({ behavior: "smooth", block: "start" });
        history.replaceState(null, "", link.getAttribute("href"));
      });
    });
  }

  function bindActions() {
    onClick("syncEverythingBtn", () => {
      runLiveWorkforceSync();
    });
    onClick("testBrightHrConnectionBtn", () => {
      runAction("Testing BrightHR connection...", "testBrightHrConnectionFromUi");
    });
    onClick("testEmployeeEndpointBtn", () => {
      runAction("Testing BrightHR employee endpoint...", "testBrightHrEmployeeEndpointFromUi");
    });
    onClick("testAbsenceEndpointBtn", () => {
      runAction("Testing BrightHR absence endpoint…", "testBrightHrAbsenceEndpointFromUi");
    });
    onClick("discoverAbsenceEndpointBtn", () => {
      runAction("Discovering BrightHR absence endpoint…", "discoverBrightHrAbsenceEndpointFromUi");
    });
    onClick("loadCockpitBtn", () => {
      loadRotaCockpit();
    });
    onClick("prevWeekBtn", () => shiftCockpitWeek(-7));
    onClick("thisWeekBtn", () => setCockpitWeek(getMondayForDate(new Date())));
    onClick("nextWeekBtn", () => shiftCockpitWeek(7));
    onClick("weekAfterBtn", () => shiftCockpitWeek(14));
    onClick("toggleFullRotaBtn", toggleFullRota);
    onClick("previewLegacyBtn", () => {
      runLegacyPreview();
    });
    onClick("previewReliefImportBtn", () => {
      runReliefPreview();
    });
    onClick("importReliefBtn", () => {
      runAction("Importing relief rota…", "importReliefRotaFromUi");
    });
    onClick("importLegacyBtn", () => {
      runAction("Importing legacy rota…", "importLegacyRotaFromUi");
    });
    onClick("clearLegacyNoiseBtn", () => {
      runAction("Clearing noisy legacy rows…", "clearLegacyRotaShiftNoiseFromUi");
    });
    onClick("detectGapsBtn", () => {
      runAction("Detecting staffing gaps…", "detectCoverageGapsFromUi");
    });
    onClick("loadRotaBtn", () => {
      loadRotaBoard();
    });
    onClick("generateReliefBtn", () => {
      runAction("Generating relief suggestions…", "generateReliefSuggestionsFromUi");
    });
    onClick("generateReliefRotaBtn", () => {
      runAction("Generating relief rota…", "generateReliefRotaAssignmentsFromUi");
    });
    onClick("openSettingsBtn", openSettingsModal);
    onClick("closeSettingsModal", closeSettingsModal);
    onSubmit("managerForm", event => {
      event.preventDefault();
      saveManagerFromForm();
    });
    onSubmit("agencyForm", event => {
      event.preventDefault();
      saveAgencyFromForm();
    });
    onSubmit("rotaTemplateForm", event => {
      event.preventDefault();
      saveRotaTemplateFromForm();
    });
    onClick("dedupeTemplatesBtn", () => {
      runAction("Cleaning duplicate rota rows…", "dedupeRotaTemplatesFromUi");
    });
    onClick("addReliefBtn", () => {
      updateReliefTeamSelection(true);
    });
    onClick("removeReliefBtn", () => {
      updateReliefTeamSelection(false);
    });
    onClick("enableAllEmployeesCover", () => {
      refreshCoverPersonSelect();
    });
    const rotaFilter = document.getElementById("standardRotaSiteFilter");
    if (rotaFilter) rotaFilter.addEventListener("change", renderStandardRotaTable);
    onSubmit("gapActionForm", event => {
      event.preventDefault();
      submitGapActionForm();
    });
    onClick("closeGapModal", closeGapModal);
    onClick("closePersonRotaModal", closePersonRotaModal);
    onClick("markPersonSickBtn", markSelectedPersonSick);
    onClick("editPersonStandardRotaBtn", showSelectedPersonStandardRotaEditor);
    onSubmit("personStandardRotaForm", event => {
      event.preventDefault();
      savePersonStandardRotaFromModal();
    });
    onClick("closeSyncProgressBtn", closeSyncProgressModal);
  }

  function onClick(id, handler) {
    const element = document.getElementById(id);
    if (element) element.addEventListener("click", handler);
  }

  function onSubmit(id, handler) {
    const element = document.getElementById(id);
    if (element) element.addEventListener("submit", handler);
  }

  function loadDashboard() {
    if (!state.gapsLoaded) setPanelLoading("gapList", "Coverage gaps load when you open Coverage.");
    setPanelLoading("reliefList", "Relief suggestions load from each gap.");
    google.script.run
      .withSuccessHandler(data => {
        if (!data) {
          data = emptyDashboardData();
          showToast("Dashboard returned no data. Checking server connection...");
          checkDashboardPing();
        } else if (data.ok === false && data.error) {
          showToast(data.error);
        }
        renderDashboard(data);
        if (!state.cockpitLoaded) loadRotaCockpit();
      })
      .withFailureHandler(error => {
        showToast(error.message || "Could not load workforce dashboard.");
      })
      .getWorkforceDashboardSummaryFromUi();
  }

  function checkDashboardPing() {
    google.script.run
      .withSuccessHandler(result => {
        if (result && result.ok) {
          showToast("Server is responding, but dashboard data is empty. Run getWorkforceDashboardData in Apps Script to see the backend error.");
        } else {
          showToast("Server ping returned no data. Push and update the deployment again.");
        }
      })
      .withFailureHandler(error => {
        showToast(error.message || "Server ping failed. Check deployment permissions.");
      })
      .getWorkforceDashboardPing();
  }

  function runAction(loadingMessage, functionName) {
    showLoading(loadingMessage, "Please keep this tab open while the app updates.");
    const runner = google.script.run
      .withSuccessHandler(result => {
        result = result || {};
        hideLoading();
        showToast(result.message || `Done. ${result.synced || 0} record(s) updated.`);
        refreshAfterAction(functionName);
      })
      .withFailureHandler(error => {
        hideLoading();
        showToast(error.message || "Action failed.");
      });

    const actions = {
      setupWorkforceFromUi: () => runner.setupWorkforceFromUi(),
      syncBrightHrEmployeesFromUi: () => runner.syncBrightHrEmployeesFromUi(),
      syncBrightHrAbsencesFromUi: () => runner.syncBrightHrAbsencesFromUi(),
      syncWorkforceFromUi: () => runner.syncWorkforceFromUi(),
      testBrightHrConnectionFromUi: () => runner.testBrightHrConnectionFromUi(),
      testBrightHrEmployeeEndpointFromUi: () => runner.testBrightHrEmployeeEndpointFromUi(),
      testBrightHrAbsenceEndpointFromUi: () => runner.testBrightHrAbsenceEndpointFromUi(),
      discoverBrightHrAbsenceEndpointFromUi: () => runner.discoverBrightHrAbsenceEndpointFromUi(),
      importLegacyRotaFromUi: () => runner.importLegacyRotaFromUi(),
      importReliefRotaFromUi: () => runner.importReliefRotaFromUi(),
      clearLegacyRotaShiftNoiseFromUi: () => runner.clearLegacyRotaShiftNoiseFromUi(),
      detectCoverageGapsFromUi: () => runner.detectCoverageGapsFromUi(),
      generateReliefSuggestionsFromUi: () => runner.generateReliefSuggestionsFromUi(),
      generateReliefRotaAssignmentsFromUi: () => runner.generateReliefRotaAssignmentsFromUi(),
      dedupeRotaTemplatesFromUi: () => runner.dedupeRotaTemplatesFromUi()
    };
    if (!actions[functionName]) {
      hideLoading();
      showToast("That action is not wired yet: " + functionName);
      return;
    }
    actions[functionName]();
  }

  function runLiveWorkforceSync() {
    const progress = {
      employeeSynced: 0,
      absenceSynced: 0,
      employeesQueried: 0,
      totalEmployees: 0,
      batches: 0,
      warnings: []
    };
    openSyncProgressModal();
    updateSyncProgress(progress, "Syncing employees…", 8);
    google.script.run
      .withSuccessHandler(result => {
        result = result || {};
        progress.employeeSynced = Number(result.synced || 0);
        addSyncStep("Employees", `${progress.employeeSynced} employee(s) updated.`, "done");
        runAbsenceSyncBatch(progress);
      })
      .withFailureHandler(error => {
        progress.warnings.push(error.message || "Employee sync failed.");
        addSyncStep("Employees", error.message || "Employee sync failed.", "warn");
        updateSyncProgress(progress, "Employee sync failed.", 100);
      })
      .syncBrightHrEmployeesFromUi();
  }

  function runAbsenceSyncBatch(progress) {
    progress.batches += 1;
    updateSyncProgress(progress, `Syncing absence batch ${progress.batches}…`, getSyncPercent(progress));
    google.script.run
      .withSuccessHandler(result => {
        result = result || {};
        progress.absenceSynced += Number(result.synced || 0);
        progress.employeesQueried += Number(result.employeesQueried || 0);
        progress.totalEmployees = Number(result.totalEmployees || progress.totalEmployees || 0);
        if (result.warning) progress.warnings.push(result.warning);
        addSyncStep(
          `Absence batch ${progress.batches}`,
          `${result.employeesQueried || 0} employee(s) checked, ${result.synced || 0} absence row(s) updated.`,
          result.rateLimited ? "warn" : "done"
        );
        if (result.rateLimited) {
          updateSyncProgress(progress, "BrightHR rate limit reached. Wait a minute, then sync again to continue.", getSyncPercent(progress));
          showToast("BrightHR rate limit reached. Sync can continue from this point later.");
          loadDashboard();
          if (state.cockpitLoaded) loadRotaCockpit();
          return;
        }
        if (result.hasMore) {
          window.setTimeout(() => runAbsenceSyncBatch(progress), 700);
          return;
        }
        updateSyncProgress(progress, "Workforce sync complete.", 100);
        addSyncStep("Complete", `${progress.absenceSynced} absence row(s) updated in total.`, "done");
        showToast("Workforce sync complete.");
        loadDashboard();
        if (state.cockpitLoaded) loadRotaCockpit();
      })
      .withFailureHandler(error => {
        progress.warnings.push(error.message || "Absence sync failed.");
        addSyncStep(`Absence batch ${progress.batches}`, error.message || "Absence sync failed.", "warn");
        updateSyncProgress(progress, "Absence sync stopped. See warning below.", getSyncPercent(progress));
        loadDashboard();
      })
      .syncBrightHrAbsencesBatchFromUi(25);
  }

  function openSyncProgressModal() {
    const modal = document.getElementById("syncProgressModal");
    const list = document.getElementById("syncStepList");
    if (list) list.innerHTML = "";
    if (modal) modal.classList.remove("hidden");
  }

  function closeSyncProgressModal() {
    const modal = document.getElementById("syncProgressModal");
    if (modal) modal.classList.add("hidden");
  }

  function updateSyncProgress(progress, message, percent) {
    text("syncProgressSummary", [
      message,
      progress.totalEmployees ? `${progress.employeesQueried}/${progress.totalEmployees} employees checked for absences.` : "",
      progress.warnings.length ? progress.warnings[progress.warnings.length - 1] : ""
    ].filter(Boolean).join(" "));
    const bar = document.getElementById("syncProgressBar");
    if (bar) bar.style.width = `${Math.max(4, Math.min(Number(percent || 0), 100))}%`;
  }

  function addSyncStep(title, body, status) {
    const list = document.getElementById("syncStepList");
    if (!list) return;
    const item = document.createElement("div");
    item.className = `sync-step ${status || "pending"}`;
    item.innerHTML = `<strong>${escapeHtml(title)}</strong><span>${escapeHtml(body)}</span>`;
    list.appendChild(item);
  }

  function getSyncPercent(progress) {
    if (!progress.totalEmployees) return 20;
    return 20 + Math.min(75, Math.round((progress.employeesQueried / progress.totalEmployees) * 75));
  }

  function refreshAfterAction(functionName) {
    if (functionName === "detectCoverageGapsFromUi") {
      state.gapsLoaded = false;
      loadDashboard();
      loadCoverageGaps();
      return;
    }
    if (functionName === "generateReliefSuggestionsFromUi") {
      loadDashboard();
      if (state.gapsLoaded) loadCoverageGaps();
      return;
    }
    if (functionName === "dedupeRotaTemplatesFromUi" || functionName === "importReliefRotaFromUi") {
      state.settingsLoaded = false;
      loadDashboard();
      loadSettingsLibrary();
      return;
    }
    if (functionName === "syncWorkforceFromUi" || functionName === "testBrightHrAbsenceEndpointFromUi" || functionName === "discoverBrightHrAbsenceEndpointFromUi") {
      loadDashboard();
      if (state.cockpitLoaded) loadRotaCockpit();
      return;
    }
    loadDashboard();
  }

  function mountSettingsModal() {
    const forms = document.querySelector("#settings .settings-forms");
    const body = document.getElementById("settingsModalBody");
    if (forms && body && forms.parentElement !== body) body.appendChild(forms);
    document.querySelectorAll("[data-settings-tab]").forEach(tab => {
      tab.addEventListener("click", () => activateSettingsTab(tab.dataset.settingsTab));
    });
    activateSettingsTab("reliefSettings");
  }

  function openSettingsModal() {
    const modal = document.getElementById("settingsModal");
    if (modal) modal.classList.remove("hidden");
    if (!state.settingsLoaded) loadSettingsLibrary();
  }

  function closeSettingsModal() {
    const modal = document.getElementById("settingsModal");
    if (modal) modal.classList.add("hidden");
  }

  function activateSettingsTab(tabId) {
    document.querySelectorAll("[data-settings-tab]").forEach(tab => {
      tab.classList.toggle("active", tab.dataset.settingsTab === tabId);
    });
    document.querySelectorAll(".settings-tab-panel").forEach(panel => {
      const panelId = panel.dataset.panelId || panel.id;
      panel.classList.toggle("hidden", panelId !== tabId);
    });
  }

  function loadRotaBoard() {
    const siteId = document.getElementById("siteSelect").value;
    const weekStart = document.getElementById("weekStartInput").value;
    if (!siteId) {
      showToast("Choose a site first.");
      return;
    }
    showLoading("Loading rota board…", "Building the weekly rota view.");
    google.script.run
      .withSuccessHandler(board => {
        board = board || { days: [], siteName: "", weekStart: "", totalRows: 0, totalGaps: 0 };
        renderRotaBoard(board);
        hideLoading();
      })
      .withFailureHandler(error => {
        hideLoading();
        showToast(error.message || "Could not load rota board.");
      })
      .getRotaBoardFromUi(siteId, weekStart);
  }

  function loadRotaCockpit() {
    const siteSelect = document.getElementById("cockpitSiteSelect");
    const weekInput = document.getElementById("cockpitWeekStartInput");
    const siteId = siteSelect ? siteSelect.value : "";
    const weekStart = weekInput ? weekInput.value : "";
    if (!siteId) {
      setCockpitLoading("Choose a site to load the rota cockpit.");
      return;
    }
    setCockpitLoading("Loading selected site/week…");
    google.script.run
      .withSuccessHandler(board => {
        board = board || { ok: false, days: [], totals: {} };
        if (board.ok === false && board.error) showToast(board.error);
        state.cockpitLoaded = true;
        state.currentCockpit = board;
        renderRotaCockpit(board);
      })
      .withFailureHandler(error => {
        showToast(error.message || "Could not load rota cockpit.");
        setCockpitLoading("Could not load this rota week.");
      })
      .getRotaCockpitFromUi(siteId, weekStart);
  }

  function shiftCockpitWeek(days) {
    const input = document.getElementById("cockpitWeekStartInput");
    if (!input) return;
    const base = input.value ? new Date(input.value + "T00:00:00") : getMondayForDate(new Date());
    base.setDate(base.getDate() + Number(days || 0));
    setCockpitWeek(getMondayForDate(base));
  }

  function setCockpitWeek(date) {
    const input = document.getElementById("cockpitWeekStartInput");
    if (!input || !date) return;
    input.value = formatDateInput(date);
    loadRotaCockpit();
  }

  function getMondayForDate(date) {
    const copy = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const day = copy.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    copy.setDate(copy.getDate() + diff);
    return copy;
  }

  function formatDateInput(date) {
    return [
      date.getFullYear(),
      String(date.getMonth() + 1).padStart(2, "0"),
      String(date.getDate()).padStart(2, "0")
    ].join("-");
  }

  function formatDisplayDate(value) {
    if (!value) return "";
    const date = new Date(String(value) + "T00:00:00");
    if (Number.isNaN(date.getTime())) return String(value);
    return date.toLocaleDateString("en-GB", {
      day: "numeric",
      month: "short",
      year: "numeric"
    });
  }

  function loadCoverageGaps() {
    setPanelLoading("gapList", "Loading current coverage gaps…");
    google.script.run
      .withSuccessHandler(summary => {
        state.gapsLoaded = true;
        renderGaps(summary || { gaps: [] });
      })
      .withFailureHandler(error => {
        showToast(error.message || "Could not load coverage gaps.");
        renderGaps({ gaps: [] });
      })
      .getCoverageGapsFromUi(60);
  }

  function loadSettingsLibrary() {
    setSettingsLoading("Loading settings library…");
    google.script.run
      .withSuccessHandler(result => {
        result = result || {};
        if (result.ok === false && result.error) showToast(result.error);
        renderOptions(result.options || {});
        renderSettingsSelectors(result.settings || {});
        state.settingsLoaded = true;
      })
      .withFailureHandler(error => {
        showToast(error.message || "Could not load settings.");
        state.settingsLoaded = false;
      })
      .getSettingsLibraryFromUi();
  }

  function runLegacyPreview() {
    showToast("Previewing legacy rota import…");
    setBusy(true);
    google.script.run
      .withSuccessHandler(result => {
        result = result || {};
        const summary = document.getElementById("legacyImportSummary");
        summary.innerHTML = `
          <div>
            <strong>${result.rawShiftsFound || 0}</strong> raw shifts compressed into
            <strong>${result.templatesFound || 0}</strong> templates and
            <strong>${result.exceptionsFound || 0}</strong> exceptions, with
            <strong>${result.agencyRequestsFound || 0}</strong> agency rows and 
            <strong>${result.sitesFound || 0}</strong> sites found in
            <strong>${result.sampledSheets || 0}</strong> sampled sheet(s).
            Estimated rows saved: <strong>${result.estimatedRowsSaved || 0}</strong>.
          </div>
        `;
        showToast("Legacy preview ready.");
        setBusy(false);
      })
      .withFailureHandler(error => {
        showToast(error.message || "Legacy preview failed.");
        setBusy(false);
      })
      .previewLegacyRotaImportFromUi();
  }

  function runReliefPreview() {
    showToast("Previewing relief rota import…");
    setBusy(true);
    google.script.run
      .withSuccessHandler(result => {
        result = result || {};
        const summary = document.getElementById("reliefImportSummary");
        summary.innerHTML = `
          <div>
            <strong>${result.availabilityRowsFound || 0}</strong> relief availability rows and
            <strong>${result.sitesFound || 0}</strong> sites found from
            <strong>${escapeHtml(result.sourceSpreadsheetName || "relief rota")}</strong>.
          </div>
        `;
        showToast("Relief preview ready.");
        setBusy(false);
      })
      .withFailureHandler(error => {
        showToast(error.message || "Relief preview failed.");
        setBusy(false);
      })
      .previewReliefRotaImportFromUi();
  }

  function renderDashboard(data) {
    data = data || emptyDashboardData();
    const summary = data.summary || {};
    const brightHr = data.brightHr || {};
    const spreadsheet = data.spreadsheet || {};
    const legacyRota = data.legacyRota || {};
    const reliefRota = data.reliefRota || {};
    const hasCredentials = brightHr.hasClientId && brightHr.hasClientSecret;
    const ready = spreadsheet.configured && hasCredentials;
    const coverCount = Number(summary.reliefSuggestionCount || 0) +
      Number(summary.reliefAssignmentCount || 0) +
      Number(summary.agencyRequestCount || 0);

    text("appVersion", data.appVersion || "local");
    text("systemStatus", ready ? "Ready to run" : "Setup needed");
    text("staffCount", summary.staffCount || 0);
    text("absenceCount", summary.absenceCount || 0);
    text("siteCount", summary.siteCount || 0);
    text("coverCount", coverCount);
    text("gapCount", summary.coverageGapCount || 0);
    text("managerCount", summary.managerCount || 0);
    text("agencyContactCount", summary.agencyContactCount || 0);
    text("templateCount", summary.rotaTemplateCount || 0);
    text("exceptionCount", summary.rotaExceptionCount || 0);

    const status = document.getElementById("brightHrStatus");
    status.textContent = hasCredentials ? "BrightHR connected" : "Credentials needed";
    status.classList.toggle("warn", !hasCredentials);
    text("absenceEndpointStatus", brightHr.hasAbsencesPath
      ? `${brightHr.absencesMethod || "post"} ${brightHr.absencesPath || ""}`
      : "Not configured");

    setCheck("checkSpreadsheet", spreadsheet.configured);
    setCheck("checkCredentials", hasCredentials);
    setCheck("checkToken", brightHr.hasCachedAccessToken);
    setCheck("checkAbsenceEndpoint", brightHr.hasAbsencesPath);
    setCheck("checkLegacyRota", legacyRota.configured);
    setCheck("checkReliefRota", reliefRota.configured);
    renderOptions(data.options || {});
    if (data.settings) renderSettingsSelectors(data.settings);
    if (data.gaps) {
      state.gapsLoaded = true;
      renderGaps(data.gaps);
    }
    if (data.relief) renderRelief(data.relief);
  }

  function emptyDashboardData() {
    return {
      ok: false,
      appName: "FIKA Workforce Operations",
      appVersion: "local",
      brightHr: {},
      legacyRota: {},
      reliefRota: {},
      spreadsheet: {},
      summary: {},
      gaps: { gaps: [] },
      relief: { suggestions: [] },
      options: { sites: [], defaultWeekStart: "" },
      settings: {}
    };
  }

  function saveManagerFromForm() {
    const form = document.getElementById("managerForm");
    const data = Object.fromEntries(new FormData(form).entries());
    if (!data.managerName || !data.email) {
      showToast("Manager name and email are required.");
      return;
    }
    setFormSubmitting_(form, true, "Saving...");
    google.script.run
      .withSuccessHandler(result => {
        showToast(result.message || "Manager saved.");
        form.reset();
        state.settingsLoaded = false;
        loadSettingsLibrary();
        setFormSubmitting_(form, false);
      })
      .withFailureHandler(error => {
        showToast(error.message || "Manager save failed.");
        setFormSubmitting_(form, false);
      })
      .saveWorkforceManagerFromUi(data);
  }

  function saveAgencyFromForm() {
    const form = document.getElementById("agencyForm");
    const data = Object.fromEntries(new FormData(form).entries());
    if (!data.agencyName || !data.email) {
      showToast("Agency name and email are required.");
      return;
    }
    setFormSubmitting_(form, true, "Saving...");
    google.script.run
      .withSuccessHandler(result => {
        showToast(result.message || "Agency contact saved.");
        form.reset();
        state.settingsLoaded = false;
        loadSettingsLibrary();
        setFormSubmitting_(form, false);
      })
      .withFailureHandler(error => {
        showToast(error.message || "Agency save failed.");
        setFormSubmitting_(form, false);
      })
      .saveWorkforceAgencyContactFromUi(data);
  }

  function saveRotaTemplateFromForm() {
    const form = document.getElementById("rotaTemplateForm");
    const data = Object.fromEntries(new FormData(form).entries());
    if (!data.siteId || !data.weekday || !data.role) {
      showToast("Site, weekday and role are required.");
      return;
    }
    setFormSubmitting_(form, true, "Saving...");
    google.script.run
      .withSuccessHandler(result => {
        showToast(result.message || "Standard rota row saved.");
        form.reset();
        state.settingsLoaded = false;
        loadSettingsLibrary();
        setFormSubmitting_(form, false);
      })
      .withFailureHandler(error => {
        showToast(error.message || "Could not save standard rota row.");
        setFormSubmitting_(form, false);
      })
      .saveRotaTemplateFromUi(data);
  }

  function renderOptions(options) {
    const siteSelect = document.getElementById("siteSelect");
    const sites = options.sites || [];
    if (siteSelect) fillSiteSelect_(siteSelect, sites);
    const cockpitSiteSelect = document.getElementById("cockpitSiteSelect");
    if (cockpitSiteSelect) fillSiteSelect_(cockpitSiteSelect, sites);
    const weekInput = document.getElementById("weekStartInput");
    if (weekInput && !weekInput.value && options.defaultWeekStart) weekInput.value = options.defaultWeekStart;
    const cockpitWeekInput = document.getElementById("cockpitWeekStartInput");
    if (cockpitWeekInput && !cockpitWeekInput.value && options.defaultWeekStart) cockpitWeekInput.value = options.defaultWeekStart;
  }

  function fillSiteSelect_(select, sites) {
    const current = select.value;
    select.innerHTML = ['<option value="">Choose site…</option>']

            ${openIssues.map(issue => renderCockpitIssue(issue, day.date)).join("")}

  function renderCockpitDaySummary(summary, fallbackScheduledCount) {
    const safe = summary && typeof summary === "object" ? summary : {};
    const scheduledCount = Number(safe.scheduledCount || fallbackScheduledCount || 0);
    const absenceCount = Number(safe.absenceCount || 0);
    const uncoveredCount = Number(safe.uncoveredCount || 0);
    const suggestionCount = Number(safe.suggestionCount || 0);
    const conflictCount = Number(safe.conflictCount || 0);
    const issueCount = Number(safe.issueCount || 0);
    if (!scheduledCount) {
      return '<div class="cockpit-day-summary"><span class="summary-chip muted">No rota</span></div>';
    }
    if (!issueCount) {
      return `
        <div class="cockpit-day-summary">
          <span class="summary-chip good">${scheduledCount} scheduled</span>
          <span class="summary-chip good">Fully covered</span>
        </div>
      `;
    }
    return `
      <div class="cockpit-day-summary">
        <span class="summary-chip">${scheduledCount} scheduled</span>
        ${absenceCount ? `<span class="summary-chip amber">${absenceCount} absence${absenceCount === 1 ? "" : "s"}</span>` : ""}
        ${uncoveredCount ? `<span class="summary-chip red">${uncoveredCount} gap${uncoveredCount === 1 ? "" : "s"}</span>` : ""}
        ${suggestionCount ? `<span class="summary-chip amber">${suggestionCount} suggestion${suggestionCount === 1 ? "" : "s"}</span>` : ""}
        ${conflictCount ? `<span class="summary-chip muted">${conflictCount} conflict${conflictCount === 1 ? "" : "s"}</span>` : ""}
      </div>
    `;
  }

        <div class="cockpit-gap-actions">
          ${suggestion ? `<button class="mini primary-mini" data-cockpit-action="approve" data-gap-id="${escapeHtml(gap.gapId || "")}">Approve</button>` : `<button class="mini primary-mini" data-cockpit-action="agency" data-gap-id="${escapeHtml(gap.gapId || "")}">Agency</button>`}
          <button class="secondary mini" data-cockpit-action="choose" data-gap-id="${escapeHtml(gap.gapId || "")}">Change</button>
          ${suggestion ? `<button class="secondary mini" data-cockpit-action="agency" data-gap-id="${escapeHtml(gap.gapId || "")}">Agency</button>` : ""}
          <button class="secondary mini" data-cockpit-action="resolved" data-gap-id="${escapeHtml(gap.gapId || "")}">Resolve</button>
          <button class="secondary mini" data-person-profile="${escapeHtml(gap.employeeId || "")}" data-person-date="${escapeHtml(date || "")}">Edit rota</button>
        </div>
      </div>
    `;
  }

  function applyCockpitGapUpdate(gapId, action, result) {
    const board = state.currentCockpit;
    if (!board || !gapId) return false;
    let changed = false;
    (board.days || []).forEach(day => {
      (day.issues || []).forEach(issue => {
        if (String(issue.gapId || issue.issueId || "") !== String(gapId)) return;
        changed = true;
        if (action === "approve") {
          const suggestion = issue.bestSuggestion || {};
          issue.status = "resolved";
          issue.type = "resolved";
          issue.coverName = suggestion.employeeName || (result && result.coverName) || "Approved cover";
          issue.primaryAction = "Cover approved";
        } else if (action === "agency") {
          issue.status = "agency_requested";
          issue.type = "resolved";
          issue.primaryAction = "Agency requested";
        } else if (action === "resolved") {
          issue.status = "resolved";
          issue.type = "resolved";
          issue.primaryAction = "Resolved";
        }
      });
      (day.fullRota || []).forEach(person => {
        const personName = normaliseClientText_(person.employeeName);
        const matchingIssue = (day.issues || []).find(issue =>
          String(issue.gapId || issue.issueId || "") === String(gapId) &&
          normaliseClientText_(issue.employeeName || issue.missingEmployeeName) === personName
        );
        if (matchingIssue && action === "approve") {
          person.status = "covered";
          person.coverName = matchingIssue.coverName || "";
          person.coverType = "Relief";
        }
      });
    });
    if (!changed) return false;
    recomputeCockpitBoard(board);
    renderRotaCockpit(board);
    return true;
  }

  function recomputeCockpitBoard(board) {
    const totals = {
      scheduled: 0,
      absences: 0,
      uncovered: 0,
      uncoveredGaps: 0,
      suggestions: 0,
      coverSuggested: 0,
      conflicts: 0,
      unresolvedActions: 0,
      resolved: 0
    };
    (board.days || []).forEach(day => {
      const fullRota = day.fullRota || day.scheduled || [];
      const issues = day.issues || [];
      const openIssues = issues.filter(issue => !/resolved|snoozed|ignored|agency_requested/i.test(String(issue.status || "")));
      const openGaps = openIssues.filter(issue => issue.gapId || issue.type === "uncovered" || issue.type === "cover_suggested");
      day.summary = {
        scheduledCount: fullRota.length,
        absenceCount: issues.filter(issue => String(issue.type || "") === "absence").length,
        issueCount: openIssues.length,
        uncoveredCount: openGaps.filter(issue => !issue.bestSuggestion).length,
        suggestionCount: openGaps.filter(issue => issue.bestSuggestion).length,
        conflictCount: openIssues.filter(issue => String(issue.type || "") === "conflict").length,
        resolvedCount: issues.length - openIssues.length
      };
      day.status = !fullRota.length ? "closed"
        : day.summary.uncoveredCount ? "uncovered"
        : day.summary.suggestionCount || day.summary.conflictCount ? "cover_suggested"
        : "covered";
      totals.scheduled += fullRota.length;
      totals.absences += day.absences ? day.absences.length : day.summary.absenceCount;
      totals.uncoveredGaps += day.summary.uncoveredCount;
      totals.uncovered += day.summary.uncoveredCount;
      totals.coverSuggested += day.summary.suggestionCount;
      totals.suggestions += day.summary.suggestionCount;
      totals.conflicts += day.summary.conflictCount;
      totals.resolved += day.summary.resolvedCount;
      totals.unresolvedActions += Math.max(0, day.summary.issueCount - day.summary.uncoveredCount - day.summary.suggestionCount - day.summary.conflictCount);
    });
    board.totals = totals;
  }

  function normaliseClientText_(value) {
    return String(value || "").trim().toLowerCase();
  }

  function refreshRotaCockpitQuietly() {
    const siteSelect = document.getElementById("cockpitSiteSelect");
    const weekInput = document.getElementById("cockpitWeekStartInput");
    const siteId = siteSelect ? siteSelect.value : "";
    const weekStart = weekInput ? weekInput.value : "";

  function openPersonRotaProfile(employeeId, dateText) {
    if (!employeeId) {
      showToast("This rota row does not have an employee ID yet.");
      return;
    }
    const modal = document.getElementById("personRotaModal");
    if (modal) modal.classList.remove("hidden");
    state.selectedPerson = { employeeId: employeeId, date: dateText || getCockpitSelectedDate_() };
    text("personRotaTitle", "Loading employee…");
    text("personRotaSummary", "Pulling their standard rota and profile.");
    const profileRoot = document.getElementById("personRotaProfile");
    const rotaRoot = document.getElementById("personStandardRotaTable");
    if (profileRoot) profileRoot.innerHTML = '<div class="skeleton-card"><span class="loader small"></span><strong>Loading profile…</strong></div>';
    if (rotaRoot) rotaRoot.innerHTML = "";
    google.script.run
      .withSuccessHandler(result => {
        renderPersonRotaProfile(result || {});
      })
      .withFailureHandler(error => {
        showToast(error.message || "Could not load employee profile.");
        text("personRotaTitle", "Could not load employee");
      })
      .getPersonRotaProfileFromUi(employeeId);
  }

  function renderPersonRotaProfile(profile) {
    const person = profile.person || {};
    const rows = profile.standardRota || [];
    state.selectedPerson = Object.assign({}, state.selectedPerson || {}, {
      employeeId: profile.employeeId || person.employeeId || "",
      employeeName: person.name || "",
      standardRota: rows
    });
    text("personRotaTitle", person.name || "Employee");
    text("personRotaSummary", [person.role, person.primarySite, person.email].filter(Boolean).join(" · "));
    const profileRoot = document.getElementById("personRotaProfile");
    if (profileRoot) {
      profileRoot.innerHTML = `
        <div><span>Role</span><strong>${escapeHtml(person.role || "—")}</strong></div>
        <div><span>Primary site</span><strong>${escapeHtml(person.primarySite || "—")}</strong></div>
        <div><span>Email</span><strong>${escapeHtml(person.email || "—")}</strong></div>
      `;
    }
    renderTable("personStandardRotaTable", ["Day", "Site", "Role", "Start", "End", "Active"], rows.map(row => ({
      Day: row["Day of Week"] || "",
      Site: row.Site || "",
      Role: row.Role || "",
      Start: row["Start Time"] || "",
      End: row["End Time"] || "",
      Active: truthyLabel_(row.Active)
    })), "No person-specific standard rota rows yet.");
    prefillPersonStandardRotaForm(rows);
  }

  function prefillPersonStandardRotaForm(rows) {
    const form = document.getElementById("personStandardRotaForm");
    if (!form) return;
    const date = (state.selectedPerson && state.selectedPerson.date) || "";
    const weekday = date ? new Date(date + "T00:00:00").toLocaleDateString("en-GB", { weekday: "long" }) : "";
    const row = (rows || []).find(item => String(item["Day of Week"] || "") === weekday) || (rows || [])[0] || {};
    form.elements.dayOfWeek.value = row["Day of Week"] || weekday || "";
    form.elements.site.value = row.Site || "";
    form.elements.role.value = row.Role || "";
    form.elements.startTime.value = row["Start Time"] || "";
    form.elements.endTime.value = row["End Time"] || "";
    form.elements.notes.value = row.Notes || "";
    form.elements.active.checked = row.Active === true || String(row.Active || "TRUE").toUpperCase() !== "FALSE";
  }

  function closePersonRotaModal() {
    const modal = document.getElementById("personRotaModal");
    if (modal) modal.classList.add("hidden");
  }

  function markSelectedPersonSick() {
    const selected = state.selectedPerson || {};
    if (!selected.employeeId) {
      showToast("Choose an employee first.");
      return;
    }
    const date = selected.date || getCockpitSelectedDate_();
    text("personRotaSummary", "Marking sick and rebuilding suggestions…");
    google.script.run
      .withSuccessHandler(result => {
        showToast((result && result.message) || "Employee marked sick.");
        closePersonRotaModal();
        queueQuietCockpitRefresh();
      })
      .withFailureHandler(error => {
        showToast(error.message || "Could not mark employee sick.");
      })
      .markEmployeeSickFromUi(selected.employeeId, date, "Marked sick from rota cockpit");
  }

  function showSelectedPersonStandardRotaEditor() {
    const form = document.getElementById("personStandardRotaForm");
    if (form) {
      form.scrollIntoView({ behavior: "smooth", block: "center" });
      const first = form.querySelector("select, input");
      if (first) first.focus();
    }
  }

  function savePersonStandardRotaFromModal() {
    const selected = state.selectedPerson || {};
    const form = document.getElementById("personStandardRotaForm");
    if (!selected.employeeId || !form) {
      showToast("Choose an employee first.");
      return;
    }
    const dayOfWeek = form.elements.dayOfWeek.value;
    const rows = (selected.standardRota || []).filter(row => String(row["Day of Week"] || "") !== String(dayOfWeek || ""));
    rows.push({
      "Employee ID": selected.employeeId,
      "Employee Name": selected.employeeName || "",
      "Day of Week": dayOfWeek,
      "Site": form.elements.site.value,
      "Role": form.elements.role.value,
      "Start Time": form.elements.startTime.value,
      "End Time": form.elements.endTime.value,
      "Effective From": "",
      "Effective To": "",
      "Active": form.elements.active.checked,
      "Notes": form.elements.notes.value
    });
    const submit = form.querySelector("button[type='submit']");
    if (submit) {
      submit.disabled = true;
      submit.textContent = "Saving...";
    }
    google.script.run
      .withSuccessHandler(result => {
        if (submit) {
          submit.disabled = false;
          submit.textContent = "Save weekday pattern";
        }
        showToast((result && result.message) || "Person standard rota saved.");
        state.settingsLoaded = false;
        openPersonRotaProfile(selected.employeeId, selected.date || "");
        if (state.cockpitLoaded) queueQuietCockpitRefresh();
      })
      .withFailureHandler(error => {
        if (submit) {
          submit.disabled = false;
          submit.textContent = "Save weekday pattern";
        }
        showToast(error.message || "Could not save person standard rota.");
      })
      .savePersonStandardRotaFromUi(selected.employeeId, rows);
  }

  function getCockpitSelectedDate_() {
    const input = document.getElementById("cockpitWeekStartInput");
    return input ? input.value : "";
  }

  function handleCockpitGapAction(button) {
    const action = button.dataset.cockpitAction;
    const gapId = button.dataset.gapId;
    if (!gapId) return;
    if (action === "choose") {
      openCoverPickerForCockpitGap(gapId);
      return;
    }
    const optimisticChanged = applyCockpitGapUpdate(gapId, action, {});
    if (optimisticChanged) showToast("Updating in the background...");
    button.disabled = true;
    const originalText = button.textContent;
    button.textContent = "Saving...";
    const runner = google.script.run
      .withSuccessHandler(result => {
        showToast((result && result.message) || "Gap updated.");
        if (!optimisticChanged) applyCockpitGapUpdate(gapId, action, result || {});
        queueQuietCockpitRefresh();
      })
      .withFailureHandler(error => {
        button.disabled = false;
        button.textContent = originalText;
        showToast(error.message || "Could not update gap.");
        refreshRotaCockpitQuietly();
      });
    if (action === "approve") runner.approveSuggestedCoverFromUi(gapId);
    if (action === "agency") runner.requestAgencyForGapFromUi(gapId);
    if (action === "resolved") runner.markGapResolvedFromUi(gapId);
    if (action === "snooze") runner.snoozeGapFromUi(gapId);
  }

  function openCoverPickerForCockpitGap(gapId) {
    if (state.settingsLoaded) {
      openGapModal(gapId, "cover");
      return;
    }
    showToast("Loading staff picker…");
    google.script.run
      .withSuccessHandler(result => {
        result = result || {};
        renderOptions(result.options || {});
        renderSettingsSelectors(result.settings || {});
        state.settingsLoaded = true;
        openGapModal(gapId, "cover");
      })
      .withFailureHandler(error => {
        showToast(error.message || "Could not load staff picker.");
      })
      .getSettingsLibraryFromUi();
  }

  function renderRotaBoard(board) {
    const root = document.getElementById("rotaBoard");
    board = board || { days: [] };
    if (!board.days || !board.days.length) {
      root.innerHTML = '<div class="empty-state">No rota templates found for this site</div>';
      return;
    }
    root.innerHTML = `
      <div class="rota-summary">
        <strong>${escapeHtml(board.siteName)}</strong>
        <span>${escapeHtml(board.weekStart)} · ${board.totalRows || 0} rota rows · ${board.totalGaps || 0} gaps</span>
      </div>
      <div class="rota-days">
        ${board.days.map(day => `
          <section class="rota-day ${day.gapCount ? "has-gap" : ""}">
            <h4>${escapeHtml(day.weekday)}<span>${escapeHtml(day.date)}</span></h4>
            ${(day.rows || []).length ? day.rows.map(row => `
              <div class="rota-row ${row.hasGap ? "gap" : ""} ${row.coverName ? "covered" : ""}">
                <div>
                  <b>${escapeHtml(row.role || "Role")}</b>
                  <span>${escapeHtml(row.employeeName || "Unassigned")}</span>
                  ${row.coverName ? `<small>Covered by ${escapeHtml(row.coverName)} · ${escapeHtml(row.coverType || "Cover")}</small>` : ""}
                </div>
                <em>${escapeHtml(row.status || "—")}</em>
              </div>
            `).join("") : '<p class="quiet">No planned rota</p>'}
          </section>
        `).join("")}
      </div>
    `;
  }

  function renderGaps(gapSummary) {
    const list = document.getElementById("gapList");
    if (!list) return;
    const gaps = gapSummary.gaps || [];
    state.gapsById = {};
    gaps.forEach(gap => {
      if (gap["Gap ID"]) state.gapsById[gap["Gap ID"]] = gap;
    });
    if (!gaps.length) {
      list.innerHTML = '<div class="empty-state">No open gaps found</div>';
      return;
    }
    list.innerHTML = gaps.map(gap => `
      <article class="gap-card priority-${gap.Priority || 3}">
        <div>
          <strong>${escapeHtml(gap["Site Name"] || "")}</strong>
          <span>${escapeHtml(gap.FriendlyDate || gap.Date || "")} · ${escapeHtml(gap.Weekday || "")}</span>
        </div>
        <div>
          <b>${escapeHtml(gap.Role || "Role")}</b>
          <span>${escapeHtml(gap["Employee Name"] || "")}</span>
        </div>
        <em>${escapeHtml(gap["Gap Type"] || "Gap")}</em>
        <div class="gap-actions">
          <button class="secondary mini" data-gap-action="suggestions" data-gap-id="${escapeHtml(gap["Gap ID"] || "")}">Suggestions</button>
          <button class="secondary mini" data-gap-action="cover" data-gap-id="${escapeHtml(gap["Gap ID"] || "")}">Assign cover</button>
          <button class="secondary mini" data-gap-action="agency" data-gap-id="${escapeHtml(gap["Gap ID"] || "")}">Request agency</button>
          <button class="secondary mini" data-gap-action="resolved" data-gap-id="${escapeHtml(gap["Gap ID"] || "")}">Resolved</button>
        </div>
        <div class="gap-suggestions hidden" id="suggestions-${escapeHtml(gap["Gap ID"] || "")}"></div>
      </article>
    `).join("");
    list.querySelectorAll("[data-gap-action]").forEach(button => {
      button.addEventListener("click", () => {
        if (button.dataset.gapAction === "suggestions") {
          loadReliefSuggestionsForGap(button.dataset.gapId);
        } else if (button.dataset.gapAction === "resolved") {
          markGap(button.dataset.gapId, "resolved");
        } else {
          openGapModal(button.dataset.gapId, button.dataset.gapAction);
        }
      });
    });
  }

  function loadReliefSuggestionsForGap(gapId) {
    if (!gapId) return;
    const root = document.getElementById(`suggestions-${gapId}`);
    if (!root) return;
    root.classList.remove("hidden");
    root.innerHTML = '<div class="mini-loading"><span class="loader small"></span><strong>Finding relief suggestions…</strong></div>';
    google.script.run
      .withSuccessHandler(result => {
        const suggestions = (result && result.suggestions) || [];
        if (!suggestions.length) {
          root.innerHTML = '<div class="empty-state compact">No suggestions found for this gap yet.</div>';
          return;
        }
        root.innerHTML = suggestions.map(item => `
          <button class="suggestion-row" type="button" data-cover-name="${escapeHtml(item["Suggested Employee Name"] || "")}">
            <strong>${escapeHtml(item["Suggested Employee Name"] || "")}</strong>
            <span>${escapeHtml(item.Reason || "")}</span>
            <em>Score ${escapeHtml(item.Score || "")}</em>
          </button>
        `).join("");
        root.querySelectorAll("[data-cover-name]").forEach(button => {
          button.addEventListener("click", () => {
            openGapModal(gapId, "cover");
            const coverSelect = document.getElementById("coverPersonSelect");
            if (coverSelect) coverSelect.value = button.dataset.coverName || "";
          });
        });
      })
      .withFailureHandler(error => {
        root.innerHTML = `<div class="empty-state compact">${escapeHtml(error.message || "Could not load suggestions.")}</div>`;
      })
      .getReliefSuggestionsForGapFromUi(gapId, 8);
  }

  function openGapModal(gapId, action) {
    const modal = document.getElementById("gapModal");
    const form = document.getElementById("gapActionForm");
    const gap = state.gapsById[gapId] || {};
    if (!modal || !form) return;
    form.reset();
    form.elements.gapId.value = gapId;
    form.elements.action.value = action;
    const enableAll = document.getElementById("enableAllEmployeesCover");
    if (enableAll) enableAll.checked = false;
    refreshCoverPersonSelect();
    text("gapModalTitle", action === "agency" ? "Request agency cover" : "Assign internal cover");
    text("gapModalSummary", [
      gap["Site Name"],
      gap.FriendlyDate || gap.Date,
      gap.Role,
      gap["Employee Name"] ? "for " + gap["Employee Name"] : ""
    ].filter(Boolean).join(" · "));
    document.querySelectorAll(".cover-only").forEach(el => el.classList.toggle("hidden", action !== "cover"));
    document.querySelectorAll(".agency-only").forEach(el => el.classList.toggle("hidden", action !== "agency"));
    text("gapActionSubmit", action === "agency" ? "Create agency request" : "Assign cover");
    modal.classList.remove("hidden");
  }

  function closeGapModal() {
    const modal = document.getElementById("gapModal");
    if (modal) modal.classList.add("hidden");
  }

  function submitGapActionForm() {
    const form = document.getElementById("gapActionForm");
    const data = Object.fromEntries(new FormData(form).entries());
    if (!data.gapId) return;
    if (data.action === "cover" && !data.coverName) {
      showToast(data.enableAllEmployees ? "Choose who is covering." : "Choose a relief team member, or tick Enable all employees to cover.");
      return;
    }
    if (data.action === "agency" && !data.agencyId) {
      showToast("Choose an agency.");
      return;
    }
    closeGapModal();
    applyCoverageGapLocalUpdate(data.gapId, data.action);
    if (state.cockpitLoaded) {
      applyCockpitGapUpdate(data.gapId, data.action === "cover" ? "approve" : "agency", {
        coverName: data.coverName || ""
      });
    }
    showToast("Saving gap action in the background...");
    const runner = google.script.run
      .withSuccessHandler(result => {
        showToast((result && result.message) || "Gap action saved.");
        if (state.cockpitLoaded) queueQuietCockpitRefresh();
      })
      .withFailureHandler(error => {
        showToast(error.message || "Could not save gap action.");
        loadCoverageGaps();
        if (state.cockpitLoaded) refreshRotaCockpitQuietly();
      });
    if (data.action === "cover") {
      runner.assignCoverForGapFromUi(data.gapId, data);
    } else {
      runner.requestAgencyForGapFromUi(data.gapId, data.agencyId, data);
    }
  }

  function markGap(gapId, action) {
    if (!gapId) return;
    applyCoverageGapLocalUpdate(gapId, action);
    showToast("Updating gap in the background...");
    google.script.run
      .withSuccessHandler(result => {
        showToast((result && result.message) || "Gap updated.");
      })
      .withFailureHandler(error => {
        showToast(error.message || "Could not update gap.");
        loadCoverageGaps();
      })
      .markCoverageGapFromUi(gapId, action, {});
  }

  function applyCoverageGapLocalUpdate(gapId, action) {
    if (!gapId) return;
    delete state.gapsById[gapId];
    const button = document.querySelector(`[data-gap-id="${cssEscape_(gapId)}"]`);
    const card = button ? button.closest(".gap-card") : null;
    if (!card) return;
    card.style.opacity = "0.45";
    card.style.transform = "scale(.985)";
    card.setAttribute("aria-busy", "true");
    window.setTimeout(() => {
      card.remove();
      const list = document.getElementById("gapList");
      if (list && !list.querySelector(".gap-card")) {
        list.innerHTML = '<div class="empty-state">No open gaps found</div>';
      }
    }, 180);
  }

  function renderRelief(reliefSummary) {
    const list = document.getElementById("reliefList");
    if (!list) return;
    const suggestions = reliefSummary.suggestions || [];
    if (!suggestions.length) {
      list.innerHTML = '<div class="empty-state">No suggestions yet</div>';
      return;
    }
    list.innerHTML = suggestions.map(item => `
      <article class="relief-card">
        <strong>${escapeHtml(item["Suggested Employee Name"] || "")}</strong>
        <span>${escapeHtml(item.Date || "")} · ${escapeHtml(item.Role || "")}</span>
        <small>${escapeHtml(item.Reason || "")}</small>
        <em>Score ${escapeHtml(item.Score || "")}</em>
      </article>
    `).join("");
  }

  function setCheck(id, ok) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.toggle("muted", !ok);
  }

  function text(id, value) {
    const el = document.getElementById(id);
    if (el) el.textContent = value;
  }

  function setBusy(isBusy) {
    state.loading = isBusy;
    document.querySelectorAll("button").forEach(button => {
      button.disabled = isBusy;
    });
  }

  function setFormSubmitting_(form, isSubmitting, label) {
    if (!form) return;
    const button = form.querySelector("button[type='submit']");
    if (!button) return;
    if (!button.dataset.defaultText) button.dataset.defaultText = button.textContent;
    button.disabled = Boolean(isSubmitting);
    button.textContent = isSubmitting ? (label || "Saving...") : button.dataset.defaultText;
  }

  function setPanelLoading(id, message) {
    const root = document.getElementById(id);
    if (!root) return;
    root.innerHTML = `
      <div class="skeleton-card">
        <span class="loader small"></span>
        <div>
          <strong>${escapeHtml(message || "Loading…")}</strong>
          <p class="quiet">This section is loaded separately so the app opens faster.</p>
        </div>
      </div>
    `;
  }

  function setSettingsLoading(message) {
    ["reliefDirectoryTable", "standardRotaTable", "personStandardRotaSettingsTable", "managerDirectoryTable", "agencyDirectoryTable"].forEach(id => {
      setPanelLoading(id, message || "Loading settings…");
    });
  }

  function showLoading(title, detail) {
    setBusy(true);
    text("loadingTitle", title || "Working…");
    text("loadingDetail", detail || "Please keep this tab open.");
    const overlay = document.getElementById("loadingOverlay");
    if (overlay) overlay.classList.remove("hidden");
  }

  function hideLoading() {
    const overlay = document.getElementById("loadingOverlay");
    if (overlay) overlay.classList.add("hidden");
    setBusy(false);
  }

  function showToast(message) {
    const toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = message;
    toast.classList.add("show");
    window.clearTimeout(showToast.timer);
    showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 4200);
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function cssEscape_(value) {
    if (window.CSS && typeof window.CSS.escape === "function") return window.CSS.escape(String(value || ""));
    return String(value || "").replace(/["\\]/g, "\\$&");
  }
</script>
