<style>
  :root {
    --ink: #21155f;
    --muted: #746f91;
    --paper: #f6f4ef;
    --card: rgba(255,255,255,.82);
    --accent: #3d21bf;
    --mint: #75efb8;
    --coral: #ff8066;
    --line: rgba(33,21,95,.12);
    --shadow: 0 24px 70px rgba(36, 17, 118, .14);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at top left, rgba(117,239,184,.38), transparent 30rem),
      radial-gradient(circle at 80% 12%, rgba(61,33,191,.18), transparent 28rem),
      var(--paper);
  }

  .app-shell {
    display: grid;
    grid-template-columns: 280px minmax(0, 1fr);
    min-height: 100vh;
  }

  .sidebar {
    position: sticky;
    top: 0;
    height: 100vh;
    padding: 28px;
    background: rgba(255,255,255,.55);
    border-right: 1px solid var(--line);
    backdrop-filter: blur(18px);
    display: flex;
    flex-direction: column;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 38px;
  }

  .brand-mark {
    width: 52px;
    height: 52px;
    display: grid;
    place-items: center;
    border-radius: 18px;
    color: #fff;
    font-weight: 900;
    font-size: 26px;
    background: linear-gradient(145deg, var(--accent), #241176);
    box-shadow: 0 14px 34px rgba(61,33,191,.3);
  }

  .eyebrow {
    margin: 0 0 6px;
    font-size: 12px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 800;
  }

  h1, h2, h3, p { margin-top: 0; }

  h1 { margin-bottom: 0; font-size: 22px; }
  h2 { max-width: 780px; margin-bottom: 18px; font-size: clamp(36px, 5vw, 68px); line-height: .93; letter-spacing: -.055em; }
  h3 { margin-bottom: 12px; font-size: 26px; letter-spacing: -.025em; }

  nav { display: grid; gap: 10px; }

  nav a {
    padding: 13px 15px;
    color: var(--muted);
    text-decoration: none;
    border-radius: 16px;
    font-weight: 800;
    transition: .22s ease;
  }

  nav a:hover,
  nav a.active {
    color: var(--ink);
    background: #fff;
    box-shadow: 0 12px 30px rgba(36,17,118,.08);
    transform: translateX(3px);
  }

  .sidebar-version {
    margin-top: auto;
    padding: 14px 15px;
    border: 1px solid rgba(36,17,118,.09);
    border-radius: 18px;
    background: rgba(255,255,255,.62);
    box-shadow: 0 12px 28px rgba(36,17,118,.06);
    color: var(--muted);
    font-size: 12px;
  }

  .sidebar-version span {
    display: block;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: .16em;
    font-weight: 900;
  }

  .sidebar-version strong {
    color: var(--ink);
    font-size: 15px;
  }

  main {
    padding: 34px;
    display: grid;
    gap: 24px;
  }

  .hero {
    scroll-margin-top: 24px;
    min-height: 360px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 260px;
    gap: 24px;
    align-items: end;
    padding: 42px;
    border-radius: 34px;
    color: #fff;
    background:
      linear-gradient(135deg, rgba(61,33,191,.96), rgba(33,21,95,.98)),
      radial-gradient(circle at 80% 20%, rgba(117,239,184,.45), transparent 22rem);
    box-shadow: var(--shadow);
    overflow: hidden;
    position: relative;
  }

  .hero::after {
    content: "";
    position: absolute;
    width: 260px;
    height: 260px;
    right: -70px;
    top: -70px;
    border-radius: 999px;
    border: 38px solid rgba(117,239,184,.16);
  }

  .hero .eyebrow { color: var(--mint); }
  .hero-copy { max-width: 700px; margin-bottom: 0; color: rgba(255,255,255,.78); font-size: 18px; line-height: 1.55; }

  .hero-card,
  .panel,
  .metric-card {
    border: 1px solid rgba(255,255,255,.65);
    background: var(--card);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
  }

  .hero-card {
    position: relative;
    z-index: 1;
    padding: 22px;
    border-radius: 24px;
    color: var(--ink);
    background: rgba(255,255,255,.9);
  }

  .hero-card p { color: var(--muted); margin-bottom: 8px; font-weight: 700; }
  .hero-card strong { font-size: 24px; }

  .pulse {
    display: inline-block;
    width: 12px;
    height: 12px;
    margin-right: 8px;
    border-radius: 999px;
    background: var(--mint);
    box-shadow: 0 0 0 0 rgba(117,239,184,.8);
    animation: pulse 1.8s infinite;
  }

  @keyframes pulse {
    70% { box-shadow: 0 0 0 14px rgba(117,239,184,0); }
    100% { box-shadow: 0 0 0 0 rgba(117,239,184,0); }
  }

  .grid { display: grid; gap: 18px; }
  .metrics { grid-template-columns: repeat(5, minmax(0, 1fr)); }

  .metric-card,
  .panel {
    border-radius: 26px;
    padding: 24px;
  }

  .metric-card span { display: block; color: var(--muted); font-weight: 800; }
  .metric-card strong { display: block; margin: 10px 0 4px; font-size: 38px; letter-spacing: -.04em; }
  .metric-card small { color: var(--muted); font-weight: 700; }

  .panel-heading {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 18px;
  }

  .panel {
    scroll-margin-top: 24px;
  }

  .status-pill {
    padding: 9px 13px;
    border-radius: 999px;
    color: var(--ink);
    background: rgba(117,239,184,.35);
    font-size: 13px;
    font-weight: 900;
  }

  .status-pill.warn { background: rgba(255,128,102,.18); color: #8b2b19; }

  .action-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin: 18px 0;
  }

  .control-row {
    display: grid;
    grid-template-columns: 1fr 180px auto;
    gap: 12px;
    align-items: end;
    margin: 18px 0;
  }

  label {
    display: grid;
    gap: 7px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  select,
  input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 13px;
    color: var(--ink);
    background: #fff;
    font: inherit;
    font-weight: 800;
  }

  button {
    border: 0;
    padding: 13px 18px;
    border-radius: 15px;
    color: #fff;
    background: var(--accent);
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 13px 28px rgba(61,33,191,.22);
    transition: .2s ease;
  }

  button:hover { transform: translateY(-2px); }
  button:disabled { opacity: .5; cursor: wait; transform: none; }
  button.secondary { color: var(--ink); background: #fff; box-shadow: inset 0 0 0 1px var(--line); }
  button.danger { background: var(--coral); box-shadow: 0 13px 28px rgba(255,128,102,.24); }
  button.mini {
    padding: 8px 10px;
    border-radius: 11px;
    font-size: 11px;
    box-shadow: inset 0 0 0 1px var(--line);
  }

  .checklist {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 12px;
  }

  .check-item {
    padding: 14px;
    border-radius: 16px;
    background: rgba(117,239,184,.22);
    font-weight: 800;
  }

  .check-item::before { content: "✓"; margin-right: 8px; }
  .check-item.muted { background: rgba(33,21,95,.06); color: var(--muted); }
  .check-item.muted::before { content: "•"; }

  .two-col {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 24px;
  }

  .muted-text { color: var(--muted); line-height: 1.55; }

  .empty-state {
    margin-top: 20px;
    display: grid;
    place-items: center;
    min-height: 160px;
    border: 1px dashed rgba(33,21,95,.2);
    border-radius: 22px;
    color: var(--muted);
    font-weight: 900;
    background: rgba(255,255,255,.45);
  }

  code {
    padding: 2px 6px;
    border-radius: 7px;
    background: rgba(33,21,95,.08);
    color: var(--ink);
    font-weight: 800;
  }

  .timeline {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
  }

  .timeline div {
    padding: 18px;
    border-radius: 20px;
    background: #fff;
    box-shadow: inset 0 0 0 1px var(--line);
  }

  .timeline strong {
    display: grid;
    place-items: center;
    width: 34px;
    height: 34px;
    margin-bottom: 12px;
    border-radius: 12px;
    color: #fff;
    background: var(--accent);
  }

  .timeline span { font-weight: 900; }

  .gap-list {
    display: grid;
    gap: 12px;
  }

  .rota-board {
    margin-top: 16px;
  }

  .rota-summary {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
    padding: 14px;
    border-radius: 18px;
    color: #fff;
    background: linear-gradient(135deg, var(--accent), var(--ink));
  }

  .rota-summary span {
    color: rgba(255,255,255,.78);
    font-weight: 800;
  }

  .rota-days {
    display: grid;
    grid-template-columns: repeat(7, minmax(180px, 1fr));
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 6px;
  }

  .rota-day {
    min-width: 180px;
    padding: 12px;
    border-radius: 20px;
    background: #fff;
    box-shadow: inset 0 0 0 1px var(--line);
  }

  .rota-day.has-gap {
    box-shadow: inset 4px 0 0 var(--coral), inset 0 0 0 1px var(--line);
  }

  .rota-day h4 {
    margin: 0 0 12px;
    font-size: 15px;
  }

  .rota-day h4 span {
    display: block;
    margin-top: 3px;
    color: var(--muted);
    font-size: 12px;
  }

  .rota-row {
    display: grid;
    gap: 8px;
    margin-bottom: 9px;
    padding: 10px;
    border-radius: 14px;
    background: rgba(33,21,95,.045);
  }

  .rota-row.gap {
    background: rgba(255,128,102,.14);
  }

  .rota-row.covered {
    background: rgba(117,239,184,.18);
    box-shadow: inset 3px 0 0 var(--mint);
  }

  .rota-row b,
  .rota-row span {
    display: block;
  }

  .rota-row span,
  .rota-row small,
  .quiet {
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }

  .rota-row small {
    display: block;
    margin-top: 5px;
    color: #277a55;
  }

  .rota-row em,
  .relief-card em {
    justify-self: start;
    padding: 5px 8px;
    border-radius: 999px;
    background: rgba(117,239,184,.3);
    color: var(--ink);
    font-style: normal;
    font-size: 12px;
    font-weight: 900;
  }

  .relief-list {
    display: grid;
    gap: 10px;
  }

  .relief-card {
    display: grid;
    gap: 5px;
    padding: 14px;
    border-radius: 18px;
    background: #fff;
    box-shadow: inset 0 0 0 1px var(--line);
  }

  .relief-card span,
  .relief-card small {
    color: var(--muted);
    font-weight: 700;
  }

  .gap-card {
    display: grid;
    grid-template-columns: 1.2fr 1fr auto auto;
    gap: 16px;
    align-items: center;
    padding: 16px;
    border-radius: 18px;
    background: #fff;
    box-shadow: inset 0 0 0 1px var(--line);
  }

  .gap-card strong,
  .gap-card b,
  .gap-card span {
    display: block;
  }

  .gap-card span {
    margin-top: 4px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }

  .gap-card em {
    padding: 8px 11px;
    border-radius: 999px;
    background: rgba(255,128,102,.18);
    color: #8b2b19;
    font-style: normal;
    font-weight: 900;
  }

  .gap-card.priority-1 { box-shadow: inset 4px 0 0 var(--coral), inset 0 0 0 1px var(--line); }

  .gap-actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 8px;
  }

  .settings-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
  }

  .settings-grid div {
    padding: 18px;
    border-radius: 20px;
    background: #fff;
    box-shadow: inset 0 0 0 1px var(--line);
  }

  .settings-grid strong {
    display: block;
    font-size: 30px;
    letter-spacing: -.04em;
  }

  .settings-grid span {
    color: var(--muted);
    font-weight: 800;
  }

  .settings-forms {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px;
    margin-top: 20px;
  }

  .mini-form {
    display: grid;
    gap: 10px;
    padding: 18px;
    border-radius: 22px;
    background: #fff;
    box-shadow: inset 0 0 0 1px var(--line);
  }

  .mini-form h4 {
    margin: 0 0 4px;
  }

  .toast {
    position: fixed;
    right: 24px;
    bottom: 24px;
    max-width: 420px;
    padding: 16px 18px;
    border-radius: 18px;
    color: #fff;
    background: var(--ink);
    box-shadow: var(--shadow);
    transform: translateY(120px);
    opacity: 0;
    transition: .25s ease;
    z-index: 20;
    font-weight: 800;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  .hidden {
    display: none !important;
  }

  @media (max-width: 980px) {
    .app-shell { grid-template-columns: 1fr; }
    .sidebar { position: relative; height: auto; }
    nav { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .hero { grid-template-columns: 1fr; }
    .metrics, .checklist, .two-col, .timeline, .settings-grid, .settings-forms, .gap-card, .control-row { grid-template-columns: 1fr; }
  }
</style>
