<style>
  :root {
    --ink: #17113f;
    --muted: #746f91;
    --paper: #f7f5f0;
    --card: rgba(255,255,255,.84);
    --accent: #4424d6;
    --accent-2: #745cff;
    --accent-dark: #241170;
    --mint: #75efb8;
    --coral: #ff745f;
    --amber: #f4b942;
    --line: rgba(33,21,95,.11);
    --shadow: 0 18px 48px rgba(36, 17, 118, .13);
    --shadow-soft: 0 8px 24px rgba(36, 17, 118, .08);
    --glass: rgba(255,255,255,.72);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 8% 4%, rgba(117,239,184,.42), transparent 32rem),
      radial-gradient(circle at 80% 8%, rgba(116,92,255,.24), transparent 32rem),
      linear-gradient(180deg, rgba(255,255,255,.45), rgba(246,244,239,.92)),
      var(--paper);
  }

  .app-shell {
    display: grid;
    grid-template-columns: 280px minmax(0, 1fr);
    min-height: 100vh;
  }

  .sidebar {
    position: sticky;
    top: 0;
    height: 100vh;
    padding: 28px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.88), rgba(255,255,255,.66)),
      radial-gradient(circle at top, rgba(117,239,184,.18), transparent 18rem);
    border-right: 1px solid var(--line);
    box-shadow: 12px 0 34px rgba(36,17,118,.045);
    display: flex;
    flex-direction: column;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 38px;
  }

  .brand-mark {
    width: 104px;
    height: 50px;
    display: grid;
    place-items: center;
    padding: 10px 12px;
    border-radius: 18px;
    color: var(--accent);
    font-weight: 900;
    font-size: 26px;
    background: rgba(255,255,255,.86);
    box-shadow: inset 0 0 0 1px rgba(68,36,214,.10), 0 14px 30px rgba(61,33,191,.12);
  }

  .brand-mark svg {
    display: block;
    width: 100%;
    height: auto;
  }

  .eyebrow {
    margin: 0 0 6px;
    font-size: 12px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 800;
  }

  h1, h2, h3, p { margin-top: 0; }

  h1 { margin-bottom: 0; font-size: 22px; }
  h2 { max-width: 780px; margin-bottom: 18px; font-size: clamp(36px, 5vw, 68px); line-height: .93; letter-spacing: -.055em; }
  h3 { margin-bottom: 12px; font-size: 26px; letter-spacing: -.025em; }

  nav { display: grid; gap: 10px; }

  nav a {
    padding: 11px 13px;
    color: var(--muted);
    text-decoration: none;
    border-radius: 14px;
    font-weight: 800;
    transition: .22s ease;
  }

  nav a:hover,
  nav a.active {
    color: var(--ink);
    background: rgba(255,255,255,.88);
    box-shadow: var(--shadow-soft);
    transform: translateX(2px);
  }

  .sidebar-version {
    margin-top: auto;
    padding: 14px 15px;
    border: 1px solid rgba(36,17,118,.09);
    border-radius: 18px;
    background: rgba(255,255,255,.62);
    box-shadow: 0 12px 28px rgba(36,17,118,.06);
    color: var(--muted);
    font-size: 12px;
  }

  .sidebar-version span {
    display: block;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: .16em;
    font-weight: 900;
  }

  .sidebar-version strong {
    color: var(--ink);
    font-size: 15px;
  }

  main {
    padding: 30px;
    display: grid;
    gap: 24px;
  }

  .hero {
    scroll-margin-top: 24px;
    min-height: 360px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 260px;
    gap: 24px;
    align-items: end;
    padding: 42px;
    border-radius: 34px;
    color: #fff;
    background:
      radial-gradient(circle at 88% 8%, rgba(117,239,184,.45), transparent 20rem),
      radial-gradient(circle at 10% 85%, rgba(116,92,255,.38), transparent 18rem),
      linear-gradient(135deg, rgba(68,36,214,.98), rgba(23,17,63,.99));
    box-shadow: var(--shadow);
    overflow: hidden;
    position: relative;
  }

  .hero::after {
    content: "";
    position: absolute;
    width: 260px;
    height: 260px;
    right: -70px;
    top: -70px;
    border-radius: 999px;
    border: 38px solid rgba(117,239,184,.14);
    filter: drop-shadow(0 18px 40px rgba(0,0,0,.12));
  }

  .hero .eyebrow { color: var(--mint); }
  .hero-copy { max-width: 700px; margin-bottom: 0; color: rgba(255,255,255,.78); font-size: 18px; line-height: 1.55; }

  .hero-card,
  .panel,
  .metric-card {
    border: 1px solid rgba(255,255,255,.65);
    background: var(--card);
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px) saturate(1.1);
  }

  .hero-card {
    position: relative;
    z-index: 1;
    padding: 22px;
    border-radius: 24px;
    color: var(--ink);
    background: rgba(255,255,255,.9);
  }

  .hero-card p { color: var(--muted); margin-bottom: 8px; font-weight: 700; }
  .hero-card strong { font-size: 24px; }

  .pulse {
    display: inline-block;
    width: 12px;
    height: 12px;
    margin-right: 8px;
    border-radius: 999px;
    background: var(--mint);
    box-shadow: 0 0 0 0 rgba(117,239,184,.8);
    animation: pulse 1.8s infinite;
  }

  @keyframes pulse {
    70% { box-shadow: 0 0 0 14px rgba(117,239,184,0); }
    100% { box-shadow: 0 0 0 0 rgba(117,239,184,0); }
  }

  .grid { display: grid; gap: 18px; }
  .metrics { grid-template-columns: repeat(5, minmax(0, 1fr)); }

  .cockpit-hero {
    min-height: 260px;
    align-items: center;
  }

  .cockpit-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 22px;
    align-items: end;
  }

  .cockpit-controls label {
    min-width: 180px;
    color: rgba(255,255,255,.86);
    font-weight: 900;
  }

  .cockpit-controls select,
  .cockpit-controls input {
    width: 100%;
    margin-top: 7px;
    border-color: rgba(255,255,255,.55);
    background: rgba(255,255,255,.96);
  }

  .week-nav {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px;
    border-radius: 999px;
    background: rgba(255,255,255,.16);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.24);
  }

  .week-nav button {
    min-height: 34px;
    height: 34px;
    padding: 0 12px;
    border-radius: 999px;
    background: rgba(255,255,255,.92);
    color: var(--ink);
    box-shadow: none;
  }

  .week-nav-btn {
    width: 34px;
    padding: 0 !important;
    font-size: 18px;
    line-height: 1;
  }

  .week-nav-btn.wide {
    width: 38px;
    font-size: 12px;
  }

  .week-nav-today {
    font-size: 12px;
  }

  .cockpit-kpis {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
  }

  .cockpit-kpis article {
    padding: 18px;
    border-radius: 24px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,255,255,.76));
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.75), var(--shadow-soft);
    position: relative;
    overflow: hidden;
  }

  .cockpit-kpis article::after {
    content: "";
    position: absolute;
    width: 80px;
    height: 80px;
    right: -34px;
    top: -34px;
    border-radius: 50%;
    background: rgba(117,239,184,.22);
  }

  .cockpit-kpis span {
    display: block;
    color: var(--muted);
    font-weight: 900;
  }

  .cockpit-kpis strong {
    display: block;
    margin-top: 8px;
    font-size: 34px;
    letter-spacing: -.04em;
  }

  .cockpit-board {
    display: grid;
    gap: 16px;
  }

  .cockpit-week-title {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 18px;
    padding: 20px;
    border-radius: 24px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.74));
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.72), var(--shadow-soft);
  }

  .cockpit-week-title h3 {
    margin: 0;
  }

  .cockpit-week-title span {
    color: var(--muted);
    font-weight: 900;
  }

  .cockpit-days {
    display: grid;
    grid-template-columns: repeat(5, minmax(220px, 1fr));
    gap: 14px;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .cockpit-day {
    min-width: 210px;
    display: grid;
    align-content: start;
    gap: 12px;
    padding: 14px;
    border-radius: 24px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.82));
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.75), 0 12px 26px rgba(36,17,118,.08);
    position: relative;
    overflow: hidden;
  }

  .cockpit-day::before {
    content: "";
    position: absolute;
    inset: 0 0 auto;
    height: 5px;
    background: #40b879;
  }

  .cockpit-day.status-covered::before { background: #40b879; }
  .cockpit-day.status-cover_suggested::before { background: var(--amber); }
  .cockpit-day.status-uncovered::before { background: var(--coral); }
  .cockpit-day.status-closed::before { background: rgba(33,21,95,.22); }
  .cockpit-day.status-closed { opacity: .72; background: rgba(255,255,255,.58); }

  .cockpit-day header,
  .cockpit-person,
  .cockpit-gap,
  .best-suggestion {
    display: grid;
    gap: 5px;
  }

  .cockpit-day header {
    grid-template-columns: 1fr auto;
    align-items: start;
  }

  .cockpit-day header strong {
    display: block;
    font-size: 18px;
  }

  .cockpit-day header span,
  .cockpit-person span,
  .cockpit-person small,
  .cockpit-gap span,
  .best-suggestion span {
    color: var(--muted);
    font-weight: 750;
  }

  .cockpit-day header em {
    padding: 5px 8px;
    border-radius: 999px;
    background: rgba(33,21,95,.06);
    font-style: normal;
    font-size: 11px;
    font-weight: 900;
  }

  .cockpit-staff-list,
  .cockpit-gap-list {
    display: grid;
    gap: 8px;
  }

  .cockpit-person {
    width: 100%;
    padding: 9px 10px;
    border-radius: 15px;
    color: var(--ink);
    text-align: left;
    background: rgba(33,21,95,.04);
    box-shadow: inset 0 0 0 1px rgba(33,21,95,.045);
  }

  button.cockpit-person {
    min-height: auto;
    cursor: pointer;
  }

  button.cockpit-person:hover {
    background: rgba(117,239,184,.14);
    transform: translateY(-1px);
  }

  .cockpit-person.person-absent {
    background: rgba(255,128,102,.12);
  }

  .cockpit-person.person-covered {
    background: rgba(117,239,184,.16);
  }

  .cockpit-absence-strip {
    display: grid;
    gap: 6px;
  }

  .cockpit-absence-strip span {
    padding: 8px 9px;
    border-radius: 12px;
    background: rgba(255,128,102,.13);
    color: #8b2b19;
    font-weight: 900;
  }

  .cockpit-gap {
    padding: 12px;
    border-radius: 18px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,245,242,.9));
    box-shadow: inset 3px 0 0 var(--coral), inset 0 0 0 1px rgba(255,128,102,.22);
  }

  .issue-person-link {
    display: grid;
    gap: 4px;
    width: 100%;
    min-height: auto;
    padding: 0;
    border-radius: 0;
    color: var(--ink);
    background: transparent;
    box-shadow: none;
    text-align: left;
  }

  .issue-person-link:hover {
    transform: none;
    box-shadow: none;
    color: var(--accent);
  }

  .best-suggestion {
    padding: 10px;
    border-radius: 15px;
    background:
      linear-gradient(135deg, rgba(117,239,184,.24), rgba(255,255,255,.78));
    box-shadow: inset 0 0 0 1px rgba(39,122,85,.12);
  }

  .best-suggestion.empty {
    background: rgba(33,21,95,.05);
    color: var(--muted);
    font-weight: 900;
  }

  .best-suggestion em {
    color: var(--accent);
    font-style: normal;
    font-weight: 900;
  }

  .cockpit-gap-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 2px;
  }

  .no-issues-pill {
    display: inline-flex;
    justify-content: center;
    padding: 9px 10px;
    border-radius: 999px;
    color: #277a55;
    background: rgba(117,239,184,.18);
    font-weight: 900;
  }

  .cockpit-day-summary {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: -4px 0 0;
  }

  .summary-chip {
    display: inline-flex;
    align-items: center;
    min-height: 24px;
    padding: 4px 8px;
    border-radius: 999px;
    color: var(--ink);
    background: rgba(33,21,95,.06);
    font-size: 11px;
    font-weight: 900;
  }

  .summary-chip.good {
    color: #277a55;
    background: rgba(117,239,184,.18);
  }

  .summary-chip.amber {
    color: #8a6200;
    background: rgba(255,194,87,.22);
  }

  .summary-chip.red {
    color: #9a331f;
    background: rgba(255,128,102,.16);
  }

  .summary-chip.muted {
    color: var(--muted);
    background: rgba(33,21,95,.045);
  }

  .cockpit-full-rota {
    display: grid;
    gap: 8px;
    margin-top: 4px;
    padding-top: 10px;
    border-top: 1px solid rgba(33,21,95,.08);
  }

  .cockpit-full-rota h5 {
    margin: 0;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .endpoint-card {
    margin: 14px 0;
    padding: 14px 16px;
    border-radius: 18px;
    background: #fff;
    box-shadow: inset 0 0 0 1px var(--line);
  }

  .endpoint-card span {
    display: block;
    color: var(--muted);
    font-weight: 900;
  }

  .endpoint-card strong {
    display: block;
    margin-top: 4px;
  }

  .metric-card,
  .panel {
    border-radius: 26px;
    padding: 24px;
  }

  .metric-card span { display: block; color: var(--muted); font-weight: 800; }
  .metric-card strong { display: block; margin: 10px 0 4px; font-size: 38px; letter-spacing: -.04em; }
  .metric-card small { color: var(--muted); font-weight: 700; }

  .panel-heading {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 18px;
  }

  .panel {
    scroll-margin-top: 24px;
  }

  .status-pill {
    padding: 9px 13px;
    border-radius: 999px;
    color: var(--ink);
    background: rgba(117,239,184,.35);
    font-size: 13px;
    font-weight: 900;
  }

  .status-pill.warn { background: rgba(255,128,102,.18); color: #8b2b19; }

  .action-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin: 18px 0;
  }

  .control-row {
    display: grid;
    grid-template-columns: 1fr 180px auto;
    gap: 12px;
    align-items: end;
    margin: 18px 0;
  }

  label {
    display: grid;
    gap: 7px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  select,
  input {
    width: 100%;
    border: 1px solid rgba(33,21,95,.12);
    border-radius: 13px;
    padding: 10px 12px;
    color: var(--ink);
    background: rgba(255,255,255,.92);
    font: inherit;
    font-weight: 800;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.85), 0 6px 14px rgba(36,17,118,.035);
    transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease;
  }

  select:focus,
  input:focus {
    outline: none;
    border-color: rgba(68,36,214,.42);
    box-shadow: 0 0 0 4px rgba(68,36,214,.10), 0 8px 20px rgba(36,17,118,.06);
  }

  button {
    border: 0;
    min-height: 38px;
    padding: 9px 14px;
    border-radius: 999px;
    color: #fff;
    background:
      linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,0)),
      linear-gradient(135deg, var(--accent-2), var(--accent));
    font-weight: 900;
    font-size: 13px;
    letter-spacing: -.01em;
    cursor: pointer;
    box-shadow: 0 9px 20px rgba(61,33,191,.22);
    transition: transform .18s ease, box-shadow .18s ease, background .18s ease, opacity .18s ease;
  }

  button:hover { transform: translateY(-1px); box-shadow: 0 12px 24px rgba(61,33,191,.25); }
  button:active { transform: translateY(0); box-shadow: 0 6px 14px rgba(61,33,191,.18); }
  button:disabled { opacity: .5; cursor: wait; transform: none; }
  button.secondary {
    color: var(--ink);
    background: rgba(255,255,255,.86);
    box-shadow: inset 0 0 0 1px rgba(33,21,95,.12), 0 6px 14px rgba(36,17,118,.045);
  }
  button.secondary:hover { box-shadow: inset 0 0 0 1px rgba(68,36,214,.2), 0 10px 22px rgba(36,17,118,.08); }
  button.danger {
    background: linear-gradient(135deg, #ff9a82, var(--coral));
    box-shadow: 0 8px 18px rgba(255,128,102,.22);
  }
  button.mini {
    min-height: 30px;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 11px;
    box-shadow: inset 0 0 0 1px rgba(33,21,95,.12), 0 4px 10px rgba(36,17,118,.04);
  }

  button.primary-mini {
    color: #fff;
    background: linear-gradient(135deg, var(--accent-2), var(--accent-dark));
    box-shadow: 0 8px 18px rgba(61,33,191,.18);
  }

  .soft-pill {
    align-self: center;
    padding: 8px 11px;
    border-radius: 999px;
    background: rgba(117,239,184,.25);
    color: var(--ink);
    font-size: 12px;
    font-weight: 900;
  }

  .checklist {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 12px;
  }

  .check-item {
    padding: 14px;
    border-radius: 16px;
    background: rgba(117,239,184,.22);
    font-weight: 800;
  }

  .check-item::before { content: "✓"; margin-right: 8px; }
  .check-item.muted { background: rgba(33,21,95,.06); color: var(--muted); }
  .check-item.muted::before { content: "•"; }

  .two-col {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 24px;
  }

  .muted-text { color: var(--muted); line-height: 1.55; }

  .empty-state {
    margin-top: 20px;
    display: grid;
    place-items: center;
    min-height: 160px;
    border: 1px dashed rgba(33,21,95,.2);
    border-radius: 22px;
    color: var(--muted);
    font-weight: 900;
    background: rgba(255,255,255,.45);
  }

  code {
    padding: 2px 6px;
    border-radius: 7px;
    background: rgba(33,21,95,.08);
    color: var(--ink);
    font-weight: 800;
  }

  .timeline {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
  }

  .timeline div {
    padding: 18px;
    border-radius: 20px;
    background: #fff;
    box-shadow: inset 0 0 0 1px var(--line);
  }

  .timeline strong {
    display: grid;
    place-items: center;
    width: 34px;
    height: 34px;
    margin-bottom: 12px;
    border-radius: 12px;
    color: #fff;
    background: var(--accent);
  }

  .timeline span { font-weight: 900; }

  .gap-list {
    display: grid;
    gap: 12px;
  }

  .rota-board {
    margin-top: 16px;
  }

  .rota-summary {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
    padding: 14px;
    border-radius: 18px;
    color: #fff;
    background: linear-gradient(135deg, var(--accent), var(--ink));
  }

  .rota-summary span {
    color: rgba(255,255,255,.78);
    font-weight: 800;
  }

  .rota-days {
    display: grid;
    grid-template-columns: repeat(7, minmax(180px, 1fr));
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 6px;
  }

  .rota-day {
    min-width: 180px;
    padding: 12px;
    border-radius: 20px;
    background: #fff;
    box-shadow: inset 0 0 0 1px var(--line);
  }

  .rota-day.has-gap {
    box-shadow: inset 4px 0 0 var(--coral), inset 0 0 0 1px var(--line);
  }

  .rota-day h4 {
    margin: 0 0 12px;
    font-size: 15px;
  }

  .rota-day h4 span {
    display: block;
    margin-top: 3px;
    color: var(--muted);
    font-size: 12px;
  }

  .rota-row {
    display: grid;
    gap: 8px;
    margin-bottom: 9px;
    padding: 10px;
    border-radius: 14px;
    background: rgba(33,21,95,.045);
  }

  .rota-row.gap {
    background: rgba(255,128,102,.14);
  }
