<style>
  @font-face {
    font-family: "Gilroy";
    src: url("https://bloom-coffee.org/bloom-quiz/assets/fonts/GILROY-REGULAR.TTF") format("truetype");
    font-weight: 400;
  }
  @font-face {
    font-family: "Gilroy";
    src: url("https://bloom-coffee.org/bloom-quiz/assets/fonts/GILROY-BOLD.TTF") format("truetype");
    font-weight: 700;
  }
  @font-face {
    font-family: "VIM";
    src: url("https://bloom-coffee.org/bloom-quiz/assets/fonts/VimSM.otf") format("opentype");
  }

  :root {
    --ink: #241f33;
    --muted: #746d80;
    --purple: #4f34c7;
    --purple-dark: #280f8c;
    --canvas: #edf1f4;
    --card: #ffffff;
    --soft: #f7f6fb;
    --border: #ddd8e9;
    --orange: #ff6b2c;
    --green: #13866e;
    --yellow: #f4d54d;
    --radius: 18px;
    --shadow: 0 10px 28px rgba(40, 15, 140, .08);
  }

  * { box-sizing: border-box; }
  body, button, input { font-family: "Gilroy", Arial, sans-serif; }
  body { margin: 0; background: var(--canvas); color: var(--ink); }
  button { color: inherit; }
  h1, h2, h3, p { margin-top: 0; }
  h1, h2 { font-family: "VIM", Georgia, serif; font-weight: 400; }
  h1 { margin: 0; color: var(--purple); font-size: clamp(28px, 4vw, 46px); line-height: .95; }
  h2 { margin-bottom: 4px; font-size: clamp(30px, 4vw, 48px); }
  h3 { margin: 0; font-size: 18px; }
  .hidden { display: none !important; }
  .muted { color: var(--muted); }
  .eyebrow { margin-bottom: 6px; color: var(--muted); font-size: 10px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; }
  .app-shell { padding: 22px; max-width: 1800px; margin: 0 auto; }

  .topbar {
    display: grid; grid-template-columns: minmax(120px, 1fr) auto minmax(120px, 1fr); align-items: center; gap: 20px;
    padding: 20px 24px; background: var(--card); border-radius: 24px; box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,.85);
  }
  .brand, .toolbar-group, .week-nav { display: flex; align-items: center; gap: 12px; }
  .topbar-title { min-width: 0; text-align: center; }
  .topbar-title .eyebrow { margin-bottom: 5px; }
  .topbar-build { justify-self: end; text-align: right; }
  .toolbar-group { align-items: flex-end; }
  .brand-mark {
    display: grid; place-items: center; width: clamp(105px, 8vw, 142px); height: 58px;
    flex: 0 0 auto; overflow: visible; background: transparent;
  }
  .brand-mark svg { display: block; width: 100%; height: auto; max-height: 58px; }
  .sync-status { color: var(--muted); font-size: 13px; }
  .deployment-notice { margin: 16px 0 0; padding: 14px 16px; border: 1px solid #ef9b79; border-radius: 14px; background: #fff0e9; color: #8f310d; font-size: 13px; font-weight: 700; }
  .button, .icon-button {
    border: 0; border-radius: 14px; background: var(--purple); color: white;
    padding: 11px 15px; font-weight: 700; cursor: pointer; box-shadow: 0 3px 0 var(--purple-dark);
    transform: translateY(0); transition: transform .08s ease, box-shadow .08s ease, filter .12s ease;
  }
  .button.secondary { background: white; color: var(--purple-dark); border: 1px solid var(--border); box-shadow: none; }
  .button:hover, .icon-button:hover { filter: brightness(1.08); }
  .button:active, .icon-button:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 var(--purple-dark), 0 2px 5px rgba(40,15,140,.15);
  }
  .button:disabled { opacity: .55; cursor: not-allowed; transform: none; box-shadow: none; }
  .week-nav .button, .week-nav .icon-button {
    border: 1px solid #654ce0; background: var(--purple); color: white;
    box-shadow: 0 4px 0 var(--purple-dark), 0 8px 16px rgba(40,15,140,.18);
  }
  .week-nav .button:active, .week-nav .icon-button:active {
    transform: translateY(4px); box-shadow: 0 0 0 var(--purple-dark), 0 2px 5px rgba(40,15,140,.15);
  }
  html, body { cursor: default !important; }
  html.is-busy, body.is-busy { cursor: default !important; }
  html:not(.is-busy) *, body:not(.is-busy) * { cursor: inherit; }
  html:not(.is-busy) button, html:not(.is-busy) a, html:not(.is-busy) label,
  html:not(.is-busy) select, html:not(.is-busy) summary,
  body:not(.is-busy) button, body:not(.is-busy) a, body:not(.is-busy) label,
  body:not(.is-busy) select, body:not(.is-busy) summary { cursor: pointer !important; }
  html:not(.is-busy) input, html:not(.is-busy) textarea,
  body:not(.is-busy) input, body:not(.is-busy) textarea { cursor: text !important; }
  .icon-button { width: 42px; padding: 10px; }

  .hero-row { display: flex; justify-content: space-between; align-items: end; padding: 34px 4px 18px; }
  .week-nav { flex-wrap: wrap; justify-content: flex-end; }
  .print-button { display: none; }
  .stats-grid { display: grid; grid-template-columns: repeat(5, minmax(140px, 1fr)); gap: 12px; }
  .stat-card { position: relative; overflow: hidden; min-height: 130px; padding: 18px; border-radius: var(--radius); background: var(--card); box-shadow: var(--shadow); }
  .stat-card { transition: transform .16s ease, box-shadow .16s ease; }
  .stat-card:hover { transform: translateY(-2px); box-shadow: 0 14px 34px rgba(40,15,140,.11); }
  .stat-card::after { content: ""; position: absolute; inset: auto -25px -35px auto; width: 90px; height: 90px; border-radius: 50%; background: var(--accent, var(--purple)); opacity: .10; }
  .stat-label { color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
  .stat-value { display: block; margin: 12px 0 3px; color: var(--ink); font-family: "VIM", serif; font-size: 42px; line-height: 1; }
  .stat-delta { color: var(--muted); font-size: 12px; }
  .prep-progress { margin-top: 12px; padding: 13px 16px; border-radius: 15px; background: white; box-shadow: var(--shadow); }
  .prep-progress > div:first-child { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }
  .prep-progress-track { height: 9px; overflow: hidden; border-radius: 999px; background: #ece8f5; }
  .prep-progress-track i { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg,var(--purple),#8d76e8); transition: width .25s ease; }

  .toolbar {
    display: flex; justify-content: space-between; align-items: end; gap: 18px;
    position: relative; z-index: 20;
    margin: 18px 0; padding: 16px 18px; background: rgba(255,255,255,.94); border: 1px solid rgba(255,255,255,.9); border-radius: var(--radius);
    box-shadow: 0 10px 30px rgba(40,15,140,.10); backdrop-filter: blur(16px);
  }
  .kitchen-exit { display: none; }
  .toolbar-label { margin-bottom: 8px; color: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; }
  .compact-select { display: grid; gap: 5px; color: var(--muted); font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
  .compact-select select { height: 42px; padding: 0 30px 0 10px; border: 1px solid var(--border); border-radius: 13px; background: white; color: var(--ink); font-family: "Gilroy", Arial, sans-serif; font-size: 13px; font-weight: 400; letter-spacing: 0; text-transform: none; }
  .compact-select select option { font-family: "Gilroy", Arial, sans-serif; }
  .toggle-chip { display: flex; align-items: center; gap: 6px; height: 42px; padding: 0 10px; border: 1px solid var(--border); border-radius: 13px; background: white; font-size: 11px; white-space: nowrap; }
  .toggle-chip input { accent-color: var(--purple); }
  .filter-heading { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .filter-heading .toolbar-label { margin: 0 auto 0 0; }
  .filter-action { padding: 0; border: 0; background: transparent; color: var(--purple); cursor: pointer; font: inherit; font-size: 10px; font-weight: 700; }
  .filter-groups { display: flex; flex-wrap: wrap; align-items: end; gap: 22px; }
  .site-filters { display: flex; flex-wrap: wrap; gap: 8px; }
  .site-chip { display: flex; align-items: center; gap: 7px; padding: 8px 11px; border: 1px solid var(--border); border-radius: 999px; background: white; cursor: pointer; font-size: 13px; }
  .site-chip { transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease; }
  .site-chip:hover { transform: translateY(-1px); border-color: #bfb5da; box-shadow: 0 5px 12px rgba(40,15,140,.08); }
  .site-chip input { display: none; }
  .site-chip.off { opacity: .4; }
  .site-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--site); }
  .period-icon { display: grid; place-items: center; width: 18px; height: 18px; border-radius: 6px; background: var(--site); color: white; font-size: 10px; font-weight: 700; }
  .search-field { display: flex; align-items: center; gap: 7px; min-width: 260px; height: 42px; padding: 0 12px; background: white; border: 1px solid var(--border); border-radius: 13px; }
  .search-field input { width: 100%; padding: 11px 0; border: 0; outline: 0; background: transparent; }
  .product-filter { display: grid; gap: 5px; color: var(--muted); font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
  .product-filter details { position: relative; z-index: 22; min-width: 250px; color: var(--ink); font-size: 13px; font-weight: 400; letter-spacing: 0; text-transform: none; }
  .product-filter details[open] { z-index: 40; }
  .product-filter summary { display: flex; align-items: center; min-width: 250px; height: 42px; padding: 0 36px 0 12px; border: 1px solid var(--border); border-radius: 13px; background: white; cursor: pointer; list-style: none; }
  .product-filter summary::-webkit-details-marker { display: none; }
  .product-filter summary::after { content: "⌄"; position: absolute; right: 13px; font-size: 16px; }
  .product-filter-menu { position: absolute; z-index: 50; top: calc(100% + 6px); right: 0; width: min(480px, 82vw); max-height: 460px; overflow: auto; padding: 10px; border: 1px solid var(--border); border-radius: 15px; background: white; box-shadow: 0 18px 45px rgba(36,25,67,.18); }
  .product-filter-actions { position: sticky; top: -10px; z-index: 2; display: flex; justify-content: flex-end; gap: 12px; padding: 8px 6px 10px; background: white; border-bottom: 1px solid var(--border); }
  .product-filter-actions button { border: 0; background: transparent; color: var(--purple); cursor: pointer; font: inherit; font-size: 11px; font-weight: 700; }
  .product-filter-group { padding: 10px 4px 4px; }
  .product-filter-group > strong { display: block; padding: 3px 6px 7px; color: var(--muted); font-size: 10px; letter-spacing: .09em; text-transform: uppercase; }
  .product-check { display: flex; gap: 9px; align-items: flex-start; padding: 8px 6px; border-radius: 9px; cursor: pointer; }
  .product-check:hover { background: #f5f2fb; }
  .product-check input { margin-top: 2px; accent-color: var(--purple); }
  .product-check span { display: grid; gap: 2px; }
  .product-check b { color: var(--ink); font-size: 12px; font-weight: 600; }
  .product-check small { color: var(--muted); font-size: 11px; }
  .view-switch { display: flex; padding: 3px; background: #e8e4f1; border-radius: 13px; }
  .view-switch button { border: 0; padding: 8px 11px; background: transparent; border-radius: 10px; cursor: pointer; }
  .view-switch button.active { background: white; color: var(--purple); box-shadow: 0 2px 8px rgba(40,15,140,.12); }

  .content-layout { position: relative; z-index: 1; display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 16px; align-items: start; }
  .load-notice { margin: 0 0 14px; padding: 12px 15px; border: 1px solid #e6ca72; border-radius: 14px; background: #fff8d9; color: #725b0b; font-size: 13px; }
  .primary-panel, .attention-panel { background: var(--card); border-radius: 22px; box-shadow: var(--shadow); }
  .primary-panel, .attention-panel { border: 1px solid rgba(255,255,255,.9); }
  .primary-panel { position: relative; overflow: hidden; }
  .primary-panel.week-loading > :not(.week-loading-overlay) { opacity: .48; }
  .week-loading-overlay { position: absolute; z-index: 60; inset: 0; display: flex; align-items: flex-start; justify-content: center; gap: 10px; padding-top: 72px; background: rgba(247,248,250,.52); color: var(--purple-dark); backdrop-filter: blur(2px); }
  .week-loading-overlay strong { margin-top: 3px; font-size: 13px; }
  .week-spinner { width: 22px; height: 22px; border: 3px solid #d8d0fa; border-top-color: var(--purple); border-radius: 50%; animation: weekSpin .7s linear infinite; }
  @keyframes weekSpin { to { transform: rotate(360deg); } }
  .attention-panel { padding: 18px; position: sticky; top: 18px; }
  .panel-heading { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .count-badge { display: grid; place-items: center; min-width: 28px; height: 28px; padding: 0 8px; border-radius: 999px; background: #fff0e9; color: #b63d0c; font-weight: 700; }
  .attention-item { padding: 12px 0; border-top: 1px solid var(--border); cursor: pointer; }
  .attention-item:first-child { border-top: 0; }
  .attention-title { display: flex; justify-content: space-between; gap: 8px; font-weight: 700; font-size: 13px; }
  .attention-copy { margin: 5px 0 0; color: var(--muted); font-size: 12px; line-height: 1.4; }
  .empty-state { padding: 26px 10px; color: var(--muted); text-align: center; }

  .calendar-board { display: grid; grid-template-columns: repeat(5, minmax(180px, 1fr)); min-height: 520px; overflow-x: auto; }
  .day-column { min-width: 150px; border-left: 1px solid var(--border); background: #fbfbfd; }
  .day-column:first-child { border-left: 0; }
  .day-column.today { background: #f6f3ff; }
  .day-header { position: sticky; top: 0; z-index: 2; padding: 14px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,.94); backdrop-filter: blur(8px); }
  .day-name { color: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; }
  .day-number { margin-top: 4px; font-family: "VIM", serif; font-size: 28px; }
  .day-summary { margin-top: 4px; color: var(--muted); font-size: 11px; }
  .delivery-day-flag { margin-top: 8px; padding: 5px 7px; border-radius: 8px; background: #e9e3ff; color: var(--purple-dark); font-size: 10px; font-weight: 700; }
  .day-orders { padding: 10px; }
  .order-card { position: relative; margin-bottom: 9px; padding: 11px 10px 10px 14px; border: 1px solid var(--border); border-radius: 14px; background: white; cursor: pointer; box-shadow: 0 4px 12px rgba(36,31,51,.05); }
  .order-card::before { content: ""; position: absolute; inset: 10px auto 10px 0; width: 4px; border-radius: 0 4px 4px 0; background: var(--site); }
  .order-card:hover { transform: translateY(-1px); border-color: #bcb2d8; }
  .order-card { transition: transform .14s ease, border-color .14s ease, box-shadow .14s ease; }
  .order-card:hover { box-shadow: 0 9px 20px rgba(36,31,51,.09); }
  .order-time { color: var(--purple); font-size: 11px; font-weight: 700; }
  .order-card-top { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 8px; }
  .order-site { display: inline-flex; align-items: center; gap: 5px; padding: 5px 8px; border-radius: 8px; background: var(--site); color: white; font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
  .updated-badge { display: inline-flex; align-items: center; width: fit-content; padding: 4px 7px; border-radius: 999px; background: #fff0c7; color: #7d5700; font-size: 9px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
  .done-badge { display: inline-flex; align-items: center; width: fit-content; padding: 4px 7px; border-radius: 999px; background: rgba(255,255,255,.2); color: white; font-size: 9px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
  .order-card.prepped { border-color: var(--purple); background: var(--purple); color: white; box-shadow: 0 8px 18px rgba(79,52,199,.24); }
  .order-card.prepped::before { background: white; }
  .order-card.prepped .order-site { background: rgba(255,255,255,.18); }
  .order-card.prepped .order-time, .order-card.prepped .order-meta, .order-card.prepped .muted { color: rgba(255,255,255,.82); }
  .order-card.prepped .product-quantity { background: rgba(255,255,255,.15); color: white; }
  .order-card.urgent:not(.prepped) { border: 2px solid var(--orange); animation: urgentPulse 1.8s ease-in-out infinite; }
  .quick-prep { width: 100%; margin-top: 8px; padding: 6px; border: 0; border-radius: 8px; background: #ece8ff; color: var(--purple-dark); cursor: pointer; font-size: 10px; font-weight: 700; }
  .order-card.prepped .quick-prep { background: rgba(255,255,255,.18); color: white; }
  @keyframes urgentPulse { 50% { box-shadow: 0 0 0 4px rgba(255,107,44,.12); } }
  .order-company { margin: 5px 0 3px; font-weight: 700; font-size: 13px; line-height: 1.25; }
  .order-meta { display: flex; justify-content: space-between; gap: 8px; color: var(--muted); font-size: 11px; }
  .order-meta span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .warning-dot { display: inline-block; width: 7px; height: 7px; margin-left: 4px; border-radius: 50%; background: var(--orange); }
  .product-quantity { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-top: 8px; padding: 7px 8px; border-radius: 9px; background: #f0edff; color: var(--purple-dark); font-size: 11px; }
  .product-quantity strong { font-size: 15px; }

  .run-sheet { padding: 4px 20px 20px; }
  .run-day { margin-top: 18px; }
  .run-day-title { display: flex; justify-content: space-between; padding-bottom: 9px; border-bottom: 2px solid var(--ink); }
  .run-row { display: grid; grid-template-columns: 72px 90px minmax(180px, 1.2fr) 70px 1fr 34px; gap: 12px; align-items: center; padding: 12px 4px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 13px; }
  .run-row:hover { background: var(--soft); }
  .run-row.prepped { margin: 4px 0; padding-left: 10px; padding-right: 10px; border-radius: 10px; border-color: var(--purple); background: var(--purple); color: white; }
  .run-row.prepped .muted { color: rgba(255,255,255,.78); }
  .run-row.prepped .site-tag { background: rgba(255,255,255,.18); }
  .site-tag { display: inline-flex; align-items: center; width: fit-content; padding: 5px 8px; color: white; border-radius: 8px; background: var(--site); font-size: 10px; font-weight: 700; }
  .pax-pill { font-weight: 700; }

  .production-view { padding: 22px; background: #f7f8fa; }
  .production-heading { display: flex; justify-content: space-between; align-items: end; margin-bottom: 16px; }
  .production-summary { display: grid; grid-template-columns: auto auto auto auto; align-items: baseline; gap: 5px 9px; color: var(--muted); font-size: 11px; }
  .production-summary strong { color: var(--purple); font-family: "VIM", serif; font-size: 28px; }
  .production-category { margin-top: 18px; }
  .production-category > header { display: flex; justify-content: space-between; align-items: end; margin-bottom: 10px; padding: 0 2px 9px; border-bottom: 2px solid var(--ink); }
  .production-category > header > span { color: var(--muted); font-size: 12px; }
  .production-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px; }
  .production-card { overflow: hidden; border: 1px solid var(--border); border-radius: 16px; background: white; box-shadow: 0 5px 16px rgba(36,31,51,.05); }
  .production-card { transition: transform .14s ease, box-shadow .14s ease; }
  .production-card:hover { transform: translateY(-2px); box-shadow: 0 12px 26px rgba(36,31,51,.09); }
  .production-card-head { display: flex; justify-content: space-between; align-items: start; gap: 12px; padding: 15px; }
  .production-card-head h3 { line-height: 1.25; }
  .production-card-head span { display: block; margin-top: 4px; color: var(--muted); font-size: 11px; }
  .production-qty { color: var(--purple); font-family: "VIM", serif; font-size: 34px; line-height: 1; }
  .production-sites { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 15px 13px; }
  .production-site-chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 7px; border-radius: 8px; background: var(--soft); color: var(--ink); font-size: 11px; }
  .production-site-chip i, .production-booking i { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--site); }
  .production-bookings { border-top: 1px solid var(--border); }
  .production-booking { display: grid; grid-template-columns: 42px 8px 44px 1fr auto 44px; gap: 7px; align-items: center; width: 100%; padding: 9px 14px; border-top: 1px solid #eeeaf4; background: white; cursor: pointer; text-align: left; font-size: 11px; }
  .production-booking:first-child { border-top: 0; }
  .production-booking:hover { background: #f6f3ff; }
  .production-booking strong { color: var(--purple); font-size: 13px; }
  .production-booking.prepped { background: var(--purple); color: white; }
  .production-booking.prepped strong { color: white; }
  .production-booking.prepped i { background: white !important; }
  .production-booking button { padding: 5px 6px; border: 0; border-radius: 7px; background: #ece8ff; color: var(--purple-dark); cursor: pointer; font-size: 9px; font-weight: 700; }
  .production-booking.prepped button { background: rgba(255,255,255,.2); color: white; }
  .delivery-view { padding: 22px; }
  .delivery-row { display: grid; grid-template-columns: 70px 80px minmax(220px,1fr) auto; gap: 12px; align-items: center; margin-bottom: 9px; padding: 14px; border: 1px solid var(--border); border-left: 6px solid var(--site); border-radius: 14px; background: white; color: var(--ink); text-decoration: none; }
  .delivery-row:hover { border-color: var(--site); box-shadow: var(--shadow); }
  .delivery-row .site-tag { background: var(--site); }
  .delivery-row small { display: block; margin-top: 4px; color: var(--muted); }
  .delivery-time { color: var(--purple); font-weight: 700; }
  .dietary-view { padding: 22px; }
  .dietary-site { margin-bottom: 20px; }
